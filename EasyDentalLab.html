const EstimateForm = ({ estimate, data, onSave, onCancel, onDirtyChange }) => {
  const t = useT();
  const getInitialItems = () => {
    if (estimate) return Array.isArray(estimate.items) ? estimate.items : [];
    return [{id: Math.random().toString(36).slice(2, 11), code:"", description:"", qty:1, price:0}];
  };
  const initialFormData = estimate ? {...estimate, items: getInitialItems()} : { clientId:"", patientTitle:"", patientSurname:"", patientName:"", memberName:"", medicalAidName:"", medicalAidNumber:"", date:today(), validUntil:"", notes:"", items:getInitialItems(), lang:"en", discountEnabled:false, discountPercent:15 };
  const [f, setF] = useState(initialFormData);
  const [lang, setLang] = useState(estimate?.lang || "en");
  const [discountEnabled, setDiscountEnabled] = useState(estimate?.discountEnabled || false);
  const [discountPercent, setDiscountPercent] = useState(estimate?.discountPercent || 15);
  const s = (k,v) => setF(p => ({...p,[k]:v}));

  // Track if form has unsaved changes
  const isDirty = useMemo(() => {
    if (!estimate) {
      // New estimate - check if any data entered
      return f.clientId !== "" ||
             f.patientSurname?.trim() !== "" ||
             f.patientName?.trim() !== "" ||
             f.memberName?.trim() !== "" ||
             f.medicalAidName?.trim() !== "" ||
             f.medicalAidNumber?.trim() !== "" ||
             f.notes?.trim() !== "" ||
             (f.items?.length > 1) ||
             (f.items?.length === 1 && f.items[0].code !== "");
    } else {
      // Editing - check if anything changed
      return JSON.stringify({...f, lang, discountEnabled, discountPercent}) !== JSON.stringify({...initialFormData, lang: estimate.lang, discountEnabled: estimate.discountEnabled, discountPercent: estimate.discountPercent});
    }
  }, [f, lang, discountEnabled, discountPercent, estimate, initialFormData]);

  // Notify parent when dirty state changes
  useEffect(() => {
    if (onDirtyChange) onDirtyChange(isDirty);
  }, [isDirty, onDirtyChange]);
  const switchLang = (newLang) => {
    setLang(newLang);
    setF(prev => ({...prev, lang: newLang, items: (Array.isArray(prev.items) ? prev.items : []).map(item => {
      const t = data.tariffs.find(t => t.code === item.code);
      return t ? {...item, description: descForLang(t, newLang)} : item;
    })}));
  };
  const clients = data.clients.filter(c => !c.archived);
  const subtotal = (Array.isArray(f.items) ? f.items : []).reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);
  const discountAmount = discountEnabled ? subtotal * (Math.min(100, Math.max(0, parseFloat(discountPercent) || 0)) / 100) : 0;
  const afterDiscount = subtotal - discountAmount;
  const vatRate = parseFloat(data.profile.vatPercent) || 0;
  const vatAmount = vatRate > 0 ? afterDiscount * (vatRate / 100) / (1 + vatRate / 100) : 0;
  const total = afterDiscount;

  // Auto-focus first code input when form opens
  useEffect(() => {
    setTimeout(() => {
      const firstCodeInput = document.querySelector('input[data-field="code"]');
      if (firstCodeInput) firstCodeInput.focus();
    }, 100);
  }, []);

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,marginBottom:16}}>
        <SearchSelect label={t("dentistName")} value={f.clientId} onChange={v=>s("clientId",v)} options={clients.map(c=>({value:c.id,label:c.name+(c.practice?" — "+c.practice:"")}))} placeholder="Type to search dentists..."/>
        <Input label={t("invoiceDate")} value={f.date} onChange={v=>s("date",v)} type="date"/>
        <Input label="Valid Until" value={f.validUntil} onChange={v=>s("validUntil",v)} type="date"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 2fr 2fr 2fr",gap:12,marginBottom:16}}>
        <Select label={t("patTitle")} value={f.patientTitle} onChange={v=>s("patientTitle",v)} options={[{value:"Mr",label:"Mr"},{value:"Mrs",label:"Mrs"},{value:"Miss",label:"Miss"},{value:"Dr",label:"Dr"},{value:"Prof",label:"Prof"}]} placeholder="Select..." style={{}} title="Patient title — optional"/>
        <Input label={t("patSurname")} value={f.patientSurname} onChange={v=>s("patientSurname",v)} required placeholder="e.g. Smith" title="Patient surname — required"/>
        <Input label={t("patName")} value={f.patientName} onChange={v=>s("patientName",v)} placeholder="e.g. John" title="Patient first/given name — optional"/>
        <Input label={t("memberName")} value={f.memberName} onChange={v=>s("memberName",v)} placeholder="e.g. Main member" title="Medical aid member name — optional"/>
        <MedicalAidSelect label={t("medAid")} value={f.medicalAidName} onChange={v=>s("medicalAidName",v)} options={(data.medicalAids||[]).map(n=>({value:n,label:n}))}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:12,marginBottom:16}}>
        <Input label={t("medAidNo")} value={f.medicalAidNumber} onChange={v=>s("medicalAidNumber",v)} placeholder="e.g. 123456789" title="Medical aid member number — optional"/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
        <label style={{fontSize:13,fontWeight:600,color:"#374151"}}>{t("invoiceLang")}:</label>
        <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" name="estLang" value="en" checked={lang==="en"} onChange={()=>switchLang("en")}/> English</label>
        <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" name="estLang" value="af" checked={lang==="af"} onChange={()=>switchLang("af")}/> Afrikaans</label>
      </div>
      <div style={{marginBottom:16}}><LineItemEditor items={Array.isArray(f.items) ? f.items : []} setItems={updater=>setF(prev=>({...prev,items:typeof updater==='function'?updater(prev.items):updater}))} tariffs={data.tariffs} macros={data.macros} lang={lang}/></div>
      <Input label={t("clientNotes")} value={f.notes} onChange={v=>s("notes",v)} textarea rows={2} style={{marginBottom:16}}/>
      <div style={{borderTop:"1px solid #e5e7eb",paddingTop:12,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <label style={{fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <input type="checkbox" checked={discountEnabled} onChange={e=>{setDiscountEnabled(e.target.checked);if(e.target.checked&&!discountPercent)setDiscountPercent(15);}}/>
            <span>Discount</span>
          </label>
          {discountEnabled && (
            <input type="number" min="0" max="100" step="0.1" value={discountPercent} onChange={e=>setDiscountPercent(e.target.value)} style={{width:70,padding:"4px 8px",border:"1px solid #d1d5db",borderRadius:4,fontSize:13}} placeholder="%" title="Discount percentage (max 100%)"/>
          )}
          {discountEnabled && <span style={{fontSize:13,color:"#6b7280"}}>%</span>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,fontSize:14}}>
          <div style={{display:"flex",justifyContent:"space-between",width:250}}>
            <span>Subtotal:</span>
            <span>{fmt(subtotal)}</span>
          </div>
          {discountEnabled && (
            <div style={{display:"flex",justifyContent:"space-between",width:250,color:"#dc2626"}}>
              <span>Discount ({Math.min(100,Math.max(0,parseFloat(discountPercent)||0)).toFixed(1)}%):</span>
              <span>- {fmt(discountAmount)}</span>
            </div>
          )}
          {vatRate > 0 && (
            <div style={{display:"flex",justifyContent:"space-between",width:250,fontSize:12,color:"#6b7280"}}>
              <span>VAT at {vatRate}% included:</span>
              <span>{fmt(vatAmount)}</span>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",width:250,fontSize:18,fontWeight:700,borderTop:"1px solid #e5e7eb",paddingTop:4}}>
            <span>{t("estimateTotal")}:</span>
            <span>{fmt(total)}</span>
          </div>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button className="btn btn-secondary" title="Discard changes and close" onClick={onCancel}>{t("cancel")}</button>
        <button className="btn btn-primary" title="Save this estimate" onClick={()=>onSave({...f,lang,total,discountEnabled,discountPercent:parseFloat(discountPercent)||15})} disabled={!f.clientId||!f.patientSurname?.trim()||f.items.length===0}>{t("save")} {t("nav_estimates").replace(/s$/,"")}</button>
      </div>
    </div>
  );
};

const Estimates = ({ data, setData, setPage }) => {
  const t = useT();
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [showCopyModal, setShowCopyModal] = useState(false);
  const [copyingEstimate, setCopyingEstimate] = useState(null);
  const [formIsDirty, setFormIsDirty] = useState(false);
  const [sortConfig, setSortConfig] = useState({ field: 'number', direction: 'desc' });
  const [selectedRow, setSelectedRow] = useState(null);

  const handleSort = (field) => {
    setSortConfig(prev => {
      if (prev.field === field) {
        if (prev.direction === 'asc') return { field, direction: 'desc' };
        return { field: 'number', direction: 'desc' };
      }
      return { field, direction: 'asc' };
    });
  };

  const sorted = useMemo(() => {
    const q = search.toLowerCase();
    let filtered = [...data.estimates].filter(e => e.clientName?.toLowerCase().includes(q) || String(e.number).includes(q));

    if (sortConfig.field && sortConfig.direction !== 'default') {
      filtered.sort((a, b) => {
        const field = sortConfig.field;
        const dir = sortConfig.direction === 'asc' ? 1 : -1;
        if (field === 'number') return dir * (a.number - b.number);
        else if (field === 'date') return dir * (a.date||"").localeCompare(b.date||"");
        else if (field === 'customer') return dir * (a.clientName||"").localeCompare(b.clientName||"");
        else if (field === 'patient') {
          const aName = `${a.patientSurname||""} ${a.patientName||""}`.trim();
          const bName = `${b.patientSurname||""} ${b.patientName||""}`.trim();
          return dir * aName.localeCompare(bName);
        }
        else if (field === 'total') return dir * ((a.total||0) - (b.total||0));
        else if (field === 'status') return dir * (a.status||"").localeCompare(b.status||"");
        return 0;
      });
    }

    return filtered;
  }, [data.estimates, search, sortConfig]);

  const save = (form) => {
    const client = data.clients.find(c => c.id===form.clientId);
    const clientName = client ? client.name+(client.practice?" — "+client.practice:"") : "";
    setData(prev => {
      if (editing) return {...prev, estimates: prev.estimates.map(e => e.id===editing.id ? {...editing,...form,clientName} : e)};
      return {...prev, estimates: [...prev.estimates, {...form,id:genId(),number:prev.nextEstimateNo,clientName,status:"draft"}], nextEstimateNo: prev.nextEstimateNo+1};
    });
    setShowForm(false); setEditing(null);
  };

  const toInvoice = (est) => {
    setData(prev => {
      const refreshedItems = est.items.map(item => {
        const tr = prev.tariffs.find(t => t.code === item.code);
        return tr ? {...item, tariffCode: tr.tariffCode||tr.code, price: tr.price} : item;
      });
      const newTotal = refreshedItems.reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);
      return {
        ...prev,
        invoices: [...prev.invoices, {id:genId(),number:prev.nextInvoiceNo,clientId:est.clientId,clientName:est.clientName,date:today(),items:refreshedItems,notes:est.notes,total:newTotal,status:"unpaid",estimateRef:est.number,patientTitle:est.patientTitle,patientSurname:est.patientSurname,patientName:est.patientName,memberName:est.memberName,medicalAidName:est.medicalAidName,medicalAidNumber:est.medicalAidNumber,lang:est.lang}],
        nextInvoiceNo: prev.nextInvoiceNo+1,
        estimates: prev.estimates.map(e => e.id===est.id ? {...e,status:"invoiced"} : e),
      };
    });
    setPage("invoices");
  };

  const copyEstimate = (est, mode) => {
    setData(prev => {
      let refreshedItems = [];
      let patientTitle = "", patientSurname = "", patientName = "", memberName = "", medicalAidName = "", medicalAidNumber = "";
      let clientId = "", clientName = "", notes = "", lang = "en", validUntil = "";

      if (mode === "all") {
        // Copy everything
        refreshedItems = est.items.map(item => {
          const tr = prev.tariffs.find(t => t.code === item.code);
          return tr ? {...item, tariffCode: tr.tariffCode||tr.code, price: tr.price} : item;
        });
        clientId = est.clientId;
        clientName = est.clientName;
        patientTitle = est.patientTitle;
        patientSurname = est.patientSurname;
        patientName = est.patientName;
        memberName = est.memberName;
        medicalAidName = est.medicalAidName;
        medicalAidNumber = est.medicalAidNumber;
        lang = est.lang;
        notes = est.notes;
        validUntil = est.validUntil;
      } else if (mode === "patient") {
        // Copy patient & client info only (blank line items)
        refreshedItems = [];
        clientId = est.clientId;
        clientName = est.clientName;
        patientTitle = est.patientTitle;
        patientSurname = est.patientSurname;
        patientName = est.patientName;
        memberName = est.memberName;
        medicalAidName = est.medicalAidName;
        medicalAidNumber = est.medicalAidNumber;
        lang = est.lang;
      } else if (mode === "detail") {
        // Copy line items only (blank patient info)
        refreshedItems = est.items.map(item => {
          const tr = prev.tariffs.find(t => t.code === item.code);
          return tr ? {...item, tariffCode: tr.tariffCode||tr.code, price: tr.price} : item;
        });
        notes = est.notes;
      }

      const newTotal = refreshedItems.reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);
      return {
        ...prev,
        estimates: [...prev.estimates, {id:genId(),number:prev.nextEstimateNo,clientId,clientName,date:today(),items:refreshedItems,notes,total:newTotal,status:"draft",patientTitle,patientSurname,patientName,memberName,medicalAidName,medicalAidNumber,lang,validUntil}],
        nextEstimateNo: prev.nextEstimateNo+1,
      };
    });
  };

  const openCopyModal = (est) => {
    setCopyingEstimate(est);
    setShowCopyModal(true);
  };

  const handleCopy = (mode) => {
    if (copyingEstimate) {
      copyEstimate(copyingEstimate, mode);
      setShowCopyModal(false);
      setCopyingEstimate(null);
    }
  };

  const handleContextMenu = (e, est) => {
    e.preventDefault();
    openCopyModal(est);
  };

  const saveAsMacro = (est) => {
    const macroName = prompt("Enter a name for this macro:", `Estimate #${est.number} Macro`);
    if (!macroName || !macroName.trim()) return;

    const macroCodes = est.items
      .filter(item => item.code && item.code.trim())
      .map(item => ({
        code: item.code,
        qty: item.qty || 1
      }));

    if (macroCodes.length === 0) {
      alert("This estimate has no line items to save as a macro.");
      return;
    }

    setData(prev => ({
      ...prev,
      macros: [...prev.macros, {
        id: genId(),
        name: macroName.trim(),
        codes: macroCodes
      }]
    }));

    alert(`Macro "${macroName.trim()}" created with ${macroCodes.length} codes!`);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{fontSize:24,fontWeight:700,margin:0}}>{t("estimatesTitle")}</h1>
        <button className="btn btn-primary" title="Create a new estimate for a client" onClick={()=>{setEditing(null);setShowForm(true)}}><SvgIcon path={ICO.plus} size={16}/> {t("newEstimate")}</button>
      </div>
      <input className="input-field" value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("search")+"..."} style={{marginBottom:16}}/>

      {sorted.length===0 ? (
        <div style={{textAlign:"center",padding:"48px 0"}}>
          <p style={{color:"#9ca3af",fontSize:14,margin:"0 0 12px"}}>{t("noEstimates")}</p>
          <button className="btn btn-primary" title="Create a new estimate for a client" onClick={()=>setShowForm(true)}><SvgIcon path={ICO.plus} size={16}/> {t("newEstimate")}</button>
        </div>
      ) : (
        <div>
          <div className="card" style={{padding:0,overflow:"auto",marginBottom:selectedRow?12:0}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead style={{background:"var(--c-surface2)",borderBottom:"2px solid var(--c-border)"}}>
                <tr>
                  <SortableColumnHeader label="Estimate #" field="number" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Date" field="date" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Customer" field="customer" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Patient" field="patient" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Total" field="total" sortConfig={sortConfig} onSort={handleSort} align="right" />
                  <SortableColumnHeader label="Status" field="status" sortConfig={sortConfig} onSort={handleSort} />
                  <th style={{padding:"10px 16px",textAlign:"right",color:"var(--c-text2)",fontSize:12,fontWeight:600}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((e) => {
                  const isSelected = selectedRow?.id === e.id;
                  return (
                    <tr
                      key={e.id}
                      onClick={()=>setSelectedRow(isSelected?null:e)}
                      style={{
                        borderBottom:"1px solid var(--c-border2)",
                        cursor:"pointer",
                        background:isSelected?"var(--c-sel)":"transparent",
                        transition:"background 0.15s ease"
                      }}
                      onContextMenu={(evt)=>handleContextMenu(evt,e)}
                    >
                      <td style={{padding:"10px 16px",fontWeight:700}}>#{e.number}</td>
                      <td style={{padding:"10px 16px",color:"var(--c-text2)"}}>{fmtDate(e.date)}</td>
                      <td style={{padding:"10px 16px"}}>{e.clientName}</td>
                      <td style={{padding:"10px 16px",color:"var(--c-text2)"}}>
                        {(e.patientSurname || e.patientName) ? `${e.patientSurname||""} ${e.patientName||""}`.trim() : "—"}
                      </td>
                      <td style={{padding:"10px 16px",textAlign:"right",fontWeight:700}}>{fmt(e.total)}</td>
                      <td style={{padding:"10px 16px"}}>
                        <span className={"badge badge-"+(e.status==="invoiced"?"green":e.status==="draft"?"blue":"gray")}>{e.status||"draft"}</span>
                      </td>
                      <td style={{padding:"10px 16px",textAlign:"right"}}>
                        <div style={{display:"flex",gap:2,alignItems:"center",justifyContent:"flex-end"}} onClick={evt=>evt.stopPropagation()}>
                          <button className="icon-btn" title="Print this estimate" onClick={()=>printDocument(e,data,"estimate")}><SvgIcon path={ICO.printer} size={15} color="#6b7280"/></button>
                          <button className="icon-btn" title="Save this estimate as PDF (downloads immediately)" onClick={()=>savePDFDocument(e,data,"estimate")}><SvgIcon path={ICO.download} size={15} color="#2563eb"/></button>
                          <button className="icon-btn" title="Send this estimate via WhatsApp to the client" onClick={()=>whatsappDocument(e,data,"estimate")}><SvgIcon path={ICO.whatsapp} size={16} color="#25D366" filled/></button>
                          {e.status!=="invoiced" && <button className="icon-btn" title="Convert this estimate into an invoice" onClick={()=>toInvoice(e)}><SvgIcon path={ICO.arrowRight} size={15} color="#059669"/></button>}
                          <button className="icon-btn" title="Copy as new estimate — choose what to copy" onClick={()=>openCopyModal(e)}><SvgIcon path={ICO.copy} size={15} color="#6b7280"/></button>
                          <button className="icon-btn" title="Save this estimate as a reusable macro (uses current tariff prices)" onClick={()=>saveAsMacro(e)}><SvgIcon path={ICO.sparkles} size={15} color="#8b5cf6"/></button>
                          <button className="icon-btn" title="Edit this estimate" onClick={()=>{setEditing(e);setShowForm(true)}}><SvgIcon path={ICO.edit} size={15} color="#6b7280"/></button>
                          <button className="icon-btn" title="Delete this estimate permanently" onClick={()=>{if(confirm("Delete?"))setData(prev=>({...prev,estimates:prev.estimates.filter(x=>x.id!==e.id)}))}}><SvgIcon path={ICO.trash} size={15} color="#ef4444"/></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {selectedRow && (
            <div className="card" style={{padding:"16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{fontSize:14,fontWeight:700,margin:0}}>Estimate #{selectedRow.number} — Line Items</h3>
                <button onClick={()=>setSelectedRow(null)} style={{padding:"4px 8px",fontSize:11,background:"var(--c-surface2)",border:"1px solid var(--c-border)",borderRadius:4,cursor:"pointer"}}>Close</button>
              </div>
              {selectedRow.items && selectedRow.items.length > 0 ? (
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{background:"var(--c-surface2)",borderBottom:"1px solid var(--c-border)"}}>
                    <th style={{padding:"6px 12px",textAlign:"left",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Code</th>
                    <th style={{padding:"6px 12px",textAlign:"left",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Description</th>
                    <th style={{padding:"6px 12px",textAlign:"right",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Qty</th>
                    <th style={{padding:"6px 12px",textAlign:"right",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Price</th>
                    <th style={{padding:"6px 12px",textAlign:"right",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Total</th>
                  </tr></thead>
                  <tbody>
                    {selectedRow.items.map((item,idx) => (
                      <tr key={idx} style={{borderBottom:"1px solid var(--c-border2)"}}>
                        <td style={{padding:"6px 12px",fontFamily:"monospace",color:"#2563eb",fontWeight:600}}>{item.code}</td>
                        <td style={{padding:"6px 12px"}}>{item.description}</td>
                        <td style={{padding:"6px 12px",textAlign:"right"}}>{item.qty}</td>
                        <td style={{padding:"6px 12px",textAlign:"right"}}>{fmt(item.price)}</td>
                        <td style={{padding:"6px 12px",textAlign:"right",fontWeight:600}}>{fmt((parseFloat(item.qty)||0)*(parseFloat(item.price)||0))}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : (
                <p style={{color:"var(--c-text3)",fontSize:12,margin:0}}>No line items</p>
              )}
            </div>
          )}
        </div>
      )}

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onCloseAttempt={(proceed) => {
        if (formIsDirty) {
          if (confirm("You have unsaved changes. Discard changes and close?")) {
            proceed();
          }
        } else {
          proceed();
        }
      }} title={editing?`${t("edit")} Estimate #${editing.number}`:t("newEstimate")} wide>
        <EstimateForm estimate={editing} data={data} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onDirtyChange={setFormIsDirty}/>
      </Modal>

      <CopyModal open={showCopyModal} onClose={()=>{setShowCopyModal(false);setCopyingEstimate(null)}} onCopy={handleCopy} type="Estimate"/>
    </div>
  );
};

const InvoiceForm = ({ invoice, data, onSave, onCancel, onDirtyChange }) => {
  const t = useT();
  const getInitialItems = () => {
    if (invoice) return Array.isArray(invoice.items) ? invoice.items : [];
    return [{id: Math.random().toString(36).slice(2, 11), code:"", description:"", qty:1, price:0}];
  };
  const initialFormData = invoice ? {...invoice, items: getInitialItems()} : { clientId:"", patientTitle:"", patientSurname:"", patientName:"", memberName:"", medicalAidName:"", medicalAidNumber:"", date:today(), notes:"", items:getInitialItems(), lang:"en", discountEnabled:false, discountPercent:15 };
  const [f, setF] = useState(initialFormData);
  const [lang, setLang] = useState(invoice?.lang || "en");
  const [discountEnabled, setDiscountEnabled] = useState(invoice?.discountEnabled || false);
  const [discountPercent, setDiscountPercent] = useState(invoice?.discountPercent || 15);
  const s = (k,v) => setF(p => ({...p,[k]:v}));

  // Track if form has unsaved changes
  const isDirty = useMemo(() => {
    if (!invoice) {
      // New invoice - check if any data entered
      return f.clientId !== "" ||
             f.patientSurname?.trim() !== "" ||
             f.patientName?.trim() !== "" ||
             f.memberName?.trim() !== "" ||
             f.medicalAidName?.trim() !== "" ||
             f.medicalAidNumber?.trim() !== "" ||
             f.notes?.trim() !== "" ||
             (f.items?.length > 1) ||
             (f.items?.length === 1 && f.items[0].code !== "");
    } else {
      // Editing - check if anything changed
      return JSON.stringify({...f, lang, discountEnabled, discountPercent}) !== JSON.stringify({...initialFormData, lang: invoice.lang, discountEnabled: invoice.discountEnabled, discountPercent: invoice.discountPercent});
    }
  }, [f, lang, discountEnabled, discountPercent, invoice, initialFormData]);

  // Notify parent when dirty state changes
  useEffect(() => {
    if (onDirtyChange) onDirtyChange(isDirty);
  }, [isDirty, onDirtyChange]);
  const switchLang = (newLang) => {
    setLang(newLang);
    setF(prev => ({...prev, lang: newLang, items: (Array.isArray(prev.items) ? prev.items : []).map(item => {
      const t = data.tariffs.find(t => t.code === item.code);
      return t ? {...item, description: descForLang(t, newLang)} : item;
    })}));
  };
  const clients = data.clients.filter(c => !c.archived);
  const subtotal = (Array.isArray(f.items) ? f.items : []).reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);
  const discountAmount = discountEnabled ? subtotal * (Math.min(100, Math.max(0, parseFloat(discountPercent) || 0)) / 100) : 0;
  const afterDiscount = subtotal - discountAmount;
  const vatRate = parseFloat(data.profile.vatPercent) || 0;
  const vatAmount = vatRate > 0 ? afterDiscount * (vatRate / 100) / (1 + vatRate / 100) : 0;
  const total = afterDiscount;

  // Auto-focus first code input when form opens
  useEffect(() => {
    setTimeout(() => {
      const firstCodeInput = document.querySelector('input[data-field="code"]');
      if (firstCodeInput) firstCodeInput.focus();
    }, 100);
  }, []);

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginBottom:16}}>
        <SearchSelect label={t("dentistName")} value={f.clientId} onChange={v=>s("clientId",v)} options={clients.map(c=>({value:c.id,label:c.name+(c.practice?" — "+c.practice:"")}))} placeholder="Type to search dentists..."/>
        <Input label={t("invoiceDate")} value={f.date} onChange={v=>s("date",v)} type="date"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 2fr 2fr 2fr",gap:12,marginBottom:16}}>
        <Select label={t("patTitle")} value={f.patientTitle} onChange={v=>s("patientTitle",v)} options={[{value:"Mr",label:"Mr"},{value:"Mrs",label:"Mrs"},{value:"Miss",label:"Miss"},{value:"Dr",label:"Dr"},{value:"Prof",label:"Prof"}]} placeholder="Select..." style={{}} title="Patient title — optional"/>
        <Input label={t("patSurname")} value={f.patientSurname} onChange={v=>s("patientSurname",v)} required placeholder="e.g. Smith" title="Patient surname — required"/>
        <Input label={t("patName")} value={f.patientName} onChange={v=>s("patientName",v)} placeholder="e.g. John" title="Patient first/given name — optional"/>
        <Input label={t("memberName")} value={f.memberName} onChange={v=>s("memberName",v)} placeholder="e.g. Main member" title="Medical aid member name — optional"/>
        <MedicalAidSelect label={t("medAid")} value={f.medicalAidName} onChange={v=>s("medicalAidName",v)} options={(data.medicalAids||[]).map(n=>({value:n,label:n}))}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:12,marginBottom:16}}>
        <Input label={t("medAidNo")} value={f.medicalAidNumber} onChange={v=>s("medicalAidNumber",v)} placeholder="e.g. 123456789" title="Medical aid member number — optional"/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
        <label style={{fontSize:13,fontWeight:600,color:"#374151"}}>{t("invoiceLang")}:</label>
        <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" name="invLang" value="en" checked={lang==="en"} onChange={()=>switchLang("en")}/> English</label>
        <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" name="invLang" value="af" checked={lang==="af"} onChange={()=>switchLang("af")}/> Afrikaans</label>
      </div>
      <div style={{marginBottom:16}}><LineItemEditor items={Array.isArray(f.items) ? f.items : []} setItems={updater=>setF(prev=>({...prev,items:typeof updater==='function'?updater(prev.items):updater}))} tariffs={data.tariffs} macros={data.macros} lang={lang}/></div>
      <Input label={t("clientNotes")} value={f.notes} onChange={v=>s("notes",v)} textarea rows={2} style={{marginBottom:16}}/>
      <div style={{borderTop:"1px solid #e5e7eb",paddingTop:12,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <label style={{fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <input type="checkbox" checked={discountEnabled} onChange={e=>{setDiscountEnabled(e.target.checked);if(e.target.checked&&!discountPercent)setDiscountPercent(15);}}/>
            <span>Discount</span>
          </label>
          {discountEnabled && (
            <input type="number" min="0" max="100" step="0.1" value={discountPercent} onChange={e=>setDiscountPercent(e.target.value)} style={{width:70,padding:"4px 8px",border:"1px solid #d1d5db",borderRadius:4,fontSize:13}} placeholder="%" title="Discount percentage (max 100%)"/>
          )}
          {discountEnabled && <span style={{fontSize:13,color:"#6b7280"}}>%</span>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,fontSize:14}}>
          <div style={{display:"flex",justifyContent:"space-between",width:250}}>
            <span>Subtotal:</span>
            <span>{fmt(subtotal)}</span>
          </div>
          {discountEnabled && (
            <div style={{display:"flex",justifyContent:"space-between",width:250,color:"#dc2626"}}>
              <span>Discount ({Math.min(100,Math.max(0,parseFloat(discountPercent)||0)).toFixed(1)}%):</span>
              <span>- {fmt(discountAmount)}</span>
            </div>
          )}
          {vatRate > 0 && (
            <div style={{display:"flex",justifyContent:"space-between",width:250,fontSize:12,color:"#6b7280"}}>
              <span>VAT at {vatRate}% included:</span>
              <span>{fmt(vatAmount)}</span>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",width:250,fontSize:18,fontWeight:700,borderTop:"1px solid #e5e7eb",paddingTop:4}}>
            <span>{t("invoiceTotal")}:</span>
            <span>{fmt(total)}</span>
          </div>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button className="btn btn-secondary" title="Discard changes and close" onClick={onCancel}>{t("cancel")}</button>
        <button className="btn btn-primary" title="Save this invoice" onClick={()=>onSave({...f,lang,total,discountEnabled,discountPercent:parseFloat(discountPercent)||15})} disabled={!f.clientId||!f.patientSurname?.trim()||f.items.length===0}>{t("save")} {t("nav_invoices").replace(/s$/,"")}</button>
      </div>
    </div>
  );
};

const Invoices = ({ data, setData }) => {
  const t = useT();
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [statusFilter, setStatusFilter] = useState("");
  const [showCopyModal, setShowCopyModal] = useState(false);
  const [copyingInvoice, setCopyingInvoice] = useState(null);
  const [formIsDirty, setFormIsDirty] = useState(false);
  const [sortConfig, setSortConfig] = useState({ field: 'number', direction: 'desc' });
  const [selectedRow, setSelectedRow] = useState(null);

  const handleSort = (field) => {
    setSortConfig(prev => {
      if (prev.field === field) {
        if (prev.direction === 'asc') return { field, direction: 'desc' };
        return { field: 'number', direction: 'desc' };
      }
      return { field, direction: 'asc' };
    });
  };

  const sorted = useMemo(() => {
    const q = search.toLowerCase();
    let filtered = [...data.invoices].filter(i => (i.clientName?.toLowerCase().includes(q) || String(i.number).includes(q)) && (!statusFilter||i.status===statusFilter));

    if (sortConfig.field && sortConfig.direction !== 'default') {
      filtered.sort((a, b) => {
        const field = sortConfig.field;
        const dir = sortConfig.direction === 'asc' ? 1 : -1;
        if (field === 'number') return dir * (a.number - b.number);
        else if (field === 'date') return dir * (a.date||"").localeCompare(b.date||"");
        else if (field === 'customer') return dir * (a.clientName||"").localeCompare(b.clientName||"");
        else if (field === 'patient') {
          const aName = `${a.patientSurname||""} ${a.patientName||""}`.trim();
          const bName = `${b.patientSurname||""} ${b.patientName||""}`.trim();
          return dir * aName.localeCompare(bName);
        }
        else if (field === 'total') return dir * ((a.total||0) - (b.total||0));
        else if (field === 'status') {
          const getStatusOrder = (inv) => {
            const ds = getInvoiceDisplayStatus(inv, data.payments||[]);
            const order = { 'unpaid': 1, 'partial': 2, 'paid': 3 };
            return order[ds] || 0;
          };
          return dir * (getStatusOrder(a) - getStatusOrder(b));
        }
        return 0;
      });
    }

    return filtered;
  }, [data.invoices, data.payments, search, statusFilter, sortConfig]);

  const save = (form) => {
    const client = data.clients.find(c => c.id===form.clientId);
    const clientName = client ? client.name+(client.practice?" — "+client.practice:"") : "";
    setData(prev => {
      if (editing) return {...prev, invoices: prev.invoices.map(i => i.id===editing.id ? {...editing,...form,clientName} : i)};
      return {...prev, invoices: [...prev.invoices, {...form,id:genId(),number:prev.nextInvoiceNo,clientName,status:"unpaid"}], nextInvoiceNo: prev.nextInvoiceNo+1};
    });
    setShowForm(false); setEditing(null);
  };

  const togglePaid = (inv) => {
    setData(prev => ({...prev, invoices: prev.invoices.map(i => i.id===inv.id ? {...i,status:i.status==="paid"?"unpaid":"paid",paidDate:i.status==="paid"?null:today()} : i)}));
  };

  const claimInvoice = async (inv) => {
    setData(prev => ({...prev, invoices: prev.invoices.map(i => i.id===inv.id ? {...i,claimed:true,claimedDate:today()} : i)}));
    const saved = await saveClaimPDF(inv, data);
    if (saved) {
      alert(`Invoice #${inv.number} marked as CLAIMED.\nPDF saved to "Send to Direct Claiming" folder.`);
    } else {
      alert(`Invoice #${inv.number} marked as CLAIMED.\n\nPDF was NOT saved to folder — no backup folder is set.\nTo enable auto-save: go to Settings → "Auto-Backup CSV Files" → Select Backup Folder.\nThe PDF will be saved inside a "Send to Direct Claiming" subfolder there.`);
    }
  };

  const unclaimInvoice = (inv) => {
    if (confirm(`Remove CLAIMED status from Invoice #${inv.number}?\nIt will reappear on the dentist's account statement.`)) {
      setData(prev => ({...prev, invoices: prev.invoices.map(i => i.id===inv.id ? {...i,claimed:false,claimedDate:null} : i)}));
    }
  };

  const copyInvoice = (inv, mode) => {
    setData(prev => {
      let refreshedItems = [];
      let patientTitle = "", patientSurname = "", patientName = "", memberName = "", medicalAidName = "", medicalAidNumber = "";
      let clientId = "", clientName = "", notes = "", lang = "en";

      if (mode === "all") {
        // Copy everything
        refreshedItems = inv.items.map(item => {
          const tr = prev.tariffs.find(t => t.code === item.code);
          return tr ? {...item, tariffCode: tr.tariffCode||tr.code, price: tr.price} : item;
        });
        clientId = inv.clientId;
        clientName = inv.clientName;
        patientTitle = inv.patientTitle;
        patientSurname = inv.patientSurname;
        patientName = inv.patientName;
        memberName = inv.memberName;
        medicalAidName = inv.medicalAidName;
        medicalAidNumber = inv.medicalAidNumber;
        lang = inv.lang;
        notes = inv.notes;
      } else if (mode === "patient") {
        // Copy patient & client info only (blank line items)
        refreshedItems = [];
        clientId = inv.clientId;
        clientName = inv.clientName;
        patientTitle = inv.patientTitle;
        patientSurname = inv.patientSurname;
        patientName = inv.patientName;
        memberName = inv.memberName;
        medicalAidName = inv.medicalAidName;
        medicalAidNumber = inv.medicalAidNumber;
        lang = inv.lang;
      } else if (mode === "detail") {
        // Copy line items only (blank patient info)
        refreshedItems = inv.items.map(item => {
          const tr = prev.tariffs.find(t => t.code === item.code);
          return tr ? {...item, tariffCode: tr.tariffCode||tr.code, price: tr.price} : item;
        });
        notes = inv.notes;
      }

      const newTotal = refreshedItems.reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);
      return {
        ...prev,
        invoices: [...prev.invoices, {id:genId(),number:prev.nextInvoiceNo,clientId,clientName,date:today(),items:refreshedItems,notes,total:newTotal,status:"unpaid",patientTitle,patientSurname,patientName,memberName,medicalAidName,medicalAidNumber,lang,claimed:false,claimedDate:null,estimateRef:null}],
        nextInvoiceNo: prev.nextInvoiceNo+1,
      };
    });
  };

  const openCopyModal = (inv) => {
    setCopyingInvoice(inv);
    setShowCopyModal(true);
  };

  const handleCopy = (mode) => {
    if (copyingInvoice) {
      copyInvoice(copyingInvoice, mode);
      setShowCopyModal(false);
      setCopyingInvoice(null);
    }
  };

  const handleContextMenu = (e, inv) => {
    e.preventDefault();
    openCopyModal(inv);
  };

  const saveAsMacro = (inv) => {
    const macroName = prompt("Enter a name for this macro:", `Invoice #${inv.number} Macro`);
    if (!macroName || !macroName.trim()) return;

    const macroCodes = inv.items
      .filter(item => item.code && item.code.trim())
      .map(item => ({
        code: item.code,
        qty: item.qty || 1
      }));

    if (macroCodes.length === 0) {
      alert("This invoice has no line items to save as a macro.");
      return;
    }

    setData(prev => ({
      ...prev,
      macros: [...prev.macros, {
        id: genId(),
        name: macroName.trim(),
        codes: macroCodes
      }]
    }));

    alert(`Macro "${macroName.trim()}" created with ${macroCodes.length} codes!`);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{fontSize:24,fontWeight:700,margin:0}}>{t("invoicesTitle")}</h1>
        <button className="btn btn-primary" title="Create a new invoice for a client" onClick={()=>{setEditing(null);setShowForm(true)}}><SvgIcon path={ICO.plus} size={16}/> {t("newInvoice")}</button>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:16}}>
        <input className="input-field" value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("search")+"..."} style={{flex:1}}/>
        <select className="input-field" title="Filter invoices by payment status" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{width:150,background:"var(--c-surface)"}}>
          <option value="">{t("allStatuses")}</option>
          <option value="unpaid">{t("unpaid")}</option>
          <option value="paid">{t("paid")}</option>
        </select>
      </div>

      {sorted.length===0 ? (
        <div style={{textAlign:"center",padding:"48px 0"}}>
          <p style={{color:"#9ca3af",fontSize:14,margin:"0 0 12px"}}>{t("noInvoices")}</p>
          <button className="btn btn-primary" title="Create a new invoice for a client" onClick={()=>setShowForm(true)}><SvgIcon path={ICO.plus} size={16}/> {t("newInvoice")}</button>
        </div>
      ) : (
        <div>
          <div className="card" style={{padding:0,overflow:"auto",marginBottom:selectedRow?12:0}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead style={{background:"var(--c-surface2)",borderBottom:"2px solid var(--c-border)"}}>
                <tr>
                  <SortableColumnHeader label="Invoice #" field="number" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Date" field="date" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Customer" field="customer" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Patient" field="patient" sortConfig={sortConfig} onSort={handleSort} />
                  <SortableColumnHeader label="Total" field="total" sortConfig={sortConfig} onSort={handleSort} align="right" />
                  <SortableColumnHeader label="Status" field="status" sortConfig={sortConfig} onSort={handleSort} />
                  <th style={{padding:"10px 16px",textAlign:"right",color:"var(--c-text2)",fontSize:12,fontWeight:600}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((inv) => {
                  const isSelected = selectedRow?.id === inv.id;
                  return (
                    <tr
                      key={inv.id}
                      onClick={()=>setSelectedRow(isSelected?null:inv)}
                      style={{
                        borderBottom:"1px solid var(--c-border2)",
                        cursor:"pointer",
                        background:isSelected?"var(--c-sel)":"transparent",
                        transition:"background 0.15s ease"
                      }}
                      onContextMenu={(e)=>handleContextMenu(e,inv)}
                    >
                      <td style={{padding:"10px 16px",fontWeight:700}}>#{inv.number}</td>
                      <td style={{padding:"10px 16px",color:"var(--c-text2)"}}>{fmtDate(inv.date)}</td>
                      <td style={{padding:"10px 16px"}}>{inv.clientName}</td>
                      <td style={{padding:"10px 16px",color:"var(--c-text2)"}}>
                        {(inv.patientSurname || inv.patientName) ? `${inv.patientSurname||""} ${inv.patientName||""}`.trim() : "—"}
                      </td>
                      <td style={{padding:"10px 16px",textAlign:"right",fontWeight:700}}>{fmt(inv.total)}</td>
                      <td style={{padding:"10px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                          {(()=>{const ds=getInvoiceDisplayStatus(inv,data.payments||[]);return <span className={"badge badge-"+(ds==="paid"?"green":ds==="partial"?"orange":"yellow")}>{ds}</span>;})()}
                          {inv.claimed && <span className="badge" style={{background:"#bfdbfe",color:"#1e40af",fontWeight:700}}>CLAIMED</span>}
                          {inv.estimateRef && <span className="badge badge-purple">Est #{inv.estimateRef}</span>}
                        </div>
                      </td>
                      <td style={{padding:"10px 16px",textAlign:"right"}}>
                        <div style={{display:"flex",gap:2,alignItems:"center",justifyContent:"flex-end"}} onClick={e=>e.stopPropagation()}>
                          {!inv.claimed
                            ? <button title="Submit directly to medical aid — removes from dentist account statement" onClick={()=>claimInvoice(inv)} style={{padding:"3px 8px",fontSize:11,fontWeight:700,background:"#2563eb",color:"white",border:"none",borderRadius:6,cursor:"pointer"}}>CLAIM</button>
                            : <button title="Remove direct claim status — invoice returns to dentist account" onClick={()=>unclaimInvoice(inv)} style={{padding:"3px 8px",fontSize:11,fontWeight:700,background:"#dbeafe",color:"#1e40af",border:"1px solid #93c5fd",borderRadius:6,cursor:"pointer"}}>UNCLAIM</button>
                          }
                          <button className="icon-btn" title="Print this invoice" onClick={()=>printDocument(inv,data,"invoice")}><SvgIcon path={ICO.printer} size={15} color="#6b7280"/></button>
                          <button className="icon-btn" title="Save this invoice as PDF (downloads immediately)" onClick={()=>savePDFDocument(inv,data,"invoice")}><SvgIcon path={ICO.download} size={15} color="#2563eb"/></button>
                          <button className="icon-btn" title="Send this invoice via WhatsApp to the client" onClick={()=>whatsappDocument(inv,data,"invoice")}><SvgIcon path={ICO.whatsapp} size={16} color="#25D366" filled/></button>
                          <button className="icon-btn" title={inv.status==="paid"?"Mark this invoice as unpaid":"Mark this invoice as paid"} onClick={()=>togglePaid(inv)}>
                            <SvgIcon path={ICO.check} size={15} color={inv.status==="paid"?"#d97706":"#059669"}/>
                          </button>
                          <button className="icon-btn" title="Copy as new invoice — choose what to copy" onClick={()=>openCopyModal(inv)}><SvgIcon path={ICO.copy} size={15} color="#6b7280"/></button>
                          <button className="icon-btn" title="Save this invoice as a reusable macro (uses current tariff prices)" onClick={()=>saveAsMacro(inv)}><SvgIcon path={ICO.sparkles} size={15} color="#8b5cf6"/></button>
                          <button className="icon-btn" title="Edit this invoice" onClick={()=>{setEditing(inv);setShowForm(true)}}><SvgIcon path={ICO.edit} size={15} color="#6b7280"/></button>
                          <button className="icon-btn" title="Delete this invoice permanently" onClick={()=>{if(confirm("Delete?"))setData(prev=>({...prev,invoices:prev.invoices.filter(x=>x.id!==inv.id)}))}}><SvgIcon path={ICO.trash} size={15} color="#ef4444"/></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {selectedRow && (
            <div className="card" style={{padding:"16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{fontSize:14,fontWeight:700,margin:0}}>Invoice #{selectedRow.number} — Line Items</h3>
                <button onClick={()=>setSelectedRow(null)} style={{padding:"4px 8px",fontSize:11,background:"var(--c-surface2)",border:"1px solid var(--c-border)",borderRadius:4,cursor:"pointer"}}>Close</button>
              </div>
              {selectedRow.items && selectedRow.items.length > 0 ? (
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{background:"var(--c-surface2)",borderBottom:"1px solid var(--c-border)"}}>
                    <th style={{padding:"6px 12px",textAlign:"left",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Code</th>
                    <th style={{padding:"6px 12px",textAlign:"left",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Description</th>
                    <th style={{padding:"6px 12px",textAlign:"right",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Qty</th>
                    <th style={{padding:"6px 12px",textAlign:"right",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Price</th>
                    <th style={{padding:"6px 12px",textAlign:"right",fontSize:11,fontWeight:600,color:"var(--c-text2)"}}>Total</th>
                  </tr></thead>
                  <tbody>
                    {selectedRow.items.map((item,idx) => (
                      <tr key={idx} style={{borderBottom:"1px solid var(--c-border2)"}}>
                        <td style={{padding:"6px 12px",fontFamily:"monospace",color:"#2563eb",fontWeight:600}}>{item.code}</td>
                        <td style={{padding:"6px 12px"}}>{item.description}</td>
                        <td style={{padding:"6px 12px",textAlign:"right"}}>{item.qty}</td>
                        <td style={{padding:"6px 12px",textAlign:"right"}}>{fmt(item.price)}</td>
                        <td style={{padding:"6px 12px",textAlign:"right",fontWeight:600}}>{fmt((parseFloat(item.qty)||0)*(parseFloat(item.price)||0))}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : (
                <p style={{color:"var(--c-text3)",fontSize:12,margin:0}}>No line items</p>
              )}
            </div>
          )}
        </div>
      )}

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onCloseAttempt={(proceed) => {
        if (formIsDirty) {
          if (confirm("You have unsaved changes. Discard changes and close?")) {
            proceed();
          }
        } else {
          proceed();
        }
      }} title={editing?`${t("edit")} Invoice #${editing.number}`:t("newInvoice")} wide>
        <InvoiceForm invoice={editing} data={data} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onDirtyChange={setFormIsDirty}/>
      </Modal>

      <CopyModal open={showCopyModal} onClose={()=>{setShowCopyModal(false);setCopyingInvoice(null)}} onCopy={handleCopy} type="Invoice"/>
    </div>
  );
};

// Try to read MedicalAids.csv from folder; returns array of names or null if file absent
const readMedicalAidsFromFolder = async (dirHandle) => {
  try {
    const fh = await dirHandle.getFileHandle("MedicalAids.csv");
    const text = await (await fh.getFile()).text();
    return parseMedicalAidsCSV(text);
  } catch (e) { return null; }
};

const AutoBackupCard = ({ data, setData }) => {
  const [folderName, setFolderName] = useState(_backupDirHandle?.name || null);
  const [status, setStatus] = useState("");
  const supported = typeof window.showDirectoryPicker === "function";

  // Load MedicalAids.csv from folder; create it if missing
  const syncMedicalAids = async (dirHandle) => {
    const names = await readMedicalAidsFromFolder(dirHandle);
    if (names && names.length > 0) {
      setData(prev => ({...prev, medicalAids: names}));
    } else {
      // File doesn't exist yet — create it from current data
      await writeBackupFile(dirHandle, "MedicalAids.csv", buildMedicalAidsCSV(data));
    }
  };

  const handlePick = async () => {
    const name = await pickBackupFolder();
    if (name) {
      setFolderName(name);
      setStatus("Folder selected! CSVs will auto-save here.");
      autoBackupCSVs(data);
      await syncMedicalAids(_backupDirHandle);
      setTimeout(() => setStatus(""), 3000);
    }
  };

  const handleClear = async () => {
    await clearBackupFolder();
    setFolderName(null);
    setStatus("Auto-backup disabled.");
    setTimeout(() => setStatus(""), 3000);
  };

  const downloadMedicalAids = () => {
    const blob = new Blob([buildMedicalAidsCSV(data)], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "MedicalAids.csv";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  };

  const handleManualBackup = async () => {
    if (!_backupDirHandle) return;
    setStatus("Saving...");
    try {
      // Encrypt JSON backup if password is set
      const password = getBackupPassword(data);
      const jsonContent = password
        ? await encryptBackup(JSON.stringify(data, null, 2), password)
        : JSON.stringify(data, null, 2);
      const jsonFilename = password ? "EasyDentalLab-backup.encrypted" : "EasyDentalLab-backup.json";

      await Promise.all([
        writeBackupFile(_backupDirHandle, "Clients.csv", buildClientsCSV(data)),
        writeBackupFile(_backupDirHandle, "Tariffs.csv", buildTariffsCSV(data)),
        writeBackupFile(_backupDirHandle, "Macros.csv", buildMacrosCSV(data)),
        writeBackupFile(_backupDirHandle, "MedicalAids.csv", buildMedicalAidsCSV(data)),
        writeBackupFile(_backupDirHandle, "Payments.csv", buildPaymentsCSV(data)),
        writeBackupFile(_backupDirHandle, jsonFilename, jsonContent),
      ]);
      setStatus(password ? "All files saved (backup encrypted)!" : "All files saved!");
    } catch(e) { setStatus("Save failed: " + e.message); }
    setTimeout(() => setStatus(""), 3000);
  };

  // On mount, check if handle was restored and sync MedicalAids.csv
  useEffect(() => {
    const check = async () => {
      if (_backupDirHandle) {
        setFolderName(_backupDirHandle.name);
        await syncMedicalAids(_backupDirHandle);
      }
    };
    const timer = setTimeout(check, 500);
    return () => clearTimeout(timer);
  }, []);

  if (!supported) {
    return (
      <div className="card" style={{padding:24,marginBottom:20}}>
        <h2 style={{fontSize:16,fontWeight:700,margin:"0 0 8px"}}>Auto-Backup &amp; Working Folder</h2>
        <div style={{padding:12,background:"#fef2f2",borderRadius:8,border:"1px solid #fca5a5"}}>
          <p style={{margin:0,fontSize:12,color:"#991b1b"}}>Auto-backup and Direct Claiming PDF save require Chrome or Edge browser. Your current browser does not support the File System Access API.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="card" style={{padding:24,marginBottom:20}}>
      <h2 style={{fontSize:16,fontWeight:700,margin:"0 0 8px"}}>Auto-Backup &amp; Working Folder</h2>
      <p style={{fontSize:13,color:"#6b7280",margin:"0 0 16px"}}>
        Select a working folder on your computer. The app will automatically save Clients.csv, Tariffs.csv, Macros.csv, <strong>MedicalAids.csv</strong> and a full JSON backup here every time data changes. Edit MedicalAids.csv in Excel to add or remove medical aids from the dropdown — the app reloads the list automatically when you reconnect the folder.
        <br/><strong style={{color:"#1e40af"}}>Also used for Direct Claiming:</strong> when you click CLAIM on an invoice, the PDF is saved to a <em>"Send to Direct Claiming"</em> subfolder inside this folder.
      </p>

      {folderName ? (
        <div>
          <div style={{padding:12,background:"#ecfdf5",borderRadius:8,border:"1px solid #6ee7b7",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <SvgIcon path={ICO.check} size={16} color="#059669"/>
            <span style={{fontSize:13,color:"#065f46"}}>Auto-backup active — saving to <strong>{folderName}</strong></span>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn btn-secondary btn-sm" onClick={handleManualBackup} title="Save all CSV files to the backup folder right now"><SvgIcon path={ICO.download} size={13}/> Save Now</button>
            <button className="btn btn-secondary btn-sm" onClick={handlePick} title="Select a different backup folder"><SvgIcon path={ICO.settings} size={13}/> Change Folder</button>
            <button className="btn btn-secondary btn-sm" onClick={downloadMedicalAids} title="Download MedicalAids.csv — edit in Excel to customise the medical aid dropdown list"><SvgIcon path={ICO.download} size={13}/> MedicalAids.csv</button>
            <button className="btn btn-secondary btn-sm" onClick={handleClear} title="Stop automatic CSV backups" style={{color:"#dc2626"}}><SvgIcon path={ICO.x} size={13}/> Disable</button>
          </div>
        </div>
      ) : (
        <div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
            <button className="btn btn-primary" onClick={handlePick} title="Select a folder where CSV files will be automatically saved">
              <SvgIcon path={ICO.upload} size={16}/> Select Backup Folder
            </button>
            <button className="btn btn-secondary" onClick={downloadMedicalAids} title="Download MedicalAids.csv — edit in Excel to customise the medical aid dropdown list"><SvgIcon path={ICO.download} size={16}/> MedicalAids.csv</button>
          </div>
          <p style={{fontSize:12,color:"#6b7280",margin:"0"}}>Pick the folder where your app lives (e.g. EasyDentalLab folder). The CSVs will be kept up to date automatically.</p>
        </div>
      )}

      {status && <p style={{fontSize:12,color:"#059669",margin:"8px 0 0",fontWeight:600}}>{status}</p>}
    </div>
  );
};
