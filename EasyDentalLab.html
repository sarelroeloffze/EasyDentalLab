const HelpSection = () => {
  const [open, setOpen] = useState(null);
  const toggle = (id) => setOpen(prev => prev === id ? null : id);

  const H = ({children}) => <p style={{fontWeight:600,margin:"12px 0 5px",color:"#111827"}}>{children}</p>;
  const P = ({children,style}) => <p style={{margin:"0 0 8px",...(style||{})}}>{children}</p>;
  const UL = ({children}) => <ul style={{paddingLeft:20,margin:"0 0 10px",lineHeight:1.85}}>{children}</ul>;
  const OL = ({children}) => <ol style={{paddingLeft:20,margin:"0 0 10px",lineHeight:1.85}}>{children}</ol>;

  const topics = [
    { id:"start", icon:"🚀", title:"Getting Started — First Time Setup", content: (<div>
      <P>Follow these steps when opening EasyDentalLab for the first time:</P>
      <OL>
        <li><strong>Fill in your Business Profile</strong> — go to Settings and enter your laboratory name, address, phone, email, VAT number, Laboratory Number and PCNS number. Click <em>Save Settings</em>.</li>
        <li><strong>Add your bank details</strong> — scroll to <em>Banking Details</em> and enter your bank name, account number and branch code. These print on every invoice.</li>
        <li><strong>Select a Working Folder</strong> — scroll to <em>Auto-Backup &amp; Working Folder</em> and click <em>Select Backup Folder</em>. Pick the folder where the app lives (e.g. the <em>EasyDentalLab</em> folder on your PC). This keeps CSV files and a full backup up to date automatically. It is also used for saving Direct Claiming PDFs.</li>
        <li><strong>Check your Tariff codes</strong> — go to <em>Tariffs</em>. A full set of South African dental lab codes is already loaded. Edit prices to match your current rate card.</li>
        <li><strong>Add your Dentists</strong> — go to <em>Dentist/Practice</em> and add each dental practice you work for.</li>
        <li><strong>Create Macros (optional)</strong> — go to <em>Macros</em> and group common tariff codes into device templates (e.g. "PFM Crown") for one-click invoice line item entry.</li>
        <li><strong>Create your first Invoice</strong> — go to <em>Invoices</em> and click <em>New Invoice</em>.</li>
      </OL>
    </div>) },

    { id:"dashboard", icon:"📊", title:"Dashboard", content: (<div>
      <P>The Dashboard gives you a live overview of your practice at a glance.</P>
      <UL>
        <li><strong>Active Dentists</strong> — number of dentist/practice records (not archived).</li>
        <li><strong>Tariffs / Macros</strong> — how many tariff codes and macro templates are loaded.</li>
        <li><strong>Invoices (month)</strong> — invoices created in the current calendar month.</li>
        <li><strong>Outstanding</strong> — total rand value of all unpaid invoices, excluding Direct Claimed invoices.</li>
      </UL>
      <P>The two panels at the bottom show your 5 most recent estimates and invoices.</P>
    </div>) },

    { id:"invoices", icon:"🧾", title:"Invoices — Creating, Editing & Managing", content: (<div>
      <H>Creating an Invoice</H>
      <OL>
        <li>Go to <em>Invoices</em> and click <em>New Invoice</em>.</li>
        <li>Select a <strong>Dentist</strong> from the dropdown (type to search).</li>
        <li>Enter <strong>Patient Surname</strong> and <strong>Patient Name</strong> — required for medical aid claims.</li>
        <li>Optionally fill in <strong>Medical Aid Name</strong> — click the field and scroll to select from the built-in list, or type to filter, or type a custom name and press <strong>Enter</strong> if it's not in the list. Also fill in Member Name and Membership number if applicable.</li>
        <li>Add line items — type a tariff code in the Code column and press <strong>Enter</strong> to confirm (or <strong>↓ Down Arrow</strong> to confirm + jump to a new line). The description and price fill in automatically. <strong>Keyboard navigation:</strong> Press <strong>↓ Down Arrow</strong> in any field to move to the same field in the next row (or add a new row if you're on the last row). Press <strong>↑ Up Arrow</strong> to move to the same field in the previous row. Or click <em>From Macro</em> to add a full device template in one click. If you add a code that already exists in the line items, the quantity will automatically increase instead of creating a duplicate row — a notification will confirm this. <strong>Line items automatically sort by code number in ascending order</strong> (0001, 0002, 8205…) as you add them.</li>
        <li>Choose <strong>English or Afrikaans</strong> — all descriptions switch language automatically.</li>
        <li>Click <em>Save Invoice</em>.</li>
      </OL>
      <H>Invoice Buttons (on each row)</H>
      <UL>
        <li><strong>🖨 Print</strong> — opens a print-ready A4 invoice in a new tab. Click <em>Print / Save as PDF</em> or press Ctrl+P / Cmd+P.</li>
        <li><strong>WhatsApp (green)</strong> — generates a PDF, downloads it, then opens WhatsApp Web with a pre-filled message. Attach the downloaded PDF before sending.</li>
        <li><strong>✓ Check mark</strong> — toggles the invoice between Paid (green) and Unpaid (yellow).</li>
        <li><strong>⧉ Copy</strong> — opens a modal with 3 copy options: <em>Copy All</em> (patient + line items with current prices), <em>Patient Only</em> (patient &amp; dentist info, blank line items), or <em>Detail Only</em> (line items with current prices, blank patient info). You can also <strong>right-click</strong> any invoice row to open this copy menu.</li>
        <li><strong>✏ Edit</strong> — reopens the form to change any detail.</li>
        <li><strong>🗑 Delete</strong> — permanently removes the invoice.</li>
        <li><strong style={{color:"#2563eb"}}>CLAIM</strong> — marks the invoice as a Direct Claim to medical aid. See the Direct Claiming section below.</li>
      </UL>
      <H>Invoice Status Badges</H>
      <UL>
        <li><strong style={{background:"#d1fae5",color:"#065f46",padding:"1px 6px",borderRadius:9999}}>paid</strong> — fully settled.</li>
        <li><strong style={{background:"#ffedd5",color:"#9a3412",padding:"1px 6px",borderRadius:9999}}>partial</strong> — a payment has been received but does not cover the full invoice. The remaining balance still appears in the dentist's age analysis.</li>
        <li><strong style={{background:"#fef3c7",color:"#92400e",padding:"1px 6px",borderRadius:9999}}>unpaid</strong> — no payment received yet.</li>
      </UL>
      <H>Discount Feature</H>
      <P>Apply a percentage discount to the invoice total before VAT calculation. Tick the <strong>Discount</strong> checkbox at the bottom of the form, then enter a percentage (default 15%, maximum 100%). The discount is deducted from the subtotal before VAT is calculated. The discount line appears on both the form and the printed invoice/PDF. When you convert an estimate to an invoice or copy an invoice, the discount is <strong>not</strong> carried over — each new invoice starts with no discount applied.</P>
      <H>Searching &amp; Filtering</H>
      <P>Type in the search box to filter by client name or invoice number. Use the status dropdown to show only Unpaid or Paid invoices.</P>
    </div>) },

    { id:"estimates", icon:"📋", title:"Estimates — Creating & Converting to Invoice", content: (<div>
      <P>Estimates are quotations sent to dentists before work begins. They work exactly like invoices but are clearly marked as estimates and are not tax invoices.</P>
      <H>Creating an Estimate</H>
      <OL>
        <li>Go to <em>Estimates</em> and click <em>New Estimate</em>.</li>
        <li>Fill in Dentist, patient details and line items — same as an invoice. <strong>Keyboard navigation:</strong> Press <strong>↓ Down Arrow</strong> in any field to move to the same field in the next row (or add a new row if you're on the last row). Press <strong>↑ Up Arrow</strong> to move to the same field in the previous row. In the Code field, <strong>↓ Down Arrow</strong> confirms the code and jumps to a new line.</li>
        <li>Optionally set a <strong>Valid Until</strong> date.</li>
        <li>Click <em>Save Estimate</em>. It is saved with status <em>Draft</em>.</li>
      </OL>
      <H>Converting to an Invoice</H>
      <P>Once the work is approved and completed, click the <strong>→ arrow button</strong> on the estimate. A new invoice is instantly created with all the same details (patient, items, medical aid, language). Prices are automatically updated to the <strong>current tariff rates</strong> at the time of conversion — not the prices when the estimate was originally created. The estimate is marked as <em>Invoiced</em>, and the invoice shows a reference back to the estimate number.</P>
      <H>Copying an Estimate</H>
      <P>Click the <strong>⧉ Copy button</strong> (or <strong>right-click</strong> the estimate row) to create a duplicate estimate. You'll see 3 options: <em>Copy All</em> (patient + line items with current prices), <em>Patient Only</em> (patient &amp; dentist info, blank line items), or <em>Detail Only</em> (line items with current prices, blank patient info). Useful for creating similar estimates for different patients or reusing tariff lists.</P>
      <H>Discount Feature</H>
      <P>Apply a percentage discount to the estimate total before VAT calculation. Tick the <strong>Discount</strong> checkbox at the bottom of the form, then enter a percentage (default 15%, maximum 100%). The discount is deducted from the subtotal before VAT is calculated. The discount line appears on both the form and the printed estimate/PDF. When you convert an estimate to an invoice or copy an estimate, the discount is <strong>not</strong> carried over — each new estimate/invoice starts with no discount applied.</P>
    </div>) },

    { id:"directclaim", icon:"🏥", title:"Direct Claiming — Submitting Directly to Medical Aid", content: (<div>
      <P>Direct Claiming is for invoices you submit <strong>directly to the medical aid</strong>, bypassing the dentist. When claimed:</P>
      <UL>
        <li>The invoice is <strong>removed from the dentist's account statement</strong> and age analysis — it no longer shows as money owed by the dentist.</li>
        <li>It stays in the <strong>Invoices list</strong> for your records, marked with a light-blue <em>CLAIMED</em> badge.</li>
        <li>It appears in the <strong>Direct Claimed</strong> page (sidebar), sorted by claim date.</li>
        <li>A PDF copy is <strong>automatically saved</strong> to a <em>"Send to Direct Claiming"</em> subfolder inside your working folder.</li>
      </UL>
      <H>How to Claim an Invoice</H>
      <OL>
        <li>First make sure you have a <strong>Working Folder</strong> set in Settings → <em>Auto-Backup &amp; Working Folder</em>.</li>
        <li>Go to <em>Invoices</em> and find the invoice to submit.</li>
        <li>Click the blue <strong>CLAIM</strong> button on that row.</li>
        <li>The invoice is immediately marked <em>CLAIMED</em> and removed from the dentist's statement. A PDF is saved to your folder.</li>
      </OL>
      <H>Reversing a Claim</H>
      <P>Click <strong>UNCLAIM</strong> on the invoice (in Invoices or on the Direct Claimed page) to restore it to the dentist's account.</P>
    </div>) },

    { id:"clients", icon:"👨‍⚕️", title:"Dentist/Practice — Managing Clients", content: (<div>
      <P>Each record represents a dental practice or dentist you work for.</P>
      <H>Key Fields</H>
      <UL>
        <li><strong>Dentist / Practice Name</strong> — required. Shown on invoices, statements and the age analysis.</li>
        <li><strong>Referring PCNS</strong> — the dentist's practice number. Printed on invoices — required for medical aid claims.</li>
        <li><strong>WhatsApp</strong> — if filled in, this number is used for WhatsApp invoice sending (instead of Phone).</li>
      </UL>
      <H>Receiving a Payment</H>
      <P>Click the <strong>+ Payment</strong> button on any dentist row to record a payment received.</P>
      <OL>
        <li>Enter the <strong>date</strong>, <strong>amount received</strong>, <strong>reference</strong> (e.g. EFT ref), and <strong>method</strong>.</li>
        <li>Outstanding invoices are listed oldest-first. The amount is <strong>auto-allocated</strong> to the oldest invoices first — you can adjust any allocation manually.</li>
        <li>Any amount not allocated to an invoice is saved as <strong>credit</strong> on the dentist's account and applied automatically next time.</li>
        <li>Choose the receipt method: <strong>Print</strong>, <strong>WhatsApp</strong>, or <strong>Both</strong> — a payment receipt is issued immediately.</li>
        <li>Click <em>Save &amp; Issue Receipt</em>.</li>
      </OL>
      <H>Editing a Payment</H>
      <P>Click the <strong>✏</strong> icon in the payment history panel to edit an existing payment. All invoice balances update automatically when you save.</P>
      <H>Payment History</H>
      <P>Click <strong>▼ Payment history</strong> under a dentist row to see all payments received. From there you can re-print or re-send any receipt via WhatsApp.</P>
      <H>Credit Balance</H>
      <P>If a dentist has paid more than their outstanding invoices, the excess is shown as a <strong style={{color:"#059669"}}>Credit</strong> badge in green. It is applied automatically in the next payment modal.</P>
      <H>Age Analysis (per dentist)</H>
      <P>Below each dentist you see their outstanding balance split into: <strong>Current</strong> (0–30 days), <strong>30 Days</strong> (31–60 days), and <strong>60+ Days</strong>. Amounts reflect the <em>remaining balance</em> after any payments — partial payments reduce the outstanding amount. Direct Claimed invoices are excluded.</P>
      <H>Printing a Statement</H>
      <P>If a dentist has an outstanding balance a <em>Statement</em> button appears. Click it to open a print-ready A4 account statement with all unpaid/partial invoices and an age analysis summary. Print with Ctrl+P / Cmd+P.</P>
      <H>CSV Import/Export</H>
      <P>Export all dentists to CSV, edit in Excel, and re-import to update the list. Columns: Name, Practice, Email, Phone, WhatsApp, Address, Webpage, Notes, ReferringPCNS.</P>
    </div>) },

    { id:"tariffs", icon:"🏷️", title:"Tariffs — Codes & Prices", content: (<div>
      <P>Tariffs are the billing codes used on invoices. A full set of South African dental lab codes is pre-loaded with English and Afrikaans descriptions.</P>
      <H>Editing Prices</H>
      <P>Click <strong>✏ Edit</strong> on any tariff to update its price. Prices are <strong>VAT-inclusive</strong>. Update prices at the start of each year when your rate card changes.</P>
      <H>Adding a Custom Code</H>
      <P>Click <em>Add Tariff</em> and fill in the code, description, Afrikaans description, category and price.</P>
      <H>Bulk Price Increase</H>
      <P>Use the <strong>Price Increase</strong> panel (just below the search bar) to raise prices across codes in one step at the start of each tariff year:</P>
      <OL>
        <li>Choose the <strong>scope</strong> from the first dropdown: <em>All Tariffs</em> to increase every tariff, or <em>'97' Codes Only</em> to increase only tariffs whose <strong>Tariff Code</strong> starts with <strong>97</strong>.</li>
        <li>Set the <strong>percentage</strong> — type it directly or click the chevron (▾) to pick a preset (1 %, 2 %, 5 %, 10 %, …).</li>
        <li>Click <em>Apply Increase</em> and confirm the prompt. Prices are updated immediately and rounded to 2 decimal places.</li>
        <li>If a backup folder is connected, <em>Tariffs.csv</em> is updated automatically within 2 seconds. Otherwise use <em>Export to CSV</em> after applying.</li>
      </OL>
      <H>User Code vs Tariff Code</H>
      <P>Each tariff has two separate codes:</P>
      <UL>
        <li><strong>User Code</strong> — your internal lab code, shown on printed invoices (e.g. <em>8201</em>). This is what you use day-to-day.</li>
        <li><strong>Tariff Code</strong> — the medical aid billing code submitted for direct claims (e.g. <em>9736</em>). If left blank it defaults to the User Code.</li>
      </UL>
      <P>In the tariff table, the Tariff Code is shown in <span style={{color:"#7c3aed",fontFamily:"monospace"}}>purple</span> when it differs from the User Code, and in grey when they are the same.</P>
      <P><strong>8000-series codes</strong> (User Codes starting with 8) are automatically assigned Tariff Code <strong>9736</strong> on first load — this is the standard South African dental lab billing rule for those procedures.</P>
      <P>On printed invoices and estimates, and in PDF output, the <strong>Tariff Code</strong> is always printed — never the User Code. The User Code is only used internally within EasyDentalLab for easy searching and identification.</P>
      <H>CSV Import/Export</H>
      <P>Export all tariffs to CSV, edit prices in bulk in Excel, and re-import. Columns: <strong>UserCode</strong>, TariffCode, Description, DescriptionAFR, Price, PrevYearPrice, Category, Measure.</P>
      <H>Afrikaans Descriptions</H>
      <P>When an invoice or estimate is set to Afrikaans, all descriptions switch automatically using the <em>DescriptionAFR</em> field. You can edit or add Afrikaans descriptions for any tariff.</P>
    </div>) },

    { id:"macros", icon:"⚡", title:"Macros — Device Templates for Quick Invoicing", content: (<div>
      <P>A Macro is a named group of tariff codes you can add to an invoice with one click — e.g. "PFM Crown" might include crown, try-in and shade codes.</P>
      <H>Creating a Macro</H>
      <OL>
        <li>Go to <em>Macros</em> and click <em>New Macro</em>.</li>
        <li>Give it a clear name (e.g. "Full Denture Upper &amp; Lower").</li>
        <li>Add codes one by one, adjusting quantities where needed. <strong>Codes automatically sort by number in ascending order</strong> (0001, 0002, 8205…) as you add them.</li>
        <li>Click <em>Save Macro</em>. Macros display in alphabetical order.</li>
      </OL>
      <H>Using a Macro on an Invoice or Estimate</H>
      <OL>
        <li>Open a new or existing invoice/estimate.</li>
        <li>In the line items section, click the purple <em>From Macro</em> button.</li>
        <li>Search or scroll to find your macro and click it.</li>
        <li>All codes and quantities are added instantly. You can still adjust quantities or remove lines.</li>
      </OL>
      <H>Multiple Macros &amp; Duplicate Code Consolidation</H>
      <P>If you add multiple macros that contain the same tariff codes, EasyDentalLab automatically <strong>consolidates duplicate codes</strong> — instead of creating separate rows, the quantities are added together on a single line. A subtle notification shows how many codes were added and how many were consolidated. This also works when manually adding tariff codes that already exist in the line items.</P>
      <P style={{fontSize:12,color:"#6b7280",fontStyle:"italic"}}>Example: Macro A has "0001 (PFM Crown) x2", Macro B has "0001 x1". After adding both, you'll see "0001 x3" on one row, not two separate rows.</P>
    </div>) },

    { id:"backup", icon:"💾", title:"Data, Backup & Restore", content: (<div>
      <P>All data is automatically saved in your browser's local storage on every change. It persists between sessions on the same computer and browser.</P>
      <H>Auto-Backup to Folder (Recommended)</H>
      <OL>
        <li>Go to Settings → <em>Auto-Backup &amp; Working Folder</em>.</li>
        <li>Click <em>Select Backup Folder</em> and choose the <em>EasyDentalLab</em> folder on your PC.</li>
        <li>The app automatically saves <em>Clients.csv</em>, <em>Tariffs.csv</em>, <em>Macros.csv</em> and <em>EasyDentalLab-backup.json</em> every 2 seconds after any change.</li>
        <li>Click <em>Save Now</em> to trigger an immediate backup at any time.</li>
      </OL>
      <H>Manual JSON Backup &amp; Restore</H>
      <UL>
        <li>Click <em>Export Backup</em> to download a full JSON file with all data.</li>
        <li>To restore: click <em>Import Backup</em>, select the JSON file and confirm. <strong>This replaces all current data.</strong></li>
      </UL>
      <H>Moving to a New Computer</H>
      <OL>
        <li>On the old computer: click <em>Export Backup</em> in Settings to download the JSON.</li>
        <li>Copy the JSON file to the new computer (e.g. via email or USB).</li>
        <li>Open the app in a browser on the new computer.</li>
        <li>Go to Settings → <em>Import Backup</em> and select the JSON file.</li>
      </OL>
    </div>) },

    { id:"printing", icon:"🖨️", title:"Printing, PDF & WhatsApp", content: (<div>
      <H>Printing an Invoice or Estimate</H>
      <OL>
        <li>Click the <strong>printer icon</strong> on any invoice, estimate or statement.</li>
        <li>A print-ready A4 document opens in a new browser tab.</li>
        <li>Click <em>Print / Save as PDF</em>, or press <strong>Ctrl+P</strong> (Windows) / <strong>Cmd+P</strong> (Mac).</li>
        <li>To save as PDF: set the destination to <em>Save as PDF</em> in the print dialog.</li>
        <li>Set margins to <em>None</em> in the print dialog for best results.</li>
      </OL>
      <H>Printing or Sending a Statement</H>
      <P>On the <em>Dentist/Practice</em> page, each dentist with an outstanding balance shows statement buttons next to their name. Which buttons appear depends on your settings (see Settings → <em>Statements &amp; Month-End</em>):</P>
      <UL>
        <li><strong>Print Statement</strong> — downloads the statement as a PDF (default) or opens the browser print dialog, depending on your Statement Format setting.</li>
        <li><strong>WhatsApp Statement</strong> (green button) — generates a PDF, downloads it, and opens WhatsApp Web pre-filled with the dentist's number. Attach the downloaded PDF before sending.</li>
      </UL>
      <H>Sending via WhatsApp</H>
      <OL>
        <li>Click the green <strong>WhatsApp icon</strong> on any invoice or estimate.</li>
        <li>A PDF is generated and <strong>automatically downloaded</strong> to your computer.</li>
        <li>WhatsApp Web opens in a new tab with a pre-filled message to the dentist's number.</li>
        <li>In WhatsApp, click the <strong>paperclip / attachment</strong> icon and select the downloaded PDF before sending.</li>
      </OL>
      <H>Medical Aid Name Dropdown</H>
      <P>The <strong>Medical Aid Name</strong> field on invoices and estimates is a searchable dropdown. Click the <strong>▼ arrow</strong> on the right of the field to open the list, or start typing to filter. To edit the list:</P>
      <OL>
        <li>Go to Settings → <em>Auto-Backup &amp; Working Folder</em> and click <strong>MedicalAids.csv</strong> to download the file.</li>
        <li>Open it in Excel — one name per row under the <em>Name</em> header. Add or remove names and save.</li>
        <li>Place the saved file in your working folder, then click <em>Select Backup Folder</em> (same folder) to reload — the new list loads instantly.</li>
      </OL>
      <P>You can also type a name not in the list and press <strong>Enter</strong> to use it as a custom entry.</P>
      <H>Number of Copies</H>
      <P>By default, clicking the print button opens a document with <strong>2 copies</strong> ready to print on one go. To change this, go to Settings → <em>Print Layout</em> → <strong>Invoice Print Copies</strong>. Set to <em>1</em> for a single copy, or any higher number you need.</P>
      <H>Customising Print Layout</H>
      <P>Go to Settings → <em>Print Layout</em> to: upload your logo; set logo position (left/centre/right) and max height; adjust font sizes; set invoice print copies; and edit footer and confirmation messages printed on every document.</P>
    </div>) },

    { id:"monthend", icon:"📅", title:"Month-End Statements & Batch Sending", content: (<div>
      <P>The <strong>Month-End</strong> feature lets you send statements to all dentists with outstanding balances in one go — by print or WhatsApp. Configure it in Settings → <em>Statements &amp; Month-End</em>.</P>
      <H>Settings</H>
      <UL>
        <li><strong>Statement Send Method</strong> — <em>Print only</em>, <em>WhatsApp only</em>, or <em>Both</em>. Controls which buttons appear on the Dentist/Practice page.</li>
        <li><strong>Statement Format (Print)</strong> — <em>PDF (download file)</em> saves a PDF to your Downloads folder. <em>Browser Print</em> opens the browser print dialog. PDF is recommended as it matches the invoice PDF quality.</li>
        <li><strong>Month-End Mode</strong> — <em>Per Dentist only</em> shows buttons per dentist but no batch button. <em>Batch only</em> shows a Month-End batch button in the header. <em>Both</em> shows everything.</li>
      </UL>
      <H>Using the Month-End Batch Button</H>
      <OL>
        <li>Go to <em>Dentist/Practice</em> and click the blue <strong>Month-End</strong> button in the top-right.</li>
        <li>A list of all dentists with outstanding balances appears, all pre-selected.</li>
        <li>Tick or untick dentists as needed. The count updates live.</li>
        <li>Click <strong>Download PDFs</strong> (or <em>Print All</em>) to generate statements for all selected dentists. PDFs download one by one.</li>
        <li>Click <strong>Send via WhatsApp</strong> to send a statement to each selected dentist — the app opens one WhatsApp tab per dentist in sequence.</li>
      </OL>
      <H>Per-Dentist Statements</H>
      <P>You can also send a statement to a single dentist directly from their row on the Dentist/Practice page — click <em>Print Statement</em> or the green <em>Statement</em> (WhatsApp) button next to their name.</P>
      <H>Notes</H>
      <UL>
        <li>Statements only include <strong>unpaid, non-claimed</strong> invoices. Paid and Direct Claimed invoices are excluded.</li>
        <li>When sending via WhatsApp, your browser may block pop-ups. Allow pop-ups for this page in your browser settings if WhatsApp does not open.</li>
        <li>The dentist's phone/WhatsApp number must be saved on their profile for the WhatsApp link to be pre-filled.</li>
      </UL>
    </div>) },

    { id:"vat", icon:"🧮", title:"VAT & How Calculations Work", content: (<div>
      <P>EasyDentalLab uses <strong>VAT-inclusive pricing</strong> — all tariff prices already include VAT. The amount the dentist pays is always the VAT-inclusive total.</P>
      <H>How Invoices and Estimates Show VAT</H>
      <P>The totals block on every printed invoice or estimate shows two lines:</P>
      <UL>
        <li><strong>Invoice/Estimate total (incl. VAT at X%)</strong> — the full VAT-inclusive amount the client pays (bold).</li>
        <li><strong>VAT at X% included</strong> — the VAT component extracted from the total, shown separately for reference.</li>
      </UL>
      <P>Example at 15%: line items totalling R115.00 → Invoice total R115.00, VAT included R15.00.</P>
      <H>Setting Your VAT Rate</H>
      <P>Go to Settings → Business Profile → <strong>VAT %</strong>. Set to <em>15</em> for South Africa's current rate. If not VAT-registered, set to <em>0</em> — the invoice will show the total with "(no VAT)" and no VAT line.</P>
    </div>) },

    { id:"numbering", icon:"🔢", title:"Document Numbering", content: (<div>
      <P>Invoice and estimate numbers are assigned automatically and count up by 1. You can set the starting number in Settings → <em>Document Numbering</em>.</P>
      <UL>
        <li>To start from a specific number (e.g. 1001), set <em>Next Invoice Number</em> to 1001 before creating the first invoice.</li>
        <li>To continue a sequence from a previous system, set the next number accordingly.</li>
        <li>Changing the number only affects new documents — existing invoices are unchanged.</li>
      </UL>
    </div>) },

    { id:"accounting", icon:"📒", title:"Accounting Export — Pastel & QuickBooks", content: (<div>
      <P>Export invoices for import into your accounting software from Settings → <em>Accounting Export</em>.</P>
      <H>Pastel (CSV)</H>
      <OL>

const SupportCard = ({ data }) => {
  const [supportText, setSupportText] = useState("");
  const [sent, setSent] = useState(false);

  const getPlatform = () => {
    if (!window.electronAPI) return "Web Browser";
    const p = window.electronAPI.platform;
    if (p === "darwin") return "macOS";
    if (p === "win32") return "Windows";
    if (p === "linux") return "Linux";
    return "Desktop";
  };

  const sendSupportWhatsapp = () => {
    const bizName = data.profile?.businessName || "Not set";
    const platform = getPlatform();
    const message = [
      `Hi Sarel,`,
      ``,
      `I need help with EasyDentalLab.`,
      ``,
      `Business: ${bizName}`,
      `Version:  v${APP_VERSION}`,
      `Platform: ${platform}`,
      ``,
      `Issue / Request:`,
      supportText.trim() || "(No details provided)",
    ].join("\n");

    const url = `https://wa.me/${SUPPORT_WHATSAPP}?text=${encodeURIComponent(message)}`;
    openExternalUrl(url);
    setSent(true);
    setSupportText("");
    setTimeout(() => setSent(false), 4000);
  };

  const sendSupportEmail = () => {
    const bizName = data.profile?.businessName || "Not set";
    const subject = encodeURIComponent(`EasyDentalLab Support — v${APP_VERSION}`);
    const body = encodeURIComponent([
      `Hi Sarel,`,
      ``,
      `Business: ${bizName}`,
      `Version:  v${APP_VERSION}`,
      ``,
      `Issue / Request:`,
      supportText.trim() || "(No details provided)",
    ].join("\n"));

    openExternalUrl(`mailto:${SUPPORT_EMAIL}?subject=${subject}&body=${body}`);
    setSent(true);
    setSupportText("");
    setTimeout(() => setSent(false), 4000);
  };

  return (
    <div className="card" style={{padding:24,marginBottom:20}}>
      <h2 style={{fontSize:16,fontWeight:700,margin:"0 0 8px"}}>📬 Support & Feedback</h2>
      <p style={{fontSize:13,color:"var(--c-text2)",margin:"0 0 12px"}}>
        Have a question, found a bug, or want a new feature?
        Send a message directly to the developer.
      </p>
      <textarea
        className="input-field"
        rows={4}
        value={supportText}
        onChange={e => setSupportText(e.target.value)}
        placeholder="Describe your issue or request…"
        style={{width:"100%",marginBottom:12,resize:"vertical",fontFamily:"inherit"}}
      />
      {sent ? (
        <p style={{color:"#059669",fontSize:13,fontWeight:600}}>✅ Opening — your message is ready to send!</p>
      ) : (
        <div style={{display:"flex",gap:8}}>
          <button className="btn-primary" onClick={sendSupportWhatsapp}>
            💬 Send via WhatsApp
          </button>
          <button className="btn-secondary" onClick={sendSupportEmail}>
            ✉️ Send via Email
          </button>
        </div>
      )}
      <p style={{color:"var(--c-text3)",fontSize:11,marginTop:8,margin:"8px 0 0"}}>
        Your message includes your app version and business name automatically.
      </p>
    </div>
  );
};

const Settings = ({ data, setData }) => {
  const t = useT();
  const [profile, setProfile] = useState(data.profile);
  const s = (k,v) => setProfile(p => ({...p,[k]:v}));
  const sL = (k,v) => setProfile(p => ({...p, layout: {...(INITIAL_DATA.profile.layout), ...(p.layout||{}), [k]:v}}));
  const layout = {...(INITIAL_DATA.profile.layout), ...(profile.layout||{})};
  const logoRef = useRef(null);
  const fileRef = useRef(null);
  const [exportFormat, setExportFormat] = useState("pastel");
  const [exportDateFrom, setExportDateFrom] = useState("");
  const [exportDateTo, setExportDateTo] = useState("");
  const [exportStatus, setExportStatus] = useState("");

  const saveProfile = () => { setData(prev => ({...prev, profile})); alert("Settings saved!"); };

  const exportInvoicesPastel = () => {
    const filtered = data.invoices.filter(i => {
      if (exportStatus && i.status !== exportStatus) return false;
      if (exportDateFrom && (i.date || "") < exportDateFrom) return false;
      if (exportDateTo && (i.date || "") > exportDateTo) return false;
      return true;
    });
    let csv = "Account,Date,Reference,Description,Tax Type,Debit,Credit\n";
    filtered.forEach(i => {
      const client = data.clients.find(c => c.id === i.clientId);
      const accountName = client?.name || i.clientName || "Unknown";
      const dateStr = i.date ? new Date(i.date + "T00:00:00").toLocaleDateString("en-ZA", {year:"numeric",month:"2-digit",day:"2-digit"}).split("/").join("/") : "";
      csv += `"${accountName}","${dateStr}","${i.number}","Invoice #${i.number}",${i.total},\n`;
    });
    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Pastel_Invoices_" + today() + ".csv";
    a.click();
  };

  const exportInvoicesQuickBooks = () => {
    const filtered = data.invoices.filter(i => {
      if (exportStatus && i.status !== exportStatus) return false;
      if (exportDateFrom && (i.date || "") < exportDateFrom) return false;
      if (exportDateTo && (i.date || "") > exportDateTo) return false;
      return true;
    });
    let iif = "!TRNS\tTRNSID\tTRNSTYPE\tDATE\tACCNT\tNAME\tAMOUNT\tDOCNUM\tMEMO\n";
    filtered.forEach(i => {
      const client = data.clients.find(c => c.id === i.clientId);
      const clientName = client?.name || i.clientName || "Unknown";
      const dateStr = i.date ? new Date(i.date + "T00:00:00").toLocaleDateString("en-US", {year:"numeric",month:"2-digit",day:"2-digit"}) : "";
      const itemDesc = (i.items || []).map(it => it.description || it.code).join("; ");
      iif += `TRNS\t\tINVOICE\t${dateStr}\tAccounts Receivable\t${clientName}\t${i.total}\t${i.number}\tInvoice #${i.number}\n`;
      iif += `SPL\t\tINVOICE\t${dateStr}\tSales\t${clientName}\t-${i.total}\t${i.number}\t${itemDesc}\n`;
      iif += `ENDTRNS\n`;
    });
    const blob = new Blob([iif], {type:"text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "QuickBooks_Invoices_" + today() + ".iif";
    a.click();
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "easydentallab-backup-" + today() + ".json";
    a.click();
  };

  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.clients && imported.tariffs) {
          if (confirm("Replace ALL current data with this backup?")) {
            const newData = {...INITIAL_DATA, ...imported};
            setData(newData);
            setProfile(newData.profile);
            alert("Data restored successfully!");
          }
        } else { alert("Invalid backup file."); }
      } catch { alert("Error reading file."); }
    };
    reader.readAsText(file);
  };

          <Input label={t("bizName")} value={profile.businessName} onChange={v=>s("businessName",v)}/>
          <Input label={t("owner")} value={profile.owner} onChange={v=>s("owner",v)}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <Input label={t("email")} value={profile.email} onChange={v=>s("email",v)}/>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>

          <Input label="Laboratory Number" value={profile.laboratory} onChange={v=>s("laboratory",v)} placeholder="e.g. LB3492" title="Your laboratory registration number — required for medical aid claims"/>
          <Input label="Laboratory PCNS" value={profile.practicePCNS} onChange={v=>s("practicePCNS",v)} placeholder="e.g. 0078256" title="Your Laboratory PCNS number — required for medical aid claims"/>
        </div>
        <div style={{marginTop:16}}><button className="btn btn-success" onClick={saveProfile}><SvgIcon path={ICO.check} size={16}/> {t("saveSettings")}</button></div>
      </div>

      <div className="card" style={{padding:24,marginBottom:20}}>

const DirectClaimed = ({ data, setData }) => {
  const t = useT();
  const [search, setSearch] = useState("");

  const claimed = useMemo(() => {
    const q = search.toLowerCase();
    return [...data.invoices]
      .filter(i => i.claimed && (i.clientName?.toLowerCase().includes(q) || String(i.number).includes(q) || (i.patientName||"").toLowerCase().includes(q) || (i.patientSurname||"").toLowerCase().includes(q)))
      .sort((a,b) => (b.claimedDate||b.date||"").localeCompare(a.claimedDate||a.date||""));
  }, [data.invoices, search]);

  const unclaimInvoice = (inv) => {
    if (confirm(`Remove CLAIMED status from Invoice #${inv.number}?\nIt will reappear on the dentist's account statement.`)) {
      setData(prev => ({...prev, invoices: prev.invoices.map(i => i.id===inv.id ? {...i,claimed:false,claimedDate:null} : i)}));
    }
  };

  const totalClaimed = useMemo(() => claimed.reduce((s,i) => s + (i.total != null ? i.total : (i.items||[]).reduce((a,x) => a + (parseFloat(x.qty)||0)*(parseFloat(x.price)||0), 0)), 0), [claimed]);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:700,margin:0}}>{t("dcTitle")}</h1>
          <p style={{fontSize:13,color:"#6b7280",margin:"4px 0 0"}}>Invoices submitted directly to medical aid — excluded from dentist account statements</p>
        </div>
        {claimed.length > 0 && (
          <div style={{textAlign:"right"}}>
            <p style={{margin:0,fontSize:11,color:"#6b7280",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{t("claimed")}</p>
            <p style={{margin:"2px 0 0",fontSize:22,fontWeight:700,color:"#1e40af"}}>{fmt(totalClaimed)}</p>
          </div>
        )}
      </div>

      <input className="input-field" value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("search")+"..."} style={{marginBottom:16}}/>

      {claimed.length === 0 ? (
        <div style={{textAlign:"center",padding:"64px 0"}}>
          <div style={{fontSize:40,marginBottom:12}}>🏥</div>
          <p style={{color:"#9ca3af",fontSize:14,margin:0}}>{t("noClaimedInv")}</p>
          <p style={{color:"#9ca3af",fontSize:13,margin:"4px 0 0"}}>Click the <strong style={{color:"#2563eb"}}>CLAIM</strong> button on an invoice to submit it directly to medical aid.</p>
        </div>
      ) : (
        <div className="card">
          {claimed.map((inv,i) => {
            const invTotal = inv.total != null ? inv.total : (inv.items||[]).reduce((s,x) => s + (parseFloat(x.qty)||0)*(parseFloat(x.price)||0), 0);
            return (
              <div key={inv.id} style={{padding:"12px 20px",borderBottom:i<claimed.length-1?"1px solid #f3f4f6":"none",display:"flex",justifyContent:"space-between",alignItems:"center",background:i%2===0?"#fafafa":"white"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:700}}>#{inv.number}</span>
                    <span className="badge" style={{background:"#bfdbfe",color:"#1e40af",fontWeight:700}}>CLAIMED</span>
                    {(()=>{const ds=getInvoiceDisplayStatus(inv,data.payments||[]);return <span className={"badge badge-"+(ds==="paid"?"green":ds==="partial"?"orange":"yellow")}>{ds}</span>;})()}
                  </div>
                  <p style={{margin:"3px 0 0",fontSize:13,color:"#4b5563",fontWeight:600}}>{inv.clientName}</p>
                  {(inv.patientName||inv.patientSurname) && <p style={{margin:"1px 0 0",fontSize:12,color:"#6b7280"}}>Patient: {inv.patientName} {inv.patientSurname}</p>}
                  <p style={{margin:"2px 0 0",fontSize:11,color:"#9ca3af"}}>
                    Invoice: {fmtDate(inv.date)}
                    {inv.claimedDate ? <span style={{marginLeft:8,color:"#1e40af",fontWeight:600}}>Claimed: {fmtDate(inv.claimedDate)}</span> : ""}
                    {" · "}{inv.items?.length||0} items
                  </p>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:15,fontWeight:700,color:"#111827"}}>{fmt(invTotal)}</span>

                    <button className="icon-btn" title="Print this invoice" onClick={()=>printDocument(inv,data,"invoice")}><SvgIcon path={ICO.printer} size={15} color="#6b7280"/></button>

const AiAssistant = ({ data, page, darkMode }) => {
  const [open, setOpen]       = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput]     = useState("");
  const [loading, setLoading] = useState(false);
  const [serverOk, setServerOk] = useState(null); // null=unchecked, true/false
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  const apiKey    = data.profile?.claudeApiKey  || "";
  const serverUrl = (data.profile?.claudeServerUrl || "http://localhost:5765").replace(/\/$/, "");

  // Scroll to bottom whenever messages change
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);
  // Focus input when panel opens
  useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 80); }, [open]);

  // Probe server status when panel opens
  useEffect(() => {
    if (!open) return;
    setServerOk(null);
    fetch(serverUrl + "/api/chat", { method: "OPTIONS" })
      .then(r => setServerOk(r.ok || r.status < 500))
      .catch(() => setServerOk(false));
  }, [open, serverUrl]);

  const buildSystemPrompt = () => {
    const p = data.profile || {};
    const tariffCount  = (data.tariffs  || []).length;
    const clientCount  = (data.clients  || []).length;
    const invoiceCount = (data.invoices || []).length;
    const pageNames = { dashboard:"Dashboard", invoices:"Invoices", estimates:"Estimates",
      directclaimed:"Direct Claimed", clients:"Dentist/Practice",
      tariffs:"Tariffs", macros:"Macros", settings:"Settings", help:"Help" };
    return `You are an AI assistant embedded inside EasyDentalLab — a South African dental laboratory management application.

Lab name: ${p.businessName || "EasyDentalLab"}
Owner: ${p.owner || ""}
VAT number: ${p.vatNumber || "not set"}   VAT %: ${p.vatPercent ?? 15}%
Current page the user is on: ${pageNames[page] || page}
Data loaded: ${tariffCount} tariff codes · ${clientCount} clients · ${invoiceCount} invoices

Your role:
• Help with South African medical aid billing, NHRPL tariff codes, ICD-10 codes, and dental lab workflows.
• Answer questions about using EasyDentalLab (invoices, estimates, direct claiming, tariff management, CSV imports).
• Help draft patient notes, invoice descriptions, or letters.
• Assist with VAT calculations and pricing queries.
• Be concise and practical. If the user writes in Afrikaans, reply in Afrikaans.
• Never expose the API key or server details.`;
  };

  const sendMessage = async () => {
    const text = input.trim();
    if (!text || loading) return;
    if (!apiKey) { alert("Add your Claude API key in Settings → AI Assistant first."); return; }
    if (!serverOk) { alert("AI server is not running. Start it with:\n\npython3 claude_server.py\n\nKeep that terminal window open."); return; }

    const newMessages = [...messages, { role: "user", content: text }];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    let assistantText = "";
    const placeholder = { role: "assistant", content: "" };
    setMessages([...newMessages, placeholder]);

    try {
      const resp = await fetch(serverUrl + "/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ apiKey, system: buildSystemPrompt(), messages: newMessages }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: "Server error " + resp.status }));
        throw new Error(err.error || "Server error");
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6);
          if (raw === "[DONE]") break;
          try {
            const obj = JSON.parse(raw);
            if (obj.error) throw new Error(obj.error);
            if (obj.text) {
              assistantText += obj.text;
              setMessages([...newMessages, { role: "assistant", content: assistantText }]);
            }
          } catch (e) { throw e; }
        }
      }
    } catch (e) {
      setMessages([...newMessages, { role: "assistant", content: "⚠️ " + e.message }]);
    } finally {
      setLoading(false);
    }
  };

  const onKey = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  // Simple markdown-lite renderer: **bold**, bullet lines, newlines
  const renderMd = (text) => {
    const lines = text.split("\n");
    return lines.map((line, i) => {
      const parts = line.split(/(\*\*[^*]+\*\*)/g).map((p, j) =>
        p.startsWith("**") ? <strong key={j}>{p.slice(2,-2)}</strong> : p
      );
      const isBullet = line.startsWith("- ") || line.startsWith("• ");
      if (isBullet) return <div key={i} style={{display:"flex",gap:6,marginBottom:2}}><span>•</span><span>{parts.slice(1)}</span></div>;
      return <div key={i} style={{marginBottom: line === "" ? 6 : 2}}>{parts}</div>;
    });
  };

  const statusDot = serverOk === null ? "#f59e0b" : serverOk ? "#10b981" : "#ef4444";
  const statusTip = serverOk === null ? "Checking server…" : serverOk ? "AI server connected" : "AI server offline — run: python3 claude_server.py";

  return (
    <>
      {/* Floating button */}
      <button
        onClick={() => setOpen(o => !o)}
        title="AI Assistant (Claude)"
        style={{position:"fixed",bottom:24,right:24,width:52,height:52,borderRadius:"50%",
          background:"linear-gradient(135deg,#2563eb,#7c3aed)",border:"none",cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(37,99,235,0.4)",
          zIndex:1000,transition:"transform 0.15s"}}
        onMouseOver={e=>e.currentTarget.style.transform="scale(1.1)"}
        onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}
      >
        <SvgIcon path={open ? ICO.x : ICO.sparkles} size={22} color="white"/>
        {/* server status dot */}
        <span style={{position:"absolute",top:3,right:3,width:10,height:10,borderRadius:"50%",
          background:statusDot,border:"2px solid white"}} title={statusTip}/>
      </button>

      {/* Chat panel */}
      {open && (
        <div style={{position:"fixed",top:0,right:0,bottom:0,width:380,
          background:"var(--c-surface)",borderLeft:"1px solid var(--c-border)",
          display:"flex",flexDirection:"column",zIndex:999,boxShadow:"-4px 0 20px rgba(0,0,0,0.15)"}}>

          {/* Header */}
          <div style={{padding:"12px 16px",borderBottom:"1px solid var(--c-border)",
            display:"flex",alignItems:"center",gap:10,background:"var(--c-surface)",flexShrink:0}}>
            <div style={{width:32,height:32,borderRadius:8,
              background:"linear-gradient(135deg,#2563eb,#7c3aed)",
              display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <SvgIcon path={ICO.sparkles} size={16} color="white"/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:"var(--c-text1)"}}>AI Assistant</div>
              <div style={{fontSize:11,color:statusDot,fontWeight:600}}>{statusTip}</div>
            </div>
            {messages.length > 0 &&
              <button className="icon-btn" title="Clear chat" onClick={()=>setMessages([])}
                style={{color:"var(--c-text4)",fontSize:11,padding:"3px 6px",borderRadius:6,border:"1px solid var(--c-border)"}}>
                Clear
              </button>
            }
            <button className="icon-btn" onClick={()=>setOpen(false)} style={{color:"var(--c-text3)"}}>
              <SvgIcon path={ICO.x} size={16}/>
            </button>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
            {messages.length === 0 && (
              <div style={{textAlign:"center",padding:"32px 16px"}}>
                <div style={{fontSize:32,marginBottom:12}}>✨</div>
                <p style={{fontSize:13,color:"var(--c-text3)",margin:"0 0 8px",fontWeight:600}}>
                  Ask me anything about your lab
                </p>
                {[
                  "What is tariff code 9301?",
                  "How do I direct claim an invoice?",
                  "Explain VAT-inclusive pricing",
                  "Draft a lab note for a PFM crown",
                ].map(s => (
                  <button key={s} onClick={()=>{ setInput(s); inputRef.current?.focus(); }}
                    style={{display:"block",width:"100%",textAlign:"left",margin:"4px 0",
                      padding:"7px 10px",borderRadius:8,border:"1px solid var(--c-border)",
                      background:"var(--c-surface2)",color:"var(--c-text2)",fontSize:12,cursor:"pointer"}}>
                    {s}
                  </button>
                ))}
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"85%",padding:"9px 12px",borderRadius:12,fontSize:13,lineHeight:1.55,
                  background:m.role==="user"?"#2563eb":"var(--c-surface2)",
                  color:m.role==="user"?"white":"var(--c-text1)",
                  borderBottomRightRadius:m.role==="user"?2:12,
                  borderBottomLeftRadius:m.role==="assistant"?2:12}}>
                  {m.role==="assistant" ? renderMd(m.content || "…") : m.content}
                </div>
              </div>
            ))}
            {loading && messages[messages.length-1]?.content === "" && (
              <div style={{display:"flex",gap:4,padding:"8px 12px"}}>
                {[0,1,2].map(i=>(
                  <span key={i} style={{width:7,height:7,borderRadius:"50%",background:"var(--c-text4)",
                    display:"inline-block",animation:`bounce 1s ${i*0.2}s infinite`}}/>
                ))}
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input */}
          <div style={{padding:"12px 16px",borderTop:"1px solid var(--c-border)",background:"var(--c-surface)",flexShrink:0}}>
            {!apiKey && (
              <div style={{padding:"6px 10px",marginBottom:8,background:"#fef3c7",borderRadius:6,
                border:"1px solid #fde68a",fontSize:11,color:"#92400e"}}>
                ⚠️ No API key — add it in <strong>Settings → AI Assistant</strong>
              </div>
            )}
            <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
              <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
                placeholder="Ask anything… (Enter to send, Shift+Enter for newline)"
                rows={2}
                style={{flex:1,resize:"none",padding:"8px 10px",borderRadius:8,border:"1px solid var(--c-border)",
                  background:"var(--c-surface2)",color:"var(--c-text1)",fontSize:13,lineHeight:1.4,
                  outline:"none",fontFamily:"inherit"}}/>
              <button onClick={sendMessage} disabled={!input.trim()||loading}
                style={{flexShrink:0,width:36,height:36,borderRadius:8,border:"none",cursor:"pointer",
                  background:input.trim()&&!loading?"#2563eb":"var(--c-border)",
                  display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
                <SvgIcon path={ICO.send} size={16} color={input.trim()&&!loading?"white":"var(--c-text4)"}/>
              </button>
            </div>
            <p style={{margin:"4px 0 0",fontSize:10,color:"var(--c-text4)"}}>
              Powered by Claude · context: {page}
            </p>
          </div>
        </div>
      )}
      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
    </>
  );
};

function LicenseEntryScreen({ error, onActivate }) {
  const [key, setKey] = React.useState("");
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(error || "");

  const activate = async () => {
    const k = key.trim();
    if (!k) { setMsg("Please paste your license key."); return; }
    if (!window.LicenseValidator) { setMsg("License module not loaded. Check that license/licenseValidator.js is present."); return; }
    setBusy(true); setMsg("");
    try {
      const result = await window.LicenseValidator.validate(k);
      if (result.valid) {
        window.LicenseValidator.saveLicense(k);
        onActivate();
      } else {
        setMsg(result.error || "Invalid license key.");
      }
    } catch (e) {
      setMsg("Error: " + e.message);
    }
    setBusy(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:40,width:480,maxWidth:"90vw",display:"flex",flexDirection:"column",gap:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,background:"#2563eb",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
          </div>
          <div>
            <div style={{fontSize:18,fontWeight:700,color:"#f1f5f9"}}>EasyDentalLab</div>
            <div style={{fontSize:12,color:"#94a3b8"}}>License activation required</div>
          </div>
        </div>
        <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.6,margin:0}}>
          Enter your license key to activate EasyDentalLab. Contact your administrator if you don't have a key.
        </p>
        <div>
          <label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:6}}>License Key</label>
          <textarea value={key} onChange={e=>setKey(e.target.value)}
            rows={3} placeholder="PAYLOAD_B64URL.SIGNATURE"
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",color:"#f1f5f9",fontSize:12,fontFamily:"Menlo,Consolas,monospace",resize:"vertical",outline:"none",boxSizing:"border-box"}}
            onKeyDown={e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); activate(); }}}
          />
        </div>
        {msg && <div style={{background:"#450a0a",border:"1px solid #991b1b",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#fca5a5"}}>{msg}</div>}
        <button onClick={activate} disabled={busy}
          style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"11px 0",fontSize:14,fontWeight:600,cursor:busy?"not-allowed":"pointer",opacity:busy?0.7:1}}>
          {busy ? "Verifying…" : "Activate License"}
        </button>
      </div>
    </div>
  );
}

function LockScreen() {
  const key = (localStorage.getItem("edl_license_key") || "");
  let email = "", expires = "";
  try {
    const p = JSON.parse(atob(key.split(".")[0].replace(/-/g,"+").replace(/_/g,"/")));
    email = p.email || ""; expires = p.expires || "";
  } catch {}
  return (
    <div style={{position:"fixed",inset:0,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{background:"#1e293b",border:"1px solid #991b1b",borderRadius:16,padding:40,width:480,maxWidth:"90vw",textAlign:"center",display:"flex",flexDirection:"column",gap:16,alignItems:"center"}}>
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#ef4444" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <div style={{fontSize:20,fontWeight:700,color:"#f1f5f9"}}>Trial Expired</div>
        <p style={{fontSize:14,color:"#94a3b8",lineHeight:1.6,margin:0}}>
          Your trial{expires ? " expired on " + expires : " has ended"}.
          {email ? <><br/>Licensed to: <span style={{color:"#cbd5e1"}}>{email}</span></> : ""}
        </p>
        <p style={{fontSize:13,color:"#64748b",margin:0}}>Contact your administrator to continue using EasyDentalLab.</p>
        <button onClick={()=>{ localStorage.removeItem("edl_license_key"); window.location.reload(); }}
          style={{background:"#334155",color:"#e2e8f0",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}}>
          Enter New License Key
        </button>
      </div>
    </div>
  );
}

function TrialBanner({ daysLeft }) {
  const [dismissed, setDismissed] = React.useState(false);
  if (dismissed) return null;
  const urgent = daysLeft <= 7;
  return (
    <div style={{background:urgent?"#450a0a":"#0c2340",borderBottom:urgent?"1px solid #991b1b":"1px solid #1e3a5f",padding:"6px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexShrink:0}}>
      <span style={{fontSize:12,color:urgent?"#fca5a5":"#93c5fd"}}>
        {urgent ? "⚠ " : ""}Trial active — expires in {daysLeft} day{daysLeft===1?"":"s"}. Contact your administrator to activate a full license.
      </span>
      <button onClick={()=>setDismissed(true)} style={{background:"none",border:"none",color:urgent?"#f87171":"#60a5fa",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 4px"}}>×</button>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState("dashboard");
  const [data, setData] = useState(loadData);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [darkMode, setDarkMode] = useState(() => {
    const saved = localStorage.getItem("edl_dark") === "1";
    if (saved) document.documentElement.classList.add("dark");
    return saved;
  });
  const [uiLang, setUiLang] = useState(() => localStorage.getItem("edl_ui_lang") || "en");
  const t = (key) => (window.UI_T[uiLang]?.[key] ?? window.UI_T.en[key] ?? key);
  const toggleLang = () => {
    const next = uiLang === "en" ? "af" : "en";
    setUiLang(next);
    localStorage.setItem("edl_ui_lang", next);
  };

  // ── Backup Toast Notifications ──────────────────────────────────────────────
  const [backupToast, setBackupToast] = useState(null); // {message, type: "error"|"success"}
  useEffect(() => {
    _showBackupToast = (message, type = "error") => {
      setBackupToast({ message, type });
      setTimeout(() => setBackupToast(null), 5000); // 5 seconds for errors
    };
    return () => { _showBackupToast = null; };
  }, []);

  // ── Multi-PC Sync: Reload data when folder sync completes ───────────────────
  useEffect(() => {
    const handleFolderSync = () => {
      console.log("📂 Folder sync detected - reloading data");
      setData(loadData());
    };
    window.addEventListener("folder-synced", handleFolderSync);
    return () => window.removeEventListener("folder-synced", handleFolderSync);
  }, []);

  // ── License ─────────────────────────────────────────────────────────────────
  const [licStatus, setLicStatus] = useState(null); // null=checking, else {status,type,daysLeft}
  useEffect(() => {
    if (!window.LicenseValidator) { setLicStatus({ status: "valid", type: "full" }); return; }
    window.LicenseValidator.getStatus().then(s => setLicStatus(s)).catch(() => setLicStatus({ status: "valid", type: "full" }));
  }, []);

  // Auto-save on every data change (useEffect ensures save always uses the committed state)
  useEffect(() => { saveData(data); }, [data]);
  useEffect(() => {
    document.documentElement.classList.toggle("dark", darkMode);
    localStorage.setItem("edl_dark", darkMode ? "1" : "0");
  }, [darkMode]);
  const setDataAndSave = useCallback((updater) => {
    setData(prev => typeof updater === "function" ? updater(prev) : updater);
  }, []);

  // Warn user if closing browser with pending backup
  useEffect(() => {
    const handleBeforeUnload = (e) => {
      if (_backupPending) {
        e.preventDefault();
        e.returnValue = "Backup is still in progress. Are you sure you want to leave?";
        return e.returnValue;
      }
    };
    window.addEventListener("beforeunload", handleBeforeUnload);
    return () => window.removeEventListener("beforeunload", handleBeforeUnload);
  }, []);

  const renderPage = () => {
    switch(page) {
      case "dashboard": return <Dashboard data={data}/>;
      case "clients": return <Clients data={data} setData={setDataAndSave}/>;
      case "tariffs": return <Tariffs data={data} setData={setDataAndSave}/>;
      case "macros": return <Macros data={data} setData={setDataAndSave}/>;
      case "estimates": return <Estimates data={data} setData={setDataAndSave} setPage={setPage}/>;
      case "invoices": return <Invoices data={data} setData={setDataAndSave}/>;
      case "directclaimed": return <DirectClaimed data={data} setData={setDataAndSave}/>;
      case "settings": return <Settings data={data} setData={setDataAndSave}/>;
      case "help": return <div style={{maxWidth:720}}><h1 style={{fontSize:24,fontWeight:700,margin:"0 0 4px"}}>{t("nav_help")} &amp; User Guide</h1><p style={{fontSize:13,color:"#6b7280",margin:"0 0 20px"}}>Everything you need to know about using EasyDentalLab</p><HelpSection /></div>;
      default: return <Dashboard data={data}/>;
    }
  };

  // License gate — render before main UI
  if (licStatus === null) return (
    <div style={{position:"fixed",inset:0,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <span style={{color:"#64748b",fontSize:14}}>Loading…</span>
    </div>
  );
  if (licStatus.status === "none" || licStatus.status === "invalid")
    return <LicenseEntryScreen error={licStatus.error} onActivate={()=>window.LicenseValidator.getStatus().then(s=>setLicStatus(s))}/>;
  if (licStatus.status === "expired")
    return <LockScreen/>;

  return (
    <LangContext.Provider value={uiLang}>
    <div style={{display:"flex",height:"100vh",background:"var(--c-bg)"}}>
      {/* Sidebar */}
      <div style={{width:sidebarOpen?220:64,background:"var(--c-sidebar)",borderRight:"1px solid var(--c-border)",display:"flex",flexDirection:"column",transition:"width 0.2s",flexShrink:0}}>
        <div style={{padding:16,borderBottom:"1px solid var(--c-border2)",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setSidebarOpen(!sidebarOpen)}>
          <div style={{width:32,height:32,background:"#2563eb",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:"white",fontWeight:700,fontSize:14}}>E</span>
          </div>
          {sidebarOpen && <span style={{fontSize:14,fontWeight:700,color:"var(--c-text1)"}}>EasyDentalLab</span>}
        </div>
        <nav style={{flex:1,padding:"8px 8px"}}>
          {NAV_IDS.map(item => (
            <button key={item.id} onClick={()=>setPage(item.id)}
              className={"sidebar-item" + (page===item.id?" active":"")}
              style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,border:"none",background:page===item.id?"var(--c-sel)":"transparent",cursor:"pointer",fontSize:13,fontWeight:page===item.id?600:500,color:page===item.id?(darkMode?"#93c5fd":"#1d4ed8"):"var(--c-text3)",marginBottom:2}}>
              <SvgIcon path={ICO[item.icon]} size={18} color={page===item.id?(darkMode?"#93c5fd":"#1d4ed8"):"var(--c-text3)"}/>
              {sidebarOpen && <span>{t(item.tk)}</span>}
            </button>
          ))}
        </nav>
        {sidebarOpen && <div style={{padding:12,borderTop:"1px solid var(--c-border2)"}}><p style={{margin:0,fontSize:11,color:"var(--c-text4)",textAlign:"center"}}>EasyDentalLab v{APP_VERSION}</p></div>}
      </div>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {licStatus.type === "trial" && licStatus.daysLeft != null && <TrialBanner daysLeft={licStatus.daysLeft}/>}
        {/* Top bar */}
        <div style={{flexShrink:0,background:"var(--c-sidebar)",borderBottom:"1px solid var(--c-border)",padding:"5px 20px",display:"flex",justifyContent:"flex-end",alignItems:"center",gap:8}}>
          {/* Language toggle */}
          <button onClick={toggleLang}
            style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,border:"1px solid var(--c-border)",background:"var(--c-surface2)",color:"var(--c-text2)",cursor:"pointer",letterSpacing:"0.05em"}}>
            {uiLang === "en" ? "AF" : "EN"}
          </button>
          <span style={{fontSize:11,color:"var(--c-text4)",marginLeft:4}}>{t(darkMode?"dark":"light")}</span>
          <button className="icon-btn" title={darkMode ? t("light") : t("dark")}
            onClick={() => setDarkMode(d => !d)}
            style={{color:"var(--c-text3)",padding:6}}>
            <SvgIcon path={darkMode ? ICO.sun : ICO.moon} size={18}/>
          </button>
          {/* Help menu */}
          <div style={{position:"relative"}}>
            <button className="icon-btn" title="Help & Version Info"
              onClick={() => setPage("help")}
              style={{color:"var(--c-text3)",padding:6}}>
              <SvgIcon path="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" size={18}/>
            </button>
            <div style={{
              position:"absolute",
              top:"100%",
              right:0,
              marginTop:4,
              background:"var(--c-surface)",
              border:"1px solid var(--c-border)",
              borderRadius:8,
              padding:"8px 12px",
              boxShadow:"0 4px 12px rgba(0,0,0,0.15)",
              fontSize:12,
              color:"var(--c-text2)",
              whiteSpace:"nowrap",
              pointerEvents:"none",
              opacity:0,
              transition:"opacity 0.2s"
            }}
            onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
            onMouseLeave={(e) => e.currentTarget.style.opacity = "0"}
            className="help-tooltip">
              <div style={{fontWeight:600,marginBottom:4}}>EasyDentalLab</div>
              <div style={{color:"var(--c-text3)"}}>Version {APP_VERSION}</div>
              <div style={{fontSize:10,color:"var(--c-text4)",marginTop:4}}>Click for full help guide</div>
            </div>
          </div>
        </div>

        {/* Tariff Update Notification */}
        {data._tariffUpdateAvailable && (
          <div style={{
            background:"#fef3c7",
            borderBottom:"1px solid #fbbf24",
            padding:"12px 24px",
            display:"flex",
            alignItems:"center",
            gap:12,
            justifyContent:"space-between"
          }}>
            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
              <SvgIcon path={ICO.info} size={20} color="#92400e"/>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#92400e"}}>
                  New tariff data available (v{data._oldVersion} → {APP_VERSION})
                </div>
                <div style={{fontSize:12,color:"#b45309"}}>
                  Updated tariff codes with fixes. Click "Update Now" to load the latest data.
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button
                onClick={() => {
                  if (confirm("Update tariffs to latest version?\n\nThis will replace your current tariff list with the updated default tariffs (including fixed Afrikaans descriptions).\n\nYour invoices, clients, and other data will NOT be affected.")) {
                    setData(prev => reloadDefaultTariffs(prev));
                    alert("Tariffs updated successfully!");
                  }
                }}
                style={{
                  background:"#92400e",
                  color:"white",
                  border:"none",
                  padding:"6px 14px",
                  borderRadius:6,
                  fontSize:12,
                  fontWeight:600,
                  cursor:"pointer"
                }}>
                Update Now
              </button>
              <button
                onClick={() => setData(prev => ({...prev, _tariffUpdateAvailable: false}))}
                style={{
                  background:"transparent",
                  color:"#92400e",
                  border:"1px solid #fbbf24",
                  padding:"6px 14px",
                  borderRadius:6,
                  fontSize:12,
                  fontWeight:600,
                  cursor:"pointer"
                }}>
                Dismiss
              </button>
            </div>
          </div>
        )}

        <div style={{flex:1,overflowY:"auto"}}>
          <div style={{maxWidth:960,margin:"0 auto",padding:24}}>
            {renderPage()}
          </div>
        </div>
      </div>
      <AiAssistant data={data} page={page} darkMode={darkMode}/>

      {/* Backup Toast Notifications */}
      {backupToast && (
        <div style={{
          position:"fixed",
          bottom:24,
          right:24,
          background:backupToast.type==="error"?"#991b1b":"#065f46",
          color:"white",
          padding:"14px 20px",
          borderRadius:8,
          boxShadow:"0 4px 12px rgba(0,0,0,0.25)",
          fontSize:13,
          fontWeight:500,
          zIndex:10000,
          maxWidth:400,
          animation:"slideIn 0.2s ease-out"
        }}>
          {backupToast.message}
        </div>
      )}
    </div>
    </LangContext.Provider>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
