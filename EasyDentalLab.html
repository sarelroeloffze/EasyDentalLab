                <SortableColumnHeader label="Phone" field="phone" sortConfig={sortConfig} onSort={handleSort} />
                <SortableColumnHeader label="Email" field="email" sortConfig={sortConfig} onSort={handleSort} />
                <SortableColumnHeader label="Outstanding" field="outstanding" sortConfig={sortConfig} onSort={handleSort} align="right" />
                <SortableColumnHeader label="Credit" field="credit" sortConfig={sortConfig} onSort={handleSort} align="right" />
                <th style={{padding:"10px 16px",textAlign:"right",color:"var(--c-text2)",fontSize:12,fontWeight:600}}>Actions</th>

                const clientPayments = [...(data.payments||[])].filter(p=>p.clientId===c.id).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
                const isExpanded = expandedPayments.has(c.id);

                    <tr style={{borderBottom:"1px solid var(--c-border2)",transition:"background 0.15s ease"}}>
                      <td style={{padding:"10px 16px",fontWeight:600}}>{c.name}</td>
                      <td style={{padding:"10px 16px",color:"var(--c-text2)"}}>{c.practice || "—"}</td>
                      <td style={{padding:"10px 16px",color:"var(--c-text2)",fontSize:12}}>{c.phone || "—"}</td>
                      <td style={{padding:"10px 16px",color:"var(--c-text2)",fontSize:12}}>{c.email || "—"}</td>

                              <span style={{color:aging.thirtyDays>0?"#92400e":"#6b7280"}}>{t("days30")}: <strong>{fmt(aging.thirtyDays)}</strong></span>
                              <span style={{color:aging.sixtyPlus>0?"#dc2626":"#6b7280"}}>{t("days60")}: <strong style={{color:aging.sixtyPlus>0?"#dc2626":"inherit"}}>{fmt(aging.sixtyPlus)}</strong></span>
                              <span style={{marginLeft:"auto",fontWeight:700,color:"#1a5276"}}>{t("total")}: {fmt(aging.total)}</span>

                                      </div>
                                      <div style={{display:"flex",gap:4}}>
                                        <button className="icon-btn" title="Edit this payment" onClick={()=>{setPaymentClient(c);setEditingPayment(pmt);}}><SvgIcon path={ICO.edit} size={13} color="#6b7280"/></button>
                                        <button className="icon-btn" title="Re-print receipt" onClick={()=>printReceipt(pmt, c, data)}><SvgIcon path={ICO.printer} size={13} color="#6b7280"/></button>
                                        <button className="icon-btn" title="Send receipt via WhatsApp" onClick={()=>whatsappReceipt(pmt, c, data)}><SvgIcon path={ICO.whatsapp} size={13} color="#25D366" filled/></button>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          )}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onCloseAttempt={(proceed) => {
        if (formIsDirty) {
          if (confirm("You have unsaved changes. Discard changes and close?")) {
            proceed();
          }
        } else {
          proceed();

      }} title={editing?t("edit")+" "+t("nav_clients"):t("newClient")}>
        <ClientForm client={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onDirtyChange={setFormIsDirty}/>
      </Modal>

      <Modal open={!!paymentClient} onClose={()=>{setPaymentClient(null);setEditingPayment(null);}} title={(editingPayment?"Edit Payment — ":"Receive Payment — ")+(paymentClient?.name||"")} wide>
        {paymentClient && <PaymentModal client={paymentClient} data={data} payment={editingPayment} onSave={savePayment} onCancel={()=>{setPaymentClient(null);setEditingPayment(null);}}/>}

      {/* Month-End batch modal */}
      <Modal open={showMonthEnd} onClose={()=>setShowMonthEnd(false)} title="Month-End — Send Statements" wide>
        <div>
          <p style={{fontSize:13,color:"var(--c-text2)",margin:"0 0 12px"}}>Dentists with outstanding balances. Select which to include, then print or send via WhatsApp.</p>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>setMeSelected(new Set(data.clients.filter(c=>!c.archived&&getClientAging(c.id,data.invoices,data.payments||[]).total>0).map(c=>c.id)))}>Select All</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setMeSelected(new Set())}>Deselect All</button>
          </div>
          <div style={{maxHeight:300,overflowY:"auto",border:"1px solid var(--c-border)",borderRadius:8,marginBottom:16}}>
            {data.clients.filter(c=>!c.archived&&getClientAging(c.id,data.invoices,data.payments||[]).total>0).map((c,i,arr)=>{
              const aging = getClientAging(c.id, data.invoices, data.payments||[]);
              return (
                <label key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 14px",borderBottom:i<arr.length-1?"1px solid var(--c-border2)":"none",cursor:"pointer",background:"var(--c-surface)"}}>
                  <input type="checkbox" checked={meSelected.has(c.id)} onChange={e=>{const s=new Set(meSelected); e.target.checked?s.add(c.id):s.delete(c.id); setMeSelected(s);}} style={{width:15,height:15}}/>
                  <div style={{flex:1}}>
                    <span style={{fontSize:13,fontWeight:600}}>{c.name}</span>
                    {c.practice && <span style={{fontSize:12,color:"var(--c-text3)"}}> — {c.practice}</span>}
                  </div>
                  <div style={{fontSize:12,textAlign:"right"}}>
                    <div style={{color:aging.sixtyPlus>0?"#dc2626":aging.thirtyDays>0?"#92400e":"#065f46",fontWeight:600}}>{fmt(aging.total)}</div>
                    {aging.sixtyPlus > 0 && <div style={{color:"#dc2626",fontSize:11}}>60+ days overdue</div>}
                  </div>
                </label>
              );
            })}
            {data.clients.filter(c=>!c.archived&&getClientAging(c.id,data.invoices,data.payments||[]).total>0).length === 0 && (
              <div style={{padding:"24px",textAlign:"center",color:"var(--c-text4)",fontSize:13}}>No outstanding balances.</div>
            )}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",borderTop:"1px solid var(--c-border)",paddingTop:12}}>
            <button className="btn btn-secondary" onClick={()=>setShowMonthEnd(false)}>Cancel</button>
            {showPrint && <button className="btn btn-secondary" title={stmtFormat==="pdf"?"Download PDF for each selected dentist":"Open combined browser print for all selected dentists"} onClick={batchPrintAll} disabled={meSelected.size===0} style={{borderColor:"#93c5fd",color:"#1e40af"}}><SvgIcon path={ICO.printer} size={15}/> {stmtFormat==="pdf"?"Download PDFs":"Print All"} ({meSelected.size})</button>}
            {showWA && <button className="btn btn-primary" title="Send statement via WhatsApp to each selected dentist" onClick={batchWhatsAppAll} disabled={meSelected.size===0} style={{background:"#16a34a"}}><SvgIcon path={ICO.whatsapp} size={15} color="white" filled/> Send via WhatsApp ({meSelected.size})</button>}
          </div>
        </div>
      </Modal>
    </div>
  );
};

const TariffForm = ({ tariff, categories, onSave, onCancel, onDirtyChange }) => {
  const t = useT();
  const initialFormData = tariff || { code:"", tariffCode:"", description:"", descriptionAFR:"", category:"", price:"", unit:"each" };
  const [f, setF] = useState(initialFormData);
  const s = (k,v) => setF(p => ({...p,[k]:v}));

  // Track if form has unsaved changes
  const isDirty = useMemo(() => {
    if (!tariff) {
      // New tariff - check if any data entered
      return f.code?.trim() !== "" ||
             f.tariffCode?.trim() !== "" ||
             f.description?.trim() !== "" ||
             f.descriptionAFR?.trim() !== "" ||
             f.category?.trim() !== "" ||
             f.price?.toString().trim() !== "" ||
             f.unit !== "each";
    } else {
      // Editing - check if anything changed
      return JSON.stringify(f) !== JSON.stringify(initialFormData);
    }
  }, [f, tariff, initialFormData]);

  // Notify parent when dirty state changes
  useEffect(() => {
    if (onDirtyChange) onDirtyChange(isDirty);
  }, [isDirty, onDirtyChange]);
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
        <Input label={t("userCode")} value={f.code} onChange={v=>s("code",v)} required placeholder="e.g. 8201"/>
        <Input label={t("tariffCode")} value={f.tariffCode} onChange={v=>s("tariffCode",v)} placeholder="e.g. 9736"/>
        <Select label={t("category")} value={f.category} onChange={v=>s("category",v)} options={categories.map(c=>({value:c,label:c}))} placeholder="Select..."/>
      </div>
      <Input label={t("description")} value={f.description} onChange={v=>s("description",v)} required placeholder="e.g. PFM Crown" style={{marginBottom:12}}/>
      <Input label={t("descriptionAFR")} value={f.descriptionAFR} onChange={v=>s("descriptionAFR",v)} placeholder="Afrikaanse beskrywing" style={{marginBottom:12}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <Input label={t("price")+" (R)"} value={f.price} onChange={v=>s("price",v)} type="number" placeholder="0.00"/>
        <Select label={t("measure")} value={f.unit} onChange={v=>s("unit",v)} options={[{value:"each",label:"Each"},{value:"per tooth",label:"Per Tooth"},{value:"per unit",label:"Per Unit"},{value:"per arch",label:"Per Arch"}]}/>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button className="btn btn-secondary" onClick={onCancel}>{t("cancel")}</button>
        <button className="btn btn-primary" onClick={()=>onSave({...f,id:f.id||genId(),price:parseFloat(f.price)||0,tariffCode:f.tariffCode||f.code})} disabled={!f.code?.trim()||!f.description?.trim()}>{t("save")}</button>
      </div>
    </div>
  );
};

const Tariffs = ({ data, setData }) => {
  const t = useT();
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showCat, setShowCat] = useState(false);
  const [newCat, setNewCat] = useState("");
  const [filterCat, setFilterCat] = useState("");
  const [pctValue, setPctValue] = useState("5");
  const [pctScope, setPctScope] = useState("all");
  const [pctOpen, setPctOpen] = useState(false);
  const [scopeOpen, setScopeOpen] = useState(false);
  const csvRef = useRef(null);
  const pctRef = useRef(null);
  const scopeRef = useRef(null);
  const [formIsDirty, setFormIsDirty] = useState(false);
  const [sortConfig, setSortConfig] = useState({ field: 'code', direction: 'asc' });

  const PCT_PRESETS = ["1","2","3","4","5","8","10","12","15","20"];
  const SCOPE_OPTIONS = [
    { value:"all",  label:t("allTariffs") },
    { value:"9700", label:t("codes97") },
  ];

  // Close scope/pct dropdowns on outside click
  useEffect(() => {
    const h = (e) => {
      if (pctRef.current   && !pctRef.current.contains(e.target))   setPctOpen(false);
      if (scopeRef.current && !scopeRef.current.contains(e.target)) setScopeOpen(false);
    };
    if (pctOpen || scopeOpen) document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [pctOpen, scopeOpen]);

  const applyIncrease = () => {
    const pct = parseFloat(pctValue);
    if (isNaN(pct) || pct <= 0) { alert("Enter a valid percentage greater than 0."); return; }
    const scopeLabel = pctScope === "all" ? "ALL tariff codes" : "'97' tariff codes only";
    const affectedCount = data.tariffs.filter(t => pctScope === "all" || (t.tariffCode || t.code || "").startsWith("97")).length;
    if (!confirm(`Increase prices by ${pct}% for ${scopeLabel}?\n\n${affectedCount} code(s) will be updated. This cannot be undone.`)) return;
    setData(prev => ({
      ...prev,
      tariffs: prev.tariffs.map(t => {
        const inScope = pctScope === "all" || (t.tariffCode || t.code || "").startsWith("97");
        if (!inScope) return t;
        const newPrice = Math.round((parseFloat(t.price) || 0) * (1 + pct / 100) * 100) / 100;
        return { ...t, price: newPrice };
      }),
    }));
  };

  const handleSort = (field) => {
    setSortConfig(prev => {
      if (prev.field === field) {
        if (prev.direction === 'asc') return { field, direction: 'desc' };
        return { field: 'code', direction: 'asc' };
      }
      return { field, direction: 'asc' };
    });
  };

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    let result = data.tariffs.filter(t => (t.code?.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q)) && (!filterCat || t.category===filterCat));

    if (sortConfig.field && sortConfig.direction !== 'default') {
      result.sort((a, b) => {
        const field = sortConfig.field;
        const dir = sortConfig.direction === 'asc' ? 1 : -1;
        if (field === 'code') return dir * (a.code||"").localeCompare(b.code||"", undefined, { numeric: true });
        else if (field === 'tariffCode') return dir * ((a.tariffCode||a.code)||"").localeCompare((b.tariffCode||b.code)||"", undefined, { numeric: true });
        else if (field === 'description') return dir * (a.description||"").localeCompare(b.description||"");
        else if (field === 'descriptionAFR') return dir * (a.descriptionAFR||"").localeCompare(b.descriptionAFR||"");
        else if (field === 'category') return dir * (a.category||"").localeCompare(b.category||"");
        else if (field === 'price') return dir * ((parseFloat(a.price)||0) - (parseFloat(b.price)||0));
        return 0;
      });
    }

    return result;
  }, [data.tariffs, search, filterCat, sortConfig]);

  const save = (tariff) => {
    setData(prev => {
      const exists = prev.tariffs.find(t => t.id === tariff.id);
      return {...prev, tariffs: exists ? prev.tariffs.map(t => t.id===tariff.id ? tariff : t) : [...prev.tariffs, tariff]};
    });
    setShowForm(false); setEditing(null);
  };

  const addCat = () => {
    if (newCat.trim() && !data.categories.includes(newCat.trim())) {
      setData(prev => ({...prev, categories: [...prev.categories, newCat.trim()].sort()}));
    }
    setNewCat(""); setShowCat(false);
  };

  // Load tariffs from CSV file
  const loadCSV = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const result = parseTariffCSV(ev.target.result);
      if (result.tariffs.length > 0) {
        if (confirm("Load " + result.tariffs.length + " tariff codes from CSV? This will replace all current tariffs.")) {
          setData(prev => ({...prev, tariffs: result.tariffs, categories: result.categories}));
          alert("Loaded " + result.tariffs.length + " tariff codes in " + result.categories.length + " categories!");
        }
      } else { alert("No tariff codes found in the CSV file. Make sure it has headers: UserCode,TariffCode,Description,DescriptionAFR,Price,PrevYearPrice,Category,Measure"); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Export tariffs to CSV (for editing in Excel)
  const exportCSV = () => {
    let csv = "UserCode,TariffCode,Description,DescriptionAFR,Price,PrevYearPrice,Category,Measure\n";
    data.tariffs.forEach(t => {
      const esc = (s) => '"' + (s||'').replace(/"/g,'""') + '"';
      csv += [esc(t.code), esc(t.tariffCode||t.code), esc(t.description), esc(t.descriptionAFR||''), t.price||0, t.prevPrice||0, esc(t.category), esc(t.measure||'each')].join(',') + '\n';
    });
    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Tariffs.csv";
    a.click();
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h1 style={{fontSize:24,fontWeight:700,margin:0}}>{t("tariffsTitle")}</h1>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowCat(true)}><SvgIcon path={ICO.tag} size={14}/> {t("category")}</button>
          <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowForm(true)}}><SvgIcon path={ICO.plus} size={16}/> {t("newTariff")}</button>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,padding:12,background:"#eaf2f8",borderRadius:8,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#1a5276",fontWeight:600}}>CSV:</span>
        <button className="btn btn-secondary btn-sm" onClick={()=>csvRef.current?.click()}><SvgIcon path={ICO.upload} size={13}/> {t("loadCSV")}</button>
        <button className="btn btn-secondary btn-sm" onClick={exportCSV}><SvgIcon path={ICO.download} size={13}/> {t("exportCSV")}</button>
        <input ref={csvRef} type="file" accept=".csv,.txt" onChange={loadCSV} style={{display:"none"}}/>
      </div>

      <div style={{display:"flex",gap:12,marginBottom:10}}>
        <input className="input-field" value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("search")+"..."} style={{flex:1}}/>
        <select className="input-field" value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:180,background:"var(--c-surface)"}}>
          <option value="">{t("allTariffs")}</option>
          {data.categories.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      {/* ── Price Increase Panel ── */}
      <div style={{marginBottom:16,padding:"10px 14px",background:"var(--c-surface2)",borderRadius:8,border:"1px solid var(--c-border)"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:600,color:"var(--c-text3)",flexShrink:0}}>{t("priceIncrease")}:</span>

        {/* Scope dropdown */}
        <div style={{position:"relative"}} ref={scopeRef}>
          <div onClick={()=>setScopeOpen(o=>!o)}

            <span style={{flex:1}}>{SCOPE_OPTIONS.find(o=>o.value===pctScope)?.label}</span>
            <SvgIcon path={ICO.chevronDown} size={14} color="var(--c-text3)"/>

            <div style={{position:"absolute",top:"100%",left:0,zIndex:200,background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",marginTop:4,minWidth:210}}>
              {SCOPE_OPTIONS.map(o => (
                <div key={o.value} onMouseDown={()=>{setPctScope(o.value);setScopeOpen(false);}}
                  style={{padding:"8px 14px",fontSize:13,cursor:"pointer",background:pctScope===o.value?"var(--c-sel)":"var(--c-surface)",borderBottom:"1px solid var(--c-border2)"}}
                  onMouseOver={e=>e.currentTarget.style.background="var(--c-surface2)"}

        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>

        <div style={{position:"relative"}} ref={pctRef}>

            <input value={pctValue} onChange={e=>setPctValue(e.target.value)}

              style={{width:52,padding:"5px 6px",border:"none",outline:"none",fontSize:13,fontWeight:600,background:"transparent",color:"var(--c-text1)",textAlign:"right"}}/>

              style={{padding:"0 7px",cursor:"pointer",display:"flex",alignItems:"center",color:"var(--c-text3)",borderLeft:"1px solid var(--c-border)",alignSelf:"stretch"}}>
              <SvgIcon path={ICO.chevronDown} size={14}/>

              {PCT_PRESETS.map(p => (
                <div key={p} onMouseDown={()=>{setPctValue(p);setPctOpen(false);}}
                  style={{padding:"6px 14px",fontSize:13,cursor:"pointer",background:pctValue===p?"var(--c-sel)":"var(--c-surface)",borderBottom:"1px solid var(--c-border2)"}}
                  onMouseOver={e=>e.currentTarget.style.background="var(--c-surface2)"}

                  {p}%
                </div>

        <button className="btn btn-primary btn-sm" onClick={applyIncrease} title="Increase prices by the selected percentage">
          {t("apply")} {t("priceIncrease")}
        </button>
      </div>{/* end controls row */}

      {filtered.length === 0 ? (
        <div style={{textAlign:"center",padding:"48px 0"}}>
          <p style={{color:"#9ca3af",fontSize:14,margin:"0 0 12px"}}>{t("noTariffs")}</p>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button className="btn btn-primary" title="Import tariff codes from a CSV file" onClick={()=>csvRef.current?.click()}><SvgIcon path={ICO.upload} size={16}/> Load CSV</button>
            <button className="btn btn-secondary" title="Manually add a new tariff code" onClick={()=>setShowForm(true)}><SvgIcon path={ICO.plus} size={16}/> Add Manually</button>
          </div>
        </div>
      ) : (
        <div className="card" style={{overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}}>
              <SortableColumnHeader label={t("userCode")} field="code" sortConfig={sortConfig} onSort={handleSort} />
              <SortableColumnHeader label={t("tariffCode")} field="tariffCode" sortConfig={sortConfig} onSort={handleSort} />
              <SortableColumnHeader label={t("description")} field="description" sortConfig={sortConfig} onSort={handleSort} />
              <SortableColumnHeader label={t("descriptionAFR")} field="descriptionAFR" sortConfig={sortConfig} onSort={handleSort} />
              <SortableColumnHeader label={t("category")} field="category" sortConfig={sortConfig} onSort={handleSort} />
              <SortableColumnHeader label={t("price")} field="price" sortConfig={sortConfig} onSort={handleSort} align="right" />
              <th style={{width:70}}></th>
            </tr></thead>
            <tbody>
              {filtered.map(t => (
                <tr key={t.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                  <td style={{padding:"8px 16px",fontSize:13,fontFamily:"monospace",color:"#2563eb",fontWeight:600}}>{t.code}</td>
                  <td style={{padding:"8px 12px",fontSize:12,fontFamily:"monospace",color:t.tariffCode&&t.tariffCode!==t.code?"#7c3aed":"#9ca3af",fontWeight:600}}>{t.tariffCode||t.code}</td>
                  <td style={{padding:"8px 16px",fontSize:13}}>{t.description}</td>
                  <td style={{padding:"8px 16px",fontSize:13,color:"#6b7280",fontStyle:"italic"}}>{t.descriptionAFR||"—"}</td>
                  <td style={{padding:"8px 16px"}}><span className="badge badge-gray">{t.category||"—"}</span></td>
                  <td style={{padding:"8px 16px",fontSize:13,fontWeight:600,textAlign:"right"}}>{fmt(t.price)}</td>
                  <td style={{padding:"8px 8px"}}>
                    <div style={{display:"flex",gap:2,justifyContent:"flex-end"}}>
                      <button className="icon-btn" title="Edit this tariff code and price" onClick={()=>{setEditing(t);setShowForm(true)}}><SvgIcon path={ICO.edit} size={14} color="#6b7280"/></button>
                      <button className="icon-btn" title="Delete this tariff code" onClick={()=>{if(confirm("Delete?"))setData(prev=>({...prev,tariffs:prev.tariffs.filter(x=>x.id!==t.id)}))}}><SvgIcon path={ICO.trash} size={14} color="#ef4444"/></button>

                </tr>

          </table>
        </div>

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onCloseAttempt={(proceed) => {
        if (formIsDirty) {
          if (confirm("You have unsaved changes. Discard changes and close?")) {
            proceed();
          }
        } else {
          proceed();
        }
      }} title={editing?t("edit")+" "+t("newTariff"):t("newTariff")}>
        <TariffForm tariff={editing} categories={data.categories} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);setFormIsDirty(false);}} onDirtyChange={setFormIsDirty}/>
      </Modal>

      <Modal open={showCat} onClose={()=>setShowCat(false)} title="Manage Categories">
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input className="input-field" value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="New category..." style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&addCat()}/>
          <button className="btn btn-primary" title="Add this category to the list" onClick={addCat} disabled={!newCat.trim()}>Add</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {data.categories.map(c => (
            <span key={c} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#f3f4f6",borderRadius:20,fontSize:13}}>
              {c}
              <button title="Remove this category" onClick={()=>setData(prev=>({...prev,categories:prev.categories.filter(x=>x!==c)}))} style={{border:"none",background:"none",cursor:"pointer",padding:0,display:"flex"}}><SvgIcon path={ICO.x} size={12} color="#9ca3af"/></button>
            </span>
          ))}
          {data.categories.length===0 && <p style={{color:"#9ca3af",fontSize:13}}>No categories yet. Add one above.</p>}
        </div>
      </Modal>
    </div>
  );
};

const MacroForm = ({ macro, tariffs, onSave, onCancel, onDirtyChange }) => {
  const tr = useT();
  const initialName = macro?.name || '';
  const initialCodes = macro?.codes || [];
  const [name, setName] = useState(initialName);
  const [codes, setCodes] = useState(initialCodes);
  const [showPicker, setShowPicker] = useState(false);
  const [tSearch, setTSearch] = useState('');

  // Track if form has unsaved changes
  const isDirty = useMemo(() => {
    if (!macro) {
      // New macro - check if any data entered
      return name.trim() !== '' || codes.length > 0;
    } else {
      // Editing - check if anything changed
      return name !== initialName || JSON.stringify(codes) !== JSON.stringify(initialCodes);
    }
  }, [name, codes, macro, initialName, initialCodes]);

  // Notify parent when dirty state changes
  useEffect(() => {
    if (onDirtyChange) onDirtyChange(isDirty);
  }, [isDirty, onDirtyChange]);

  const addCode = (t) => { setCodes([...codes, { code: t.code, qty: 1 }]); setShowPicker(false); setTSearch(''); };
  const updateCode = (idx, k, v) => setCodes(codes.map((c, i) => i === idx ? { ...c, [k]: v } : c));
  const removeCode = (idx) => setCodes(codes.filter((_, i) => i !== idx));

  const fTariffs = useMemo(() => {
    const q = tSearch.toLowerCase();
    return tariffs.filter(t => t.code?.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q));
  }, [tariffs, tSearch]);

  // Sort codes by code (ascending) for display - but keep original index for editing
  const sortedCodesWithIndex = useMemo(() => {
    return codes.map((c, idx) => ({ ...c, originalIndex: idx }))
                .sort((a, b) => {
                  const codeA = String(a.code || "").toLowerCase();
                  const codeB = String(b.code || "").toLowerCase();
                  return codeA.localeCompare(codeB, undefined, { numeric: true });
                });
  }, [codes]);

  return (
    <div>
      <Input label={tr("macroName")} value={name} onChange={setName} required placeholder="e.g. PFM Crown, Full Denture Upper" style={{ marginBottom: 16 }} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <h3 style={{ fontSize: 13, fontWeight: 700, color: "#374151", margin: 0 }}>{tr("tariffCode")}s</h3>
        <button className="btn btn-secondary btn-sm" title="Add a tariff code to this macro from the tariff list" onClick={() => setShowPicker(true)}><SvgIcon path={ICO.plus} size={13} /> {tr("add")} {tr("code")}</button>
      </div>
      {codes.length === 0 ? (
        <p style={{ textAlign: "center", padding: "20px 0", color: "#9ca3af", fontSize: 13 }}>No codes added. Click "Add Code" to select tariff codes.</p>
      ) : (
        <div style={{ border: "1px solid #e5e7eb", borderRadius: 8, overflow: "hidden", marginBottom: 16 }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#f9fafb" }}>
              <th style={{ padding: "6px 10px", fontSize: 11, fontWeight: 600, color: "#6b7280", textAlign: "left" }}>{tr("code")}</th>
              <th style={{ padding: "6px 10px", fontSize: 11, fontWeight: 600, color: "#6b7280", textAlign: "left" }}>{tr("description")}</th>
              <th style={{ padding: "6px 10px", fontSize: 11, fontWeight: 600, color: "#6b7280", textAlign: "right" }}>{tr("price")}</th>
              <th style={{ padding: "6px 10px", fontSize: 11, fontWeight: 600, color: "#6b7280", textAlign: "center", width: 70 }}>{tr("qty")}</th>
              <th style={{ width: 32 }}></th>
            </tr></thead>
            <tbody>
              {sortedCodesWithIndex.map((c) => {
                const idx = c.originalIndex;
                const t = tariffs.find(t => t.code === c.code);
                return (
                  <tr key={idx} style={{ borderTop: "1px solid #f3f4f6" }}>
                    <td style={{ padding: "6px 10px", fontSize: 13, fontFamily: "monospace", color: "#2563eb", fontWeight: 600 }}>{c.code}</td>
                    <td style={{ padding: "6px 10px", fontSize: 13 }}>{t?.description || "Unknown code"}</td>
                    <td style={{ padding: "6px 10px", fontSize: 13, textAlign: "right" }}>{t ? fmt(t.price) : "—"}</td>
                    <td style={{ padding: "4px 6px" }}><input className="input-field" title="Default quantity for this code in the macro" type="number" value={c.qty} onChange={e => updateCode(idx, "qty", parseInt(e.target.value) || 1)} min="1" style={{ padding: "4px 6px", fontSize: 12, textAlign: "center" }} /></td>
                    <td><button className="icon-btn" title="Remove this code from the macro" onClick={() => removeCode(idx)}><SvgIcon path={ICO.x} size={13} color="#ef4444" /></button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
        <button className="btn btn-secondary" title="Discard changes and close" onClick={onCancel}>{tr("cancel")}</button>
        <button className="btn btn-primary" title="Save this macro with its codes" onClick={() => onSave({ id: macro?.id || genId(), name, codes })} disabled={!name.trim() || codes.length === 0}>{tr("save")} {tr("newMacro")}</button>
      </div>

      <Modal open={showPicker} onClose={() => { setShowPicker(false); setTSearch(''); }} title="Select Tariff Code">
        <input className="input-field" value={tSearch} onChange={e => setTSearch(e.target.value)} placeholder="Search tariff codes..." style={{ marginBottom: 12 }} />
        <div style={{ maxHeight: 260, overflowY: "auto", border: "1px solid #e5e7eb", borderRadius: 8 }}>
          {fTariffs.map(t => (
            <button key={t.id} title="Click to add this code to the macro" onClick={() => addCode(t)} style={{ display: "flex", width: "100%", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", border: "none", borderBottom: "1px solid #f3f4f6", background: "none", cursor: "pointer", textAlign: "left" }}
              onMouseOver={e => e.currentTarget.style.background = "#eff6ff"} onMouseOut={e => e.currentTarget.style.background = "none"}>
              <div><span style={{ fontFamily: "monospace", fontSize: 13, color: "#2563eb", fontWeight: 600, marginRight: 8 }}>{t.code}</span><span style={{ fontSize: 13 }}>{t.description}</span></div>
              <span style={{ fontSize: 13, fontWeight: 600, color: "#374151" }}>{fmt(t.price)}</span>
            </button>
          ))}
          {fTariffs.length === 0 && <p style={{ textAlign: "center", padding: 24, color: "#9ca3af", fontSize: 13 }}>No matching tariffs</p>}
        </div>
      </Modal>
    </div>
  );
};

const Macros = ({ data, setData }) => {
  const t = useT();
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const csvRef = useRef(null);
  const [formIsDirty, setFormIsDirty] = useState(false);
  const [sortConfig, setSortConfig] = useState({ field: 'name', direction: 'asc' });

  const handleSort = (field) => {
    setSortConfig(prev => {
      if (prev.field === field) {
        if (prev.direction === 'asc') return { field, direction: 'desc' };
        return { field: 'name', direction: 'asc' };
      }
      return { field, direction: 'asc' };
    });
  };

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    let result = data.macros.filter(m => m.name?.toLowerCase().includes(q));

    if (sortConfig.field && sortConfig.direction !== 'default') {
      result.sort((a, b) => {
        const field = sortConfig.field;
        const dir = sortConfig.direction === 'asc' ? 1 : -1;
        if (field === 'name') return dir * (a.name||"").localeCompare(b.name||"");
        else if (field === 'codeCount') return dir * (a.codes.length - b.codes.length);
        else if (field === 'totalPrice') {
          const calcPrice = (m) => m.codes.reduce((s, c) => {
            const t = data.tariffs.find(t => t.code === c.code);
            return s + (t ? t.price * (c.qty || 1) : 0);
          }, 0);
          return dir * (calcPrice(a) - calcPrice(b));
        }
        return 0;
      });
    }

    return result;
  }, [data.macros, data.tariffs, search, sortConfig]);

  const save = (macro) => {
    setData(prev => {
      const exists = prev.macros.find(m => m.id === macro.id);
      return { ...prev, macros: exists ? prev.macros.map(m => m.id === macro.id ? macro : m) : [...prev.macros, macro] };
    });
    setShowForm(false); setEditing(null);
  };

  const loadCSV = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const macros = parseMacroCSV(ev.target.result);
      if (macros.length > 0) {
        if (confirm("Load " + macros.length + " macros from CSV? This will replace all current macros.")) {
          setData(prev => ({ ...prev, macros }));
          alert("Loaded " + macros.length + " macros!");
        }
      } else { alert("No macros found. CSV needs headers: MacroName,Code,Qty"); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const exportCSV = () => {
    let csv = "MacroName,Code,Qty\n";
    data.macros.forEach(m => {
      m.codes.forEach(c => {
        const esc = (s) => '"' + (s || '').replace(/"/g, '""') + '"';
        csv += [esc(m.name), esc(c.code), c.qty || 1].join(',') + '\n';
      });
    });
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Macros.csv";
    a.click();
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, margin: 0 }}>{t("macrosTitle")}</h1>
          <p style={{ fontSize: 13, color: "#6b7280", margin: "2px 0 0" }}>Device templates — predefined sets of tariff codes you can add to invoices in one click</p>
        </div>
        <button className="btn btn-primary" title="Create a new macro — define a device name and its tariff codes" onClick={() => { setEditing(null); setShowForm(true) }}><SvgIcon path={ICO.plus} size={16} /> {t("newMacro")}</button>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16, padding: 12, background: "#f5eef8", borderRadius: 8, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: "#5b21b6", fontWeight: 600 }}>CSV File:</span>
        <button className="btn btn-secondary btn-sm" title="Import macros from a CSV file (replaces current macros)" onClick={() => csvRef.current?.click()}><SvgIcon path={ICO.upload} size={13} /> {t("loadCSV")}</button>
        <button className="btn btn-secondary btn-sm" title="Download all macros as a CSV file to edit in Excel" onClick={exportCSV}><SvgIcon path={ICO.download} size={13} /> {t("exportCSV")}</button>
        <input ref={csvRef} type="file" accept=".csv,.txt" onChange={loadCSV} style={{ display: "none" }} />
        <span style={{ fontSize: 11, color: "#6b7280", marginLeft: 4 }}>Edit macros in Excel, then re-import to update</span>
      </div>

      <div style={{ marginBottom: 16 }}>
        <input className="input-field" value={search} onChange={e => setSearch(e.target.value)} placeholder={t("search")+"..."} />
      </div>

      {filtered.length === 0 ? (
        <div style={{ textAlign: "center", padding: "48px 0" }}>
          <p style={{ color: "#9ca3af", fontSize: 14, margin: "0 0 12px" }}>{t("noMacros")}</p>
          <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
            <button className="btn btn-primary" title="Import macros from a CSV file" onClick={() => csvRef.current?.click()}><SvgIcon path={ICO.upload} size={16} /> {t("loadCSV")}</button>
            <button className="btn btn-secondary" title="Create a new macro — define a device name and select tariff codes" onClick={() => setShowForm(true)}><SvgIcon path={ICO.plus} size={16} /> {t("newMacro")}</button>
          </div>
        </div>
      ) : (
        <div className="card" style={{padding:0,overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead style={{background:"var(--c-surface2)",borderBottom:"2px solid var(--c-border)"}}>
              <tr>
                <SortableColumnHeader label="Macro Name" field="name" sortConfig={sortConfig} onSort={handleSort} />
                <SortableColumnHeader label="Tariff Codes" field="codes" sortConfig={sortConfig} onSort={handleSort} />
                <SortableColumnHeader label="# Codes" field="codeCount" sortConfig={sortConfig} onSort={handleSort} align="right" />
                <SortableColumnHeader label="Total Price" field="totalPrice" sortConfig={sortConfig} onSort={handleSort} align="right" />
                <th style={{padding:"10px 16px",textAlign:"right",color:"var(--c-text2)",fontSize:12,fontWeight:600}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((m, i) => {
                const totalPrice = m.codes.reduce((s, c) => {
                  const t = data.tariffs.find(t => t.code === c.code);
                  return s + (t ? t.price * (c.qty || 1) : 0);
                }, 0);
                return (
                  <tr key={m.id} style={{borderBottom:"1px solid var(--c-border2)",transition:"background 0.15s ease"}}>
                    <td style={{padding:"10px 16px",fontWeight:700}}>{m.name}</td>
                    <td style={{padding:"10px 16px",color:"var(--c-text2)",fontSize:12,fontFamily:"monospace"}}>
                      {m.codes.map(c => c.code + (c.qty > 1 ? ' x' + c.qty : '')).join(', ')}
                    </td>
                    <td style={{padding:"10px 16px",textAlign:"right",color:"var(--c-text2)"}}>{m.codes.length}</td>
                    <td style={{padding:"10px 16px",textAlign:"right",fontWeight:700,color:"#5b21b6"}}>{fmt(totalPrice)}</td>
                    <td style={{padding:"10px 16px",textAlign:"right"}}>
                      <div style={{display:"flex",gap:2,alignItems:"center",justifyContent:"flex-end"}} onClick={e=>e.stopPropagation()}>
                        <button className="icon-btn" title="Edit this macro — change name, add/remove codes, adjust quantities" onClick={() => { setEditing(m); setShowForm(true) }}><SvgIcon path={ICO.edit} size={15} color="#6b7280" /></button>
                        <button className="icon-btn" title="Delete this macro permanently" onClick={() => { if (confirm("Delete this macro?")) setData(prev => ({ ...prev, macros: prev.macros.filter(x => x.id !== m.id) })) }}><SvgIcon path={ICO.trash} size={15} color="#ef4444" /></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      <Modal open={showForm} onClose={() => { setShowForm(false); setEditing(null); setFormIsDirty(false); }} onCloseAttempt={(proceed) => {
        if (formIsDirty) {
          if (confirm("You have unsaved changes. Discard changes and close?")) {
            proceed();
          }
        } else {
          proceed();
        }
      }} title={editing ? t("edit")+" "+t("newMacro") : t("newMacro")} wide>
        <MacroForm macro={editing} tariffs={data.tariffs} onSave={save} onCancel={() => { setShowForm(false); setEditing(null); setFormIsDirty(false); }} onDirtyChange={setFormIsDirty} />
      </Modal>
    </div>
  );
};

// LINE ITEM EDITOR
// ============================================================

const descForLang = (t, lang) => lang === "af" && t.descriptionAFR ? t.descriptionAFR : (t.description || t.code || "");

const LineItemEditor = ({ items, setItems, tariffs, macros, lang }) => {
  const [showPicker, setShowPicker] = useState(false);
  const [showMacroPicker, setShowMacroPicker] = useState(false);
  const [tSearch, setTSearch] = useState("");
  const [mSearch, setMSearch] = useState("");
  const [toast, setToast] = useState(null);

  // Show toast notification for 3 seconds
  const showToast = (message) => {
    setToast(message);
    setTimeout(() => setToast(null), 3000);
  };

  // Consolidate new items into existing items (merge quantities for duplicate codes)
  const consolidateItems = (currentItems, newItems) => {
    const consolidated = [...currentItems];
    let addedCount = 0;
    let mergedCount = 0;

    newItems.forEach(newItem => {
      const existingIndex = consolidated.findIndex(existing => existing.code === newItem.code);

      if (existingIndex >= 0) {
        // Duplicate found - increment quantity
        consolidated[existingIndex] = {
          ...consolidated[existingIndex],
          qty: (parseFloat(consolidated[existingIndex].qty) || 0) + (parseFloat(newItem.qty) || 0),
          // Update price and description to latest from tariffs
          price: newItem.price,
          description: newItem.description,
          tariffCode: newItem.tariffCode
        };
        mergedCount++;
      } else {
        // New code - add it
        consolidated.push(newItem);
        addedCount++;
      }
    });

    return { consolidated, addedCount, mergedCount };
  };

  const addBlank = () => {
    const id = genId();
    setItems(prev => [...prev, { id, code:"", description:"", qty:1, price:0 }]);
    return id;
  };

  const addTariff = (t) => {
    const newItem = { id:genId(), code:t.code, tariffCode:t.tariffCode||t.code, description:descForLang(t, lang), qty:1, price:t.price };
    const { consolidated, addedCount, mergedCount } = consolidateItems(items, [newItem]);
    setItems(consolidated);
    if (mergedCount > 0) {
      showToast(`Code ${t.code} already exists — quantity increased`);
    }
    setShowPicker(false);
    setTSearch("");
  };

  const addMacro = (macro) => {
    const newItems = macro.codes.map(c => {
      const t = tariffs.find(t => t.code === c.code);
      return { id: genId(), code: c.code, tariffCode: t?.tariffCode || c.code, description: t ? descForLang(t, lang) : c.code, qty: c.qty || 1, price: t?.price || 0 };
    });
    const { consolidated, addedCount, mergedCount } = consolidateItems(items, newItems);
    setItems(consolidated);

    // Show notification
    if (mergedCount > 0 && addedCount > 0) {
      showToast(`${addedCount} codes added, ${mergedCount} consolidated`);
    } else if (mergedCount > 0) {
      showToast(`${mergedCount} codes consolidated (quantities increased)`);
    } else if (addedCount > 0) {
      showToast(`${addedCount} codes added`);
    }

    setShowMacroPicker(false);
    setMSearch("");
  };

  const update = (id, k, v) => setItems(prev => prev.map(i => i.id===id ? {...i,[k]:v} : i));
  const multiUpdate = (id, fields) => {
    setItems(prev => prev.map(i => i.id===id ? {...i,...fields} : i));
  };
  const remove = (id) => setItems(prev => prev.filter(i => i.id!==id));

  const fTariffs = useMemo(() => {
    const q = tSearch.toLowerCase();
    return tariffs.filter(t => t.code?.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q));
  }, [tariffs, tSearch]);

  // Filter out empty items and sort by code (ascending) for display
  const sortedItems = useMemo(() => {
    // Remove items with no code (empty rows)
    const nonEmpty = items.filter(item => item.code && item.code.trim());
    // Sort by code
    const sorted = nonEmpty.sort((a, b) => {
      const codeA = String(a.code || "").toLowerCase();
      const codeB = String(b.code || "").toLowerCase();
      return codeA.localeCompare(codeB, undefined, { numeric: true });
    });
    // Always ensure at least one blank row for adding items
    if (sorted.length === 0 || sorted[sorted.length - 1].code.trim()) {
      sorted.push({ id: genId(), code: "", description: "", qty: 1, price: 0 });
    }
    return sorted;
  }, [items]);

  const subtotal = items.reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <h3 style={{fontSize:13,fontWeight:700,color:"#374151",margin:0}}>Line Items</h3>
        <div style={{display:"flex",gap:6}}>
          {macros && macros.length > 0 && <button className="btn btn-sm" title="Select a device macro to add all its tariff codes at once" style={{background:"#7c3aed",color:"white"}} onClick={()=>setShowMacroPicker(true)}><SvgIcon path={ICO.menu} size={13}/> From Macro</button>}
          <button className="btn btn-secondary btn-sm" title="Add a single tariff code from the tariff list" onClick={()=>setShowPicker(true)}><SvgIcon path={ICO.tag} size={13}/> From Tariff</button>
          <button className="btn btn-secondary btn-sm" title="Add a blank line item with custom description and price" onClick={addBlank}><SvgIcon path={ICO.plus} size={13}/> Custom</button>
        </div>
      </div>

      {items.length === 0 ? (
        <p style={{textAlign:"center",padding:"24px 0",color:"#9ca3af",fontSize:13}}>No items. Add from tariff codes or custom.</p>
      ) : (
        <div style={{border:"1px solid #e5e7eb",borderRadius:8,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#f9fafb"}}>
              <th style={{padding:"6px 8px",fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"left",width:90}}>Code</th>
              <th style={{padding:"6px 8px",fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"left"}}>Description</th>
              <th style={{padding:"6px 8px",fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"center",width:60}}>Qty</th>
              <th style={{padding:"6px 8px",fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"right",width:100}}>Price</th>
              <th style={{padding:"6px 8px",fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"right",width:100}}>Total</th>
              <th style={{width:32}}></th>
            </tr></thead>
            <tbody>
              {items.map((item, rowIdx) => (
                <tr key={item.id} style={{borderTop:"1px solid #f3f4f6"}}>
                  <td style={{padding:"4px 8px"}}><CodeInput value={item.code} onChange={v=>update(item.id,"code",v)} onSelect={t=>multiUpdate(item.id,{code:t.code,tariffCode:t.tariffCode||t.code,description:descForLang(t,lang),price:t.price,qty:"1"})} onAddLine={addBlank} tariffs={tariffs} rowId={item.id} inputStyle={{padding:"4px 6px",fontSize:12,fontFamily:"monospace"}}/></td>
                  <td style={{padding:"4px 8px"}}><input className="input-field" data-field="description" data-row={item.id} title="Item description — auto-filled from tariff or type your own" value={item.description} onChange={e=>update(item.id,"description",e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();const row=e.target.closest("tr");const qtyInput=row?.querySelector("input[type='number']");if(qtyInput)qtyInput.focus();}else if(e.key==="ArrowDown"){e.preventDefault();const row=e.target.closest("tr");const nextRow=row?.nextElementSibling;if(nextRow){const nextDesc=nextRow.querySelector("input[data-field='description']");if(nextDesc)nextDesc.focus();}else{addBlank();setTimeout(()=>{const table=e.target.closest("table");if(table){const allCode=table.querySelectorAll("input[data-field='code']");const last=allCode[allCode.length-1];if(last)last.focus();}},50);}}else if(e.key==="ArrowUp"){e.preventDefault();const row=e.target.closest("tr");const prevRow=row?.previousElementSibling;if(prevRow){const prevDesc=prevRow.querySelector("input[data-field='description']");if(prevDesc)prevDesc.focus();}}}} style={{padding:"4px 6px",fontSize:12}}/></td>
                  <td style={{padding:"4px 8px"}}><input className="input-field" title="Quantity" type="number" value={item.qty} onChange={e=>update(item.id,"qty",e.target.value)} min="1" onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();const row=e.target.closest("tr");const priceInput=row?.querySelectorAll("input[type='number']")[1];if(priceInput)priceInput.focus();}else if(e.key==="ArrowDown"){e.preventDefault();const row=e.target.closest("tr");const nextRow=row?.nextElementSibling;if(nextRow){const nextQty=nextRow.querySelectorAll("input[type='number']")[0];if(nextQty)nextQty.focus();}else{addBlank();setTimeout(()=>{const table=e.target.closest("table");if(table){const allCode=table.querySelectorAll("input[data-field='code']");const last=allCode[allCode.length-1];if(last)last.focus();}},50);}}else if(e.key==="ArrowUp"){e.preventDefault();const row=e.target.closest("tr");const prevRow=row?.previousElementSibling;if(prevRow){const prevQty=prevRow.querySelectorAll("input[type='number']")[0];if(prevQty)prevQty.focus();}}}} style={{padding:"4px 6px",fontSize:12,textAlign:"center"}}/></td>
                  <td style={{padding:"4px 8px"}}><input className="input-field" title="Unit price — auto-filled from tariff or type your own" type="number" value={item.price} onChange={e=>update(item.id,"price",e.target.value)} step="0.01" onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addBlank();setTimeout(()=>{const table=e.target.closest("table");if(table){const allCode=table.querySelectorAll("input[data-field='code']");const last=allCode[allCode.length-1];if(last)last.focus();}},50);}else if(e.key==="ArrowDown"){e.preventDefault();const row=e.target.closest("tr");const nextRow=row?.nextElementSibling;if(nextRow){const nextPrice=nextRow.querySelectorAll("input[type='number']")[1];if(nextPrice)nextPrice.focus();}else{addBlank();setTimeout(()=>{const table=e.target.closest("table");if(table){const allCode=table.querySelectorAll("input[data-field='code']");const last=allCode[allCode.length-1];if(last)last.focus();}},50);}}else if(e.key==="ArrowUp"){e.preventDefault();const row=e.target.closest("tr");const prevRow=row?.previousElementSibling;if(prevRow){const prevPrice=prevRow.querySelectorAll("input[type='number']")[1];if(prevPrice)prevPrice.focus();}}}} style={{padding:"4px 6px",fontSize:12,textAlign:"right"}}/></td>
                  <td style={{padding:"4px 8px",fontSize:12,fontWeight:600,textAlign:"right"}}>{fmt((parseFloat(item.qty)||0)*(parseFloat(item.price)||0))}</td>
                  <td><button className="icon-btn" title="Remove this line item" onClick={()=>remove(item.id)}><SvgIcon path={ICO.x} size={13} color="#ef4444"/></button></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{background:"#f9fafb",padding:"8px 12px",borderTop:"1px solid #e5e7eb",textAlign:"right"}}>
            <span style={{fontSize:13,fontWeight:700}}>Subtotal: {fmt(subtotal)}</span>
          </div>
        </div>
      )}

      <Modal open={showPicker} onClose={()=>{setShowPicker(false);setTSearch("")}} title="Select Tariff Code">
        <input className="input-field" value={tSearch} onChange={e=>setTSearch(e.target.value)} placeholder="Search tariff codes..." style={{marginBottom:12}}/>
        <div style={{maxHeight:260,overflowY:"auto",border:"1px solid #e5e7eb",borderRadius:8}}>
          {fTariffs.map(t => (
            <button key={t.id} title="Click to add this tariff code as a line item" onClick={()=>addTariff(t)} style={{display:"flex",width:"100%",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",border:"none",borderBottom:"1px solid #f3f4f6",background:"none",cursor:"pointer",textAlign:"left"}}
              onMouseOver={e=>e.currentTarget.style.background="#eff6ff"} onMouseOut={e=>e.currentTarget.style.background="none"}>
              <div><span style={{fontFamily:"monospace",fontSize:13,color:"#2563eb",fontWeight:600,marginRight:8}}>{t.code}</span><span style={{fontSize:13}}>{t.description}</span></div>
              <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{fmt(t.price)}</span>
            </button>
          ))}
          {fTariffs.length===0 && <p style={{textAlign:"center",padding:24,color:"#9ca3af",fontSize:13}}>No matching tariffs</p>}
        </div>
      </Modal>

      <Modal open={showMacroPicker} onClose={()=>{setShowMacroPicker(false);setMSearch("")}} title="Select Macro (Device Template)">
        <p style={{fontSize:12,color:"#6b7280",margin:"0 0 12px"}}>Selecting a macro will add all its tariff codes to the line items. You can still change quantities or add more items after.</p>
        <input className="input-field" value={mSearch} onChange={e=>setMSearch(e.target.value)} placeholder="Search macros..." style={{marginBottom:12}}/>
        <div style={{maxHeight:320,overflowY:"auto",border:"1px solid #e5e7eb",borderRadius:8}}>
          {(macros||[]).filter(m => m.name.toLowerCase().includes(mSearch.toLowerCase())).sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(m => {
            const totalPrice = m.codes.reduce((s,c) => { const t = tariffs.find(t => t.code === c.code); return s + (t ? t.price * (c.qty||1) : 0); }, 0);
            return (
              <button key={m.id} title="Click to add all codes from this macro to the line items" onClick={()=>addMacro(m)} style={{display:"block",width:"100%",padding:"12px 16px",border:"none",borderBottom:"1px solid #f3f4f6",background:"none",cursor:"pointer",textAlign:"left"}}
                onMouseOver={e=>e.currentTarget.style.background="#f5f3ff"} onMouseOut={e=>e.currentTarget.style.background="none"}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:14,fontWeight:700,color:"#5b21b6"}}>{m.name}</span>
                  <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{fmt(totalPrice)}</span>
                </div>
                <p style={{margin:"3px 0 0",fontSize:11,color:"#6b7280"}}>{m.codes.length} codes: {m.codes.map(c => c.code + (c.qty > 1 ? ' x'+c.qty : '')).join(', ')}</p>
              </button>
            );
          })}
          {(macros||[]).filter(m => m.name.toLowerCase().includes(mSearch.toLowerCase())).length===0 && <p style={{textAlign:"center",padding:24,color:"#9ca3af",fontSize:13}}>No matching macros</p>}
        </div>
      </Modal>

      {/* Toast notification */}
      {toast && (
        <div style={{position:"fixed",bottom:24,right:24,background:"#1f2937",color:"white",padding:"12px 20px",borderRadius:8,boxShadow:"0 4px 12px rgba(0,0,0,0.15)",fontSize:13,fontWeight:500,zIndex:10000,animation:"slideIn 0.2s ease-out"}}>
          {toast}
        </div>
      )}
    </div>
  );
};
