<script>
// ─── License Validator (inlined — Ed25519 asymmetric signature verification) ──
// To enforce licensing: replace PUBLIC_KEY_B64 with the key from keyGenerator.html
// While PUBLIC_KEY_B64 is the placeholder below, the app runs without any license check.
const LICENSE_PUBLIC_KEY_B64 = "REPLACE_WITH_PUBLIC_KEY_FROM_KEY_GENERATOR";
const LICENSE_VALIDATION_URL = "https://your-endpoint.com/api/validate";
const LICENSE_ONLINE_CHECK   = false;
const LICENSE_STORAGE_KEY    = "edl_license_key";

function _licB64ToBytes(b64){ const bin=atob(b64); return Uint8Array.from(bin,c=>c.charCodeAt(0)); }
function _licB64urlToBytes(s){ return _licB64ToBytes(s.replace(/-/g,"+").replace(/_/g,"/")); }
function _licPayloadToJson(s){ try{ return JSON.parse(atob(s.replace(/-/g,"+").replace(/_/g,"/"))); }catch{ return null; } }

window.LicenseValidator = {
  _cachedKey: null,
  async _publicKey(){
    if(this._cachedKey) return this._cachedKey;
    if(LICENSE_PUBLIC_KEY_B64==="REPLACE_WITH_PUBLIC_KEY_FROM_KEY_GENERATOR") throw new Error("Public key not configured.");
    const raw=_licB64ToBytes(LICENSE_PUBLIC_KEY_B64);
    this._cachedKey=await crypto.subtle.importKey("raw",raw,{name:"Ed25519"},false,["verify"]);
    return this._cachedKey;
  },
  async verify(licenseKey){
    if(!licenseKey||typeof licenseKey!=="string") return {valid:false,error:"No license key."};
    const parts=licenseKey.trim().split(".");
    if(parts.length!==2) return {valid:false,error:"Malformed license key."};
    const [p,s]=parts;
    const payload=_licPayloadToJson(p);
    if(!payload) return {valid:false,error:"License payload could not be decoded."};
    try{
      const ok=await crypto.subtle.verify({name:"Ed25519"},await this._publicKey(),_licB64urlToBytes(s),new TextEncoder().encode(p));
      if(!ok) return {valid:false,error:"Invalid license signature."};
    }catch(e){ return {valid:false,error:"Signature error: "+e.message}; }
    if(payload.expires){
      const exp=new Date(payload.expires); exp.setHours(23,59,59,999);
      if(Date.now()>exp.getTime()) return {valid:false,expired:true,payload,error:"License expired on "+payload.expires+"."};
    }
    return {valid:true,payload};
  },
  async validate(licenseKey){
    const local=await this.verify(licenseKey);
    if(!local.valid) return local;
    if(LICENSE_ONLINE_CHECK){
      try{
        const res=await fetch(LICENSE_VALIDATION_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:licenseKey}),signal:AbortSignal.timeout(5000)});
        if(res.ok){const d=await res.json(); if(!d.valid) return {valid:false,error:d.reason||"License revoked."};}
      }catch{}
    }
    return local;
  },
  async getStatus(){
    if(LICENSE_PUBLIC_KEY_B64==="REPLACE_WITH_PUBLIC_KEY_FROM_KEY_GENERATOR") return {status:"valid",type:"full"};
    const key=localStorage.getItem(LICENSE_STORAGE_KEY)||"";
    if(!key) return {status:"none"};
    const r=await this.validate(key);
    if(!r.valid) return {status:r.expired?"expired":"invalid",payload:r.payload,error:r.error};
    const type=r.payload.type||"full";
    let daysLeft=null;
    if(r.payload.expires){const e=new Date(r.payload.expires);e.setHours(23,59,59,999);daysLeft=Math.max(0,Math.ceil((e.getTime()-Date.now())/86400000));}
    return {status:"valid",type,daysLeft,payload:r.payload};
  },
  saveLicense(key){ localStorage.setItem(LICENSE_STORAGE_KEY,key.trim()); },
  clearLicense(){ localStorage.removeItem(LICENSE_STORAGE_KEY); },
};
</script>

// Parse CSV text into tariff objects
const parseTariffCSV = (csvText) => {
  const lines = csvText.trim().split('\n');
  if (lines.length < 2) return { tariffs: [], categories: [] };
  const hasAFR = lines[0].toLowerCase().includes('descriptionafr');
  const tariffs = [];
  const catSet = new Set();
  for (let i = 1; i < lines.length; i++) {
    // Simple CSV parse (handles commas inside quotes)
    const row = [];
    let field = '', inQuote = false;
    for (let c = 0; c < lines[i].length; c++) {
      const ch = lines[i][c];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { row.push(field.trim()); field = ''; }
      else { field += ch; }
    }
    row.push(field.trim());
    if (hasAFR) {
      // New format with DescriptionAFR column
      if (row.length >= 7 && row[0]) {
        const cat = row[6] || '';
        if (cat) catSet.add(cat);
        tariffs.push({
          id: 'csv_' + i,
          code: row[0],
          tariffCode: row[1] || row[0],
          description: row[2] || row[0],
          descriptionAFR: row[3] || '',
          price: parseFloat(row[4]) || 0,
          prevPrice: parseFloat(row[5]) || 0,
          category: cat,
          measure: row[7] || 'each',
          fromCSV: true,
        });
      }
    } else {
      // Old format without DescriptionAFR column - for backwards compatibility
      if (row.length >= 6 && row[0]) {
        const cat = row[5] || '';
        if (cat) catSet.add(cat);
        tariffs.push({
          id: 'csv_' + i,
          code: row[0],
          tariffCode: row[1] || row[0],
          description: row[2] || row[0],
          descriptionAFR: '',
          price: parseFloat(row[3]) || 0,
          prevPrice: parseFloat(row[4]) || 0,
          category: cat,
          measure: row[6] || 'each',
          fromCSV: true,
        });
      }
    }
  }
  return { tariffs, categories: [...catSet].sort() };
};

// Parse Clients CSV: Name,Practice,Email,Phone,WhatsApp,Address,Webpage,Notes,ReferringPCNS
const parseClientCSV = (csvText) => {
  const lines = csvText.trim().split('\n');
  if (lines.length < 2) return [];
  const clients = [];
  for (let i = 1; i < lines.length; i++) {
    const row = [];
    let field = '', inQuote = false;
    for (let c = 0; c < lines[i].length; c++) {
      const ch = lines[i][c];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { row.push(field.trim()); field = ''; }
      else { field += ch; }
    }
    row.push(field.trim());
    if (row.length >= 1 && row[0]) {
      clients.push({
        id: 'csv_c_' + i,
        name: row[0] || '',
        practice: row[1] || '',
        email: row[2] || '',
        phone: row[3] || '',
        whatsapp: row[4] || '',
        address: row[5] || '',
        webpage: row[6] || '',
        notes: row[7] || '',
        referringPCNS: row[8] || '',
      });
    }
  }
  return clients;
};

// Parse Macros CSV: MacroName,Code,Qty
const parseMacroCSV = (csvText) => {
  const lines = csvText.trim().split('\n');
  if (lines.length < 2) return [];
  const macroMap = {};
  for (let i = 1; i < lines.length; i++) {
    const row = [];
    let field = '', inQuote = false;
    for (let c = 0; c < lines[i].length; c++) {
      const ch = lines[i][c];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { row.push(field.trim()); field = ''; }
      else { field += ch; }
    }
    row.push(field.trim());
    if (row.length >= 2 && row[0]) {
      const name = row[0];
      if (!macroMap[name]) macroMap[name] = { id: 'macro_' + Object.keys(macroMap).length, name, codes: [] };
      macroMap[name].codes.push({ code: row[1] || '', qty: parseInt(row[2]) || 1 });
    }
  }
  return Object.values(macroMap);
};

const loadData = () => {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    const tariffResult = parseTariffCSV(EMBEDDED_TARIFFS_CSV);
    const embeddedClients = parseClientCSV(EMBEDDED_CLIENTS_CSV);
    const embeddedMacros = parseMacroCSV(EMBEDDED_MACROS_CSV);
    const embeddedMedicalAids = parseMedicalAidsCSV(EMBEDDED_MEDICAL_AIDS_CSV);
    if (saved) {
      const parsed = JSON.parse(saved);
      const merged = { ...INITIAL_DATA, ...parsed };

      // Update app version in data
      // Note: Upgrade notification removed in v2.3.33 - Tariffs.csv is now the source of truth
      // and loads automatically on startup, making the notification redundant
      merged.appVersion = APP_VERSION;

      // Ensure tariffs, clients, macros are never empty — reload from embedded CSV if missing
      if (!merged.tariffs || merged.tariffs.length === 0) { merged.tariffs = tariffResult.tariffs; merged.categories = tariffResult.categories; }
      else {
        // Backfill descriptionAFR from embedded CSV for tariffs saved before Afrikaans was added
        const embMap = {};
        tariffResult.tariffs.forEach(t => { embMap[t.code] = t; });
        merged.tariffs = merged.tariffs.map(t => {
          let updated = t;
          if (!updated.descriptionAFR && embMap[updated.code]?.descriptionAFR) {
            updated = {...updated, descriptionAFR: embMap[updated.code].descriptionAFR};
          }
          // Migrate: all 8xxx codes get tariffCode = "9736" if not already overridden
          if (updated.code && updated.code.startsWith("8") && (!updated.tariffCode || updated.tariffCode === updated.code)) {
            updated = {...updated, tariffCode: "9736"};
          }
          return updated;
        });
      }
      if (!merged.clients || merged.clients.length === 0) { merged.clients = embeddedClients; }
      if (!merged.macros || merged.macros.length === 0) { merged.macros = embeddedMacros; }
      if (!merged.categories || merged.categories.length === 0) { merged.categories = tariffResult.categories; }
      if (!merged.medicalAids || merged.medicalAids.length === 0) { merged.medicalAids = embeddedMedicalAids; }
      if (!merged.payments) merged.payments = [];
      return merged;
    }
    // First run: load embedded CSV data (apply 8xxx migration)
    return {
      ...INITIAL_DATA,
      tariffs: tariffResult.tariffs.map(t =>
        (t.code && t.code.startsWith("8") && (!t.tariffCode || t.tariffCode === t.code))
          ? {...t, tariffCode: "9736"} : t
      ),
      categories: tariffResult.categories,
      clients: embeddedClients,
      macros: embeddedMacros,
      medicalAids: embeddedMedicalAids,
    };
  } catch (e) { console.warn("Failed to load data:", e); }
  return INITIAL_DATA;
};

// Helper: read Tariffs.csv from folder
const readTariffsFromFolder = async (dirHandle) => {
  try {
    const fh = await dirHandle.getFileHandle("Tariffs.csv");
    const text = await (await fh.getFile()).text();
    const result = parseTariffCSV(text);
    return result; // { tariffs: [...], categories: [...] }
  } catch (e) { return null; }
};

// Try to restore the saved directory handle from IndexedDB on load
// Load data from backup folder files (makes folder the source of truth for multi-PC sync)
const loadDataFromFolder = async () => {
  if (!_backupDirHandle) return null;

  try {
    // Try to read the JSON backup file first (contains all data)
    const fileHandle = await _backupDirHandle.getFileHandle("EasyDentalLab-backup.json");
    const file = await fileHandle.getFile();
    const content = await file.text();
    const folderData = JSON.parse(content);

    // Also read Tariffs.csv — it's the source of truth for tariff codes/prices
    const tariffsData = await readTariffsFromFolder(_backupDirHandle);
    if (tariffsData && tariffsData.tariffs.length > 0) {
      folderData.tariffs = tariffsData.tariffs;
      folderData.categories = tariffsData.categories;
      console.log("✅ Loaded tariffs from Tariffs.csv (source of truth)");
    }

    console.log("✅ Loaded data from backup folder:", _backupDirHandle.name);
    return folderData;
  } catch (e) {
    console.warn("Could not load JSON backup from folder:", e);
  }

  return null;
};

const initAutoBackup = async () => {
  try {
    const db = await new Promise((res, rej) => {
      const req = indexedDB.open("EasyDentalLabBackup", 1);
      req.onupgradeneeded = () => req.result.createObjectStore("handles");
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
    const tx = db.transaction("handles", "readonly");
    const store = tx.objectStore("handles");
    const handle = await new Promise((res, rej) => {
      const req = store.get("backupDir");
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
    db.close();
    if (handle) {
      // Verify we still have permission
      const perm = await handle.queryPermission({ mode: "readwrite" });
      if (perm === "granted") {
        _backupDirHandle = handle;
        console.log("Auto-backup folder restored:", handle.name);

        // Load data from folder if it exists (multi-PC sync)
        const folderData = await loadDataFromFolder();
        if (folderData) {
          // Merge folder data with any existing localStorage data
          // Folder data wins (source of truth)
          const currentData = loadData();
          const merged = {
            ...currentData,
            ...folderData,
            // Preserve UI state flags from localStorage
            _tariffUpdateAvailable: currentData._tariffUpdateAvailable,
            _oldVersion: currentData._oldVersion
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
          console.log("📂 Synced localStorage from backup folder");

          // Trigger React to reload data
          window.dispatchEvent(new CustomEvent("folder-synced"));
        }
      }
    }
  } catch (e) { console.warn("Could not restore backup folder handle:", e); }
};
initAutoBackup();

// Save the directory handle to IndexedDB for persistence
const saveBackupHandle = async (handle) => {
  try {
    const db = await new Promise((res, rej) => {
      const req = indexedDB.open("EasyDentalLabBackup", 1);
      req.onupgradeneeded = () => req.result.createObjectStore("handles");
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").put(handle, "backupDir");
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    db.close();
  } catch (e) { console.warn("Could not save backup handle:", e); }
};

// Let user pick a backup folder
const pickBackupFolder = async () => {
  try {
    const handle = await window.showDirectoryPicker({ mode: "readwrite" });
    _backupDirHandle = handle;
    await saveBackupHandle(handle);

    // CRITICAL: Load existing data from folder BEFORE allowing auto-save
    // This prevents overwriting existing data with empty localStorage
    const folderData = await loadDataFromFolder();
    if (folderData) {
      const currentData = loadData();
      const merged = {
        ...currentData,
        ...folderData,
        _tariffUpdateAvailable: currentData._tariffUpdateAvailable,
        _oldVersion: currentData._oldVersion
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));

// Clear backup folder
const clearBackupFolder = async () => {
  _backupDirHandle = null;
  try {
    const db = await new Promise((res, rej) => {
      const req = indexedDB.open("EasyDentalLabBackup", 1);
      req.onupgradeneeded = () => req.result.createObjectStore("handles");
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").delete("backupDir");
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    db.close();
  } catch (e) {}
};

    await writable.write(content);
    await writable.close();
  } catch (e) {
    console.warn("Backup write failed for " + filename + ":", e);
    if (_showBackupToast) _showBackupToast(`⚠️ Backup failed: ${filename} — ${e.message}`, "error");

const buildMedicalAidsCSV = (data) => {

const buildPaymentsCSV = (data) => {
  const esc = (s) => '"' + (s || '').replace(/"/g, '""') + '"';
  let csv = "PaymentID,PaymentDate,ClientID,ClientName,Amount,Reference,Method,Unallocated,InvoiceID,InvoiceNumber,InvoiceDate,Patient,Allocated\n";
  (data.payments || []).forEach(p => {

      p.allocations.forEach(a => {

          esc(p.id), esc(p.date), esc(p.clientId), esc(p.clientName),

// BACKUP ENCRYPTION (AES-256-GCM)
// ============================================================

// Derive encryption key from password using PBKDF2
const deriveKey = async (password, salt) => {
  const encoder = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    encoder.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt: salt,
      iterations: 100000,
      hash: "SHA-256"
    },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
};

// Encrypt data with password (returns base64 string with salt + iv + ciphertext)
const encryptBackup = async (jsonString, password) => {
  const encoder = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const encrypted = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv: iv },
    key,
    encoder.encode(jsonString)
  );

  // Combine salt + iv + ciphertext into single buffer
  const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
  combined.set(salt, 0);
  combined.set(iv, salt.length);
  combined.set(new Uint8Array(encrypted), salt.length + iv.length);

  // Return as base64
  return btoa(String.fromCharCode(...combined));
};

// Decrypt backup with password
const decryptBackup = async (base64String, password) => {
  const decoder = new TextDecoder();
  const combined = Uint8Array.from(atob(base64String), c => c.charCodeAt(0));

  const salt = combined.slice(0, 16);
  const iv = combined.slice(16, 28);
  const ciphertext = combined.slice(28);

  const key = await deriveKey(password, salt);
  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: iv },
    key,
    ciphertext
  );

  return decoder.decode(decrypted);
};

// Get backup password from profile settings
const getBackupPassword = (data) => {
  return data.profile?.backupPassword || "";
};

// Debounced auto-backup (writes all CSVs after a short delay)
const autoBackupCSVs = (data) => {
  if (!_backupDirHandle) return;
  clearTimeout(_backupDebounce);
  _backupPending = true; // Mark backup as pending
  _backupDebounce = setTimeout(async () => {
    try {
      // Re-verify permission (may have been revoked)
      const perm = await _backupDirHandle.queryPermission({ mode: "readwrite" });
      if (perm !== "granted") {
        const req = await _backupDirHandle.requestPermission({ mode: "readwrite" });
        if (req !== "granted") { _backupDirHandle = null; _backupPending = false; return; }
      }
      // Encrypt JSON backup if password is set
      const password = getBackupPassword(data);
      const jsonContent = password
        ? await encryptBackup(JSON.stringify(data, null, 2), password)
        : JSON.stringify(data, null, 2);
      const jsonFilename = password ? "EasyDentalLab-backup.encrypted" : "EasyDentalLab-backup.json";

      await Promise.all([
        writeBackupFile(_backupDirHandle, "Clients.csv", buildClientsCSV(data)),
        writeBackupFile(_backupDirHandle, "Tariffs.csv", buildTariffsCSV(data)),
        writeBackupFile(_backupDirHandle, "Macros.csv", buildMacrosCSV(data)),
        writeBackupFile(_backupDirHandle, "MedicalAids.csv", buildMedicalAidsCSV(data)),
        writeBackupFile(_backupDirHandle, "Payments.csv", buildPaymentsCSV(data)),
        writeBackupFile(_backupDirHandle, jsonFilename, jsonContent),
      ]);
      _backupPending = false; // Backup complete
      console.log("Auto-backup saved:", new Date().toLocaleTimeString());
    } catch (e) {
      _backupPending = false; // Clear flag even on error
      console.warn("Auto-backup failed:", e);
      if (_showBackupToast) _showBackupToast(`⚠️ Auto-backup failed — ${e.message}`, "error");
    }
  }, 2000); // 2 second debounce to batch rapid changes
};

const Modal = ({ open, onClose, onCloseAttempt, title, wide, children }) => {
  const windowJustFocused = useRef(false);

  // Track window focus to prevent accidental overlay clicks when window regains focus
  useEffect(() => {
    const handleFocus = () => {
      windowJustFocused.current = true;
      setTimeout(() => { windowJustFocused.current = false; }, 1000); // Increased from 300ms to 1000ms
    };
    window.addEventListener('focus', handleFocus);
    return () => window.removeEventListener('focus', handleFocus);
  }, []);

  const handleCloseAttempt = () => {
    // If parent provides onCloseAttempt, call it first (can prevent close or show confirmation)
    if (onCloseAttempt) {
      onCloseAttempt(onClose);
    } else {
      onClose();
    }
  };

  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e => {
      // Only close if clicking directly on overlay background AND window wasn't just focused
      if (e.target.classList.contains('modal-overlay') && !windowJustFocused.current) {
        handleCloseAttempt();
      }
    }}>
      <div className={"modal-content " + (wide ? "w-full max-w-4xl" : "w-full max-w-lg")} style={{margin:"0 16px"}} onClick={e => e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px",borderBottom:"1px solid var(--c-border)",position:"sticky",top:0,background:"var(--c-surface)",borderRadius:"12px 12px 0 0",zIndex:10}}>
          <h2 style={{fontSize:16,fontWeight:700,margin:0}}>{title}</h2>
          <button className="icon-btn" title="Close this window" onClick={handleCloseAttempt}><SvgIcon path={ICO.x} size={18}/></button>
        </div>
        <div style={{padding:"16px 24px"}}>{children}</div>
      </div>
    </div>
  );
};

// Combobox for Medical Aid Name — searchable dropdown that also accepts custom/free-text entry
const MedicalAidSelect = ({ label, value, onChange, options, style }) => {
  const opts = (options && options.length > 0) ? options : MEDICAL_AID_OPTIONS;
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const ref = useRef(null);
  const filtered = useMemo(() => {
    if (!query) return opts;
    const q = query.toLowerCase();
    return opts.filter(o => o.label.toLowerCase().includes(q));
  }, [query, opts]);
  const pick = (val) => { onChange(val); setQuery(""); setOpen(false); };
  const handleBlur = () => {
    setTimeout(() => {
      if (ref.current && !ref.current.contains(document.activeElement)) {
        if (query.trim()) onChange(query.trim());
        setOpen(false); setQuery("");
      }
    }, 150);
  };
  return (
    <div style={{position:"relative",...(style||{})}} ref={ref}>
      {label && <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--c-text2)",marginBottom:4}}>{label}</label>}
      <div style={{position:"relative"}}>
        <input className="input-field" autoComplete="off"
          style={{paddingRight:32}}
          value={open ? query : (value || "")}
          placeholder="Type or select medical aid..."
          onFocus={() => { setOpen(true); setQuery(""); }}
          onChange={e => { setQuery(e.target.value); if (!open) setOpen(true); }}
          onBlur={handleBlur}
          onKeyDown={e => {
            if (e.key === "Enter") { e.preventDefault(); if (filtered.length > 0) pick(filtered[0].value); else if (query.trim()) { onChange(query.trim()); setOpen(false); setQuery(""); } }
            if (e.key === "Escape") { setOpen(false); setQuery(""); }
          }}
        />
        <span onMouseDown={e=>{e.preventDefault();if(open){setOpen(false);setQuery("");}else{setOpen(true);setQuery("");}}}
          style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"var(--c-text3)",pointerEvents:"all",display:"flex",alignItems:"center"}}>
          <SvgIcon path={ICO.chevronDown} size={16}/>
        </span>
      </div>
      {open && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:100,background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",maxHeight:220,overflowY:"auto",marginTop:4}}>
          {filtered.length === 0 && query ? (
            <div style={{padding:"8px 14px",fontSize:12,color:"var(--c-text3)",fontStyle:"italic"}}>No match — press Enter to use "{query}"</div>
          ) : filtered.map(o => (
            <div key={o.value} onMouseDown={e => { e.preventDefault(); pick(o.value); }}
              style={{padding:"8px 14px",fontSize:13,cursor:"pointer",borderBottom:"1px solid var(--c-border2)",background:o.value===value?"var(--c-sel)":"var(--c-surface)"}}
              onMouseOver={e=>e.currentTarget.style.background="var(--c-surface2)"}
              onMouseOut={e=>e.currentTarget.style.background=o.value===value?"var(--c-sel)":"var(--c-surface)"}>
              {o.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// Autocomplete code input — type a code, press Enter to confirm & move to description, Down Arrow for new line
const CodeInput = ({ value, onChange, onSelect, onAddLine, tariffs, inputStyle, rowId }) => {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const [hlIdx, setHlIdx] = useState(0);
  const ref = useRef(null);
  const inputRef = useRef(null);
  const dropdownRef = useRef(null);

  const handleBlur = () => { setTimeout(() => { if (ref.current && !ref.current.contains(document.activeElement)) setOpen(false); }, 150); };

  const filtered = useMemo(() => {
    const q = (query || value || "").toLowerCase();
    if (!q) return tariffs.slice(0, 50);
    return tariffs.filter(t => t.code?.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q)).slice(0, 50);
  }, [tariffs, query, value]);

  const pick = (t) => { onSelect(t); setQuery(""); setOpen(false); };

  // Confirm current code and move to qty field (skip description since it's auto-filled)
  const confirmAndMoveToQty = () => {
    const q = (query || value || "").toLowerCase().trim();
    let match = filtered.length > 0 ? filtered[hlIdx] || filtered[0] : null;
    if (!match) match = tariffs.find(t => t.code?.toLowerCase() === q);
    if (match) { pick(match); }
    setOpen(false);
    // Move focus to qty input in same row
    setTimeout(() => {
      const row = inputRef.current?.closest("tr");
      if (row) {
        const qtyInput = row.querySelector("input[type='number']");
        if (qtyInput) {
          qtyInput.focus();
          qtyInput.select(); // Select the "1" so user can immediately type to replace
        }
      }
    }, 50);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      if (open && filtered.length > 0) {
        // Select highlighted item from dropdown
        const match = filtered[hlIdx] || filtered[0];
        if (match) pick(match);
      }
      confirmAndMoveToQty();
    } else if (e.key === "ArrowRight" && (inputRef.current?.selectionStart === (query||value||"").length)) {
      // Right arrow at end of text — confirm and move to qty field
      e.preventDefault();
      confirmAndMoveToQty();
    } else if (e.key === "ArrowDown") {
      e.preventDefault();

      if (open && filtered.length > 0) {
        // Navigate down in dropdown
        setHlIdx(prev => Math.min(prev + 1, filtered.length - 1));
      } else {
        // Dropdown closed: confirm current code + add new line + focus new code input
        const q = (query || value || "").toLowerCase().trim();
        let match = filtered.length > 0 ? filtered[hlIdx] || filtered[0] : null;
        if (!match) match = tariffs.find(t => t.code?.toLowerCase() === q);

        if (match) {
          onSelect(match);
          setOpen(false);
          setQuery("");
        } else {
          setOpen(false);
        }

        // Add new blank line
        if (onAddLine) {
          onAddLine();
          setTimeout(() => {
            const table = inputRef.current?.closest("table");
            if (table) {
              const allCodeInputs = table.querySelectorAll("input[data-field='code']");
              const last = allCodeInputs[allCodeInputs.length - 1];
              if (last) last.focus();
            }
          }, 50);
        }
      }
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (open && filtered.length > 0) {
        setHlIdx(prev => Math.max(prev - 1, 0));
      }
    } else if (e.key === "Tab") {
      // Tab confirms and lets browser move focus naturally
      if (open && filtered.length > 0) {
        const match = filtered[hlIdx] || filtered[0];
        if (match) pick(match);
      }
      setOpen(false);
    } else if (e.key === "Escape") {
      // Escape closes dropdown without selecting
      e.preventDefault();
      setOpen(false);
      setQuery("");
    }
  };

  // Reset highlight when filtered list changes
  React.useEffect(() => { setHlIdx(0); }, [filtered.length]);

  // Auto-scroll to keep highlighted item visible
  React.useEffect(() => {
    if (open && dropdownRef.current && filtered.length > 0) {
      const container = dropdownRef.current;
      const items = container.children;
      if (items[hlIdx]) {
        const item = items[hlIdx];
        const containerTop = container.scrollTop;
        const containerBottom = containerTop + container.clientHeight;
        const itemTop = item.offsetTop;
        const itemBottom = itemTop + item.clientHeight;

        if (itemTop < containerTop) {
          container.scrollTop = itemTop;
        } else if (itemBottom > containerBottom) {
          container.scrollTop = itemBottom - container.clientHeight;
        }
      }
    }
  }, [hlIdx, open, filtered.length]);

  return (
    <div style={{position:"relative"}} ref={ref}>
      <input
        ref={inputRef}
        className="input-field"
        data-field="code"
        data-row={rowId}
        value={open ? query : value}
        onChange={e => { setQuery(e.target.value); onChange(e.target.value); if (!open) setOpen(true); setHlIdx(0); }}
        onFocus={() => { setOpen(true); setQuery(value || ""); }}
        onBlur={handleBlur}
        onKeyDown={handleKeyDown}
        style={inputStyle}
        placeholder="Code..."
        title="Type to search codes, use ↑↓ arrows to navigate, Enter to select"
        autoComplete="off"
      />
      {open && filtered.length > 0 && (
        <div ref={dropdownRef} style={{position:"absolute",top:"100%",left:0,zIndex:1000,background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:8,boxShadow:"0 12px 32px rgba(0,0,0,0.18)",maxHeight:280,overflowY:"auto",marginTop:2,minWidth:360}}>
          {filtered.map((t, idx) => (
            <div key={t.id}
              onMouseDown={(e) => { e.preventDefault(); pick(t); }}
              style={{padding:"7px 12px",fontSize:12,cursor:"pointer",borderBottom:"1px solid var(--c-border2)",display:"flex",justifyContent:"space-between",gap:8,background:idx===hlIdx?"var(--c-sel)":"var(--c-surface)"}}
              onMouseOver={e=>{e.currentTarget.style.background="var(--c-surface2)"; setHlIdx(idx);}}
              onMouseOut={e=>e.currentTarget.style.background=idx===hlIdx?"var(--c-sel)":"var(--c-surface)"}>
              <div><span style={{fontFamily:"monospace",color:"#2563eb",fontWeight:600,marginRight:6}}>{t.code}</span>{t.description}</div>
              <span style={{fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>{fmt(t.price)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const buildDocumentHTML = (doc, data, type) => {

    const codeA = String(a.code || "").toLowerCase();
    const codeB = String(b.code || "").toLowerCase();
    return codeA.localeCompare(codeB, undefined, { numeric: true });
  });
  const subtotal = items.reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);
  const discountEnabled = doc.discountEnabled || false;
  const discountPercent = Math.min(100, Math.max(0, parseFloat(doc.discountPercent) || 0));
  const discountAmount = discountEnabled ? subtotal * (discountPercent / 100) : 0;
  const afterDiscount = subtotal - discountAmount;
  const vatRate = parseFloat(p.vatPercent) || 0;
  const exclusive = vatRate > 0 ? afterDiscount / (1 + vatRate / 100) : afterDiscount;
  const vatAmount = afterDiscount - exclusive;
  const patientFull = [doc.patientSurname, doc.patientName ? doc.patientName + (doc.patientTitle ? " [" + doc.patientTitle + "]" : "") : ""].filter(Boolean).join(", ");
  const memberFull = doc.memberName || "";

    </div>
  </div></body></html>`;

  return html;
};

const printDocument = (doc, data, type) => {
  const copies = Math.max(1, parseInt(data.profile?.layout?.printCopies) || 2);
  const html = buildDocumentHTML(doc, data, type);
  const w = window.open("", "_blank");
  if (!w) return;
  if (copies <= 1) { w.document.write(html); w.document.close(); return; }
  // Build multi-copy document: extract head + single page body, repeat N times
  const headEnd = html.indexOf("</head>") + 7;
  const headHtml = html.substring(0, headEnd);
  const bodyStart = html.indexOf("<body>") + 6;
  const noPrintStart = html.lastIndexOf('<div class="no-print"');
  const onePage = html.substring(bodyStart, noPrintStart > bodyStart ? noPrintStart : html.lastIndexOf("</body>")).trim();
  const pages = Array.from({length: copies}, () => onePage).join("\n");
  const multiHtml = headHtml
    + `\n<style>@media print{div.page{page-break-after:always}div.page:last-child{page-break-after:auto}}</style>`
    + `\n<body>\n${pages}\n`
    + `<div class="no-print" style="margin-top:40px;text-align:center"><button onclick="window.print()" style="padding:10px 30px;background:#333;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer">Print ${copies} Copies / Save as PDF</button></div>`
    + `\n</body></html>`;
  w.document.write(multiHtml);
  w.document.close();
};

// ── Payment helpers ───────────────────────────────────────────────────────────
const getInvoiceAmountPaid = (invoiceId, payments) =>
  (payments||[]).reduce((sum, p) =>
    sum + ((p.allocations||[]).find(a => a.invoiceId === invoiceId)?.allocated || 0), 0);

const getInvoiceBalance = (inv, payments) => {
  const paid = getInvoiceAmountPaid(inv.id, payments);
  // Legacy: invoice was marked paid before payment system existed — treat as fully settled
  if (paid === 0 && inv.status === "paid") return 0;
  return Math.max(0, (inv.total != null ? inv.total : (inv.items||[]).reduce((s,i) => s + (parseFloat(i.qty)||0)*(parseFloat(i.price)||0), 0)) - paid);
};

const getInvoiceDisplayStatus = (inv, payments) => {
  if (inv.claimed) return "claimed";
  const paid = getInvoiceAmountPaid(inv.id, payments);
  if (paid === 0 && inv.status === "paid") return "paid"; // legacy
  const total = inv.total != null ? inv.total : (inv.items||[]).reduce((s,i) => s + (parseFloat(i.qty)||0)*(parseFloat(i.price)||0), 0);
  if (total > 0 && paid >= total) return "paid";
  if (paid > 0) return "partial";
  return "unpaid";
};

const getClientCredit = (clientId, payments) =>
  (payments||[]).filter(p => p.clientId === clientId)
    .reduce((sum, p) => sum + (p.unallocated || 0), 0);

const getClientAging = (clientId, invoices, payments) => {
  const now = new Date();
  now.setHours(0,0,0,0);
  const outstanding = invoices.filter(i =>
    i.clientId === clientId && !i.claimed &&
    getInvoiceDisplayStatus(i, payments) !== "paid"
  );
  let current = 0, thirtyDays = 0, sixtyPlus = 0;
  const items = outstanding.map(inv => {
    const invDate = new Date(inv.date + "T00:00:00");
    const days = Math.floor((now - invDate) / 86400000);
    const balance = getInvoiceBalance(inv, payments);
    let bucket = "current";
    if (days > 60) { sixtyPlus += balance; bucket = "60+"; }
    else if (days > 30) { thirtyDays += balance; bucket = "30"; }
    else { current += balance; bucket = "current"; }
    const patientFull = [inv.patientSurname, inv.patientName].filter(Boolean).join(", ");
    return { number: inv.number, date: inv.date, patient: patientFull, amount: balance, days, bucket };
  }).sort((a,b) => a.days - b.days);
  return { current, thirtyDays, sixtyPlus, total: current + thirtyDays + sixtyPlus, items };
};

// Build a jsPDF blob for a client statement — used by WhatsApp statement and PDF download
const buildStatementPDFBlob = async (clientId, data) => {
  const client = data.clients.find(c => c.id === clientId);
  if (!client) throw new Error("Client not found");
  const p = data.profile;
  const L = {...(INITIAL_DATA.profile.layout), ...(p.layout || {})};
  const aging = getClientAging(clientId, data.invoices, data.payments||[]);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "mm", format: "a4" });
  const ml = 14, mr = 14, pw = 210;
  const cw = pw - ml - mr;
  const fs = 9;
  const lh = 4;
  let y = 12;

  // Logo
  if (p.logo) {
    try {
      const logoMaxH = Math.min((L.logoMaxHeight || 60) * 0.265, 16);
      const logoW = 50;
      const logoAlign = L.logoPosition || "right";
      let lx = ml;
      if (logoAlign === "right") lx = pw - mr - logoW;
      else if (logoAlign === "center") lx = (pw - logoW) / 2;
      pdf.addImage(p.logo, "AUTO", lx, y, logoW, logoMaxH);
      y += logoMaxH + 2;
    } catch(e) {}
  }

  // Business name + "STATEMENT OF ACCOUNT" (right-aligned)
  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(18);
  pdf.text(p.businessName || "EasyDentalLab", pw - mr, y, { align: "right" });
  y += 6;
  pdf.setFontSize(13);
  pdf.text("STATEMENT OF ACCOUNT", pw - mr, y, { align: "right" });
  y += 6;

  // Business info (left) + Statement date (right)
  const row1Y = y;
  let ly = y;
  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(fs);
  pdf.text(p.businessName || "EasyDentalLab", ml, ly); ly += lh;
  if (p.address) { p.address.split("\n").forEach(line => { pdf.text(line.trim(), ml, ly); ly += lh; }); }
  if (p.phone) { pdf.text("Tel: " + p.phone, ml, ly); ly += lh; }
  if (p.email) { pdf.text(p.email, ml, ly); ly += lh; }
  if (p.vatNumber) { pdf.text("VAT: " + p.vatNumber, ml, ly); ly += lh; }
  pdf.setFont("helvetica", "bold");
  pdf.text("Statement Date: " + fmtDate(today()), pw - mr, row1Y, { align: "right" });
  y = Math.max(ly, row1Y + lh) + 3;

  // Client info block
  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(fs);
  pdf.text(client.name + (client.practice ? " \u2014 " + client.practice : ""), ml, y); y += lh;
  pdf.setFont("helvetica", "normal");
  if (client.address) { client.address.split("\n").forEach(line => { pdf.text(line.trim(), ml, y); y += lh; }); }
  if (client.phone) { pdf.text("Tel: " + client.phone, ml, y); y += lh; }
  if (client.email) { pdf.text(client.email, ml, y); y += lh; }
  if (client.referringPCNS) { pdf.text("PCNS: " + client.referringPCNS, ml, y); y += lh; }
  y += 3;

  // Invoices table
  const tableBody = aging.items.map(i => [
    String(i.number),
    fmtDate(i.date),
    i.patient,
    String(i.days),
    i.bucket === "current" ? "R  " + i.amount.toFixed(2) : "",
    i.bucket === "30"      ? "R  " + i.amount.toFixed(2) : "",
    i.bucket === "60+"     ? "R  " + i.amount.toFixed(2) : "",
    "R  " + i.amount.toFixed(2),
  ]);

  pdf.autoTable({
    startY: y,
    margin: { left: ml, right: mr },
    head: [["Invoice #", "Date", "Patient", "Days", "Current", "30 Days", "60+ Days", "Amount"]],
    body: tableBody,
    foot: [["", "", "", "Totals:", "R  " + aging.current.toFixed(2), "R  " + aging.thirtyDays.toFixed(2), "R  " + aging.sixtyPlus.toFixed(2), "R  " + aging.total.toFixed(2)]],
    theme: "grid",
    styles: { fontSize: fs, cellPadding: 1.5, lineColor: [0,0,0], lineWidth: 0.2, textColor: [0,0,0], font: "helvetica" },
    headStyles: { fillColor: [240,240,240], textColor: [0,0,0], fontStyle: "bold" },
    footStyles: { fillColor: [240,240,240], textColor: [0,0,0], fontStyle: "bold" },
    columnStyles: {
      0: { cellWidth: 18 },
      1: { cellWidth: 22 },
      2: { cellWidth: 40 },
      3: { cellWidth: 11, halign: "right" },
      4: { cellWidth: 23, halign: "right" },
      5: { cellWidth: 23, halign: "right" },
      6: { cellWidth: 23, halign: "right" },
      7: { cellWidth: 22, halign: "right" },
    },
  });
  y = pdf.lastAutoTable.finalY + 4;

  // Age analysis summary
  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(fs);
  pdf.text("Age Analysis Summary", ml, y); y += lh + 1;
  pdf.autoTable({
    startY: y,
    margin: { left: ml + 20, right: mr + 20 },
    body: [
      ["Current (0-30 days)",   { content: "R  " + aging.current.toFixed(2),    styles: { halign: "right", fontStyle: "bold" } }],
      ["30 Days (31-60 days)",  { content: "R  " + aging.thirtyDays.toFixed(2), styles: { halign: "right", fontStyle: "bold" } }],
      ["60+ Days (over 60)",    { content: "R  " + aging.sixtyPlus.toFixed(2),  styles: { halign: "right", fontStyle: "bold" } }],
      ["Total Outstanding",     { content: "R  " + aging.total.toFixed(2),      styles: { halign: "right", fontStyle: "bold", fontSize: fs + 1 } }],
    ],
    theme: "plain",
    styles: { fontSize: fs, cellPadding: 1.5, textColor: [0,0,0], font: "helvetica" },
    columnStyles: { 0: { cellWidth: 60 }, 1: { cellWidth: 35 } },
  });
  y = pdf.lastAutoTable.finalY + 4;

  // Footer warning
  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(fs - 1);
  pdf.text(L.footerMsg2 || "Outstanding invoices more than 60 days will be handed over for collection", ml, y, { maxWidth: cw });

  return pdf.output("blob");
};

// WhatsApp send — generates statement PDF, downloads it, then opens WhatsApp
const whatsappStatement = async (client, data) => {
  const p = data.profile;
  const filename = "Statement_" + (client.name || "").replace(/[^a-zA-Z0-9]/g, "_") + ".pdf";
  try {
    const pdfBlob = await buildStatementPDFBlob(client.id, data);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(pdfBlob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    let phone = (client.whatsapp || client.phone || "").replace(/[^0-9+]/g, "");
    if (phone.startsWith("0") && !phone.startsWith("00")) phone = "27" + phone.slice(1);
    else if (phone.startsWith("+")) phone = phone.slice(1);
    const waMsg = (p.businessName || "EasyDentalLab") + " \u2014 Statement of Account\n\nPlease see the attached PDF statement.";
    const waUrl = phone ? "https://wa.me/" + phone + "?text=" + encodeURIComponent(waMsg) : "https://wa.me/?text=" + encodeURIComponent(waMsg);
    setTimeout(() => window.open(waUrl, "_blank"), 500);
  } catch(e) {
    console.error("WhatsApp statement failed:", e);
    alert("Could not generate statement PDF: " + e.message + "\nOpening for browser printing instead.");
    printStatement(client.id, data);
  }
};

const buildReceiptPDFBlob = async (payment, client, data) => {
  const p = data.profile;
  const L = {...(INITIAL_DATA.profile.layout), ...(p.layout || {})};
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit:"mm", format:"a4" });
  const ml = 14, mr = 14, pw = 210, cw = pw - ml - mr;
  let y = 12;
  if (p.logo) {
    try {
      const lh = Math.min((L.logoMaxHeight||60)*0.265, 16);
      const lw = 50;
      const lpos = L.logoPosition || "right";
      const lx = lpos==="left" ? ml : lpos==="center" ? (pw-lw)/2 : pw-mr-lw;
      pdf.addImage(p.logo, lx, y, lw, lh, "", "FAST");
    } catch(e) {}
  }
  pdf.setFontSize(14); pdf.setFont("helvetica","bold");
  pdf.text(p.businessName||"", ml, y+4);
  pdf.setFontSize(8); pdf.setFont("helvetica","normal");
  let iy = y+9;
  [p.address, p.phone?"Tel: "+p.phone:"", p.email?"Email: "+p.email:"", p.vatNumber?"VAT: "+p.vatNumber:""].filter(Boolean).forEach(line => { pdf.text(line, ml, iy); iy += 4; });
  y = Math.max(iy, y+22) + 2;
  pdf.setFillColor(30,58,95); pdf.rect(ml, y, cw, 8, "F");
  pdf.setFontSize(11); pdf.setFont("helvetica","bold"); pdf.setTextColor(255,255,255);
  pdf.text("PAYMENT RECEIPT", ml+3, y+5.5);
  pdf.setTextColor(0,0,0); y += 12;
  const methods = { eft:"EFT", cash:"Cash", cheque:"Cheque", other:"Other" };
  const details = [
    ["Received from:", (client.name||"")+(client.practice?" — "+client.practice:"")],
    ["Date:", fmtDate(payment.date)],
    ["Reference:", payment.reference||"—"],
    ["Method:", methods[payment.method]||payment.method||"—"],
  ];
  pdf.setFontSize(9);
  details.forEach(([label,value]) => {
    pdf.setFont("helvetica","bold"); pdf.text(label, ml, y);
    pdf.setFont("helvetica","normal"); pdf.text(value, ml+40, y); y += 5;
  });
  y += 3;
  if ((payment.allocations||[]).length > 0) {
    pdf.autoTable({ startY:y, head:[["Invoice","Date","Patient","Amount Applied"]],
      body:(payment.allocations||[]).map(a=>["#"+a.invoiceNumber, fmtDate(a.invoiceDate), a.patient||"", "R  "+((a.allocated||0).toFixed(2))]),
      margin:{left:ml,right:mr}, styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[243,244,246],textColor:[0,0,0],fontStyle:"bold"},
      columnStyles:{3:{halign:"right"}}, theme:"grid" });
    y = pdf.lastAutoTable.finalY + 4;
  }
  const total = payment.amount||0, unalloc = payment.unallocated||0, applied = total-unalloc;
  const totals = [["Amount applied:", "R  "+applied.toFixed(2)], ...(unalloc>0?[["Credit carried forward:","R  "+unalloc.toFixed(2)]]:[] ), ["Total received:", "R  "+total.toFixed(2)]];
  pdf.autoTable({ startY:y, body:totals, margin:{left:ml,right:mr}, styles:{fontSize:9},
    columnStyles:{0:{fontStyle:"bold",cellWidth:130},1:{halign:"right"}},
    didParseCell:(d)=>{ if(d.row.index===totals.length-1) d.cell.styles.fontStyle="bold"; },
    theme:"plain" });
  y = pdf.lastAutoTable.finalY + 6;
  pdf.setFontSize(8); pdf.setFont("helvetica","italic"); pdf.setTextColor(100,100,100);
  pdf.text(L.footerMsg1||"Thank you for your payment.", ml, y);
  return pdf.output("blob");
};

// Build a jsPDF blob for an invoice or estimate — shared by WhatsApp and Claim PDF save
const buildPDFBlob = async (doc, data, type) => {
  const client = data.clients.find(c => c.id === doc.clientId);
  const p = data.profile;
  const isInv = type === "invoice";
  const titleLabel = isInv ? "TAX INVOICE" : "ESTIMATE";
  const items = (doc.items || []).sort((a, b) => {
    const codeA = String(a.code || "").toLowerCase();
    const codeB = String(b.code || "").toLowerCase();
    return codeA.localeCompare(codeB, undefined, { numeric: true });
  });
  const subtotal = items.reduce((s,i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.price)||0), 0);
  const discountEnabled = doc.discountEnabled || false;
  const discountPercent = Math.min(100, Math.max(0, parseFloat(doc.discountPercent) || 0));
  const discountAmount = discountEnabled ? subtotal * (discountPercent / 100) : 0;
  const afterDiscount = subtotal - discountAmount;
  const vatRate = parseFloat(p.vatPercent) || 0;
  const exclusive = vatRate > 0 ? afterDiscount / (1 + vatRate / 100) : afterDiscount;
  const vatAmount = afterDiscount - exclusive;
  const L = {...(INITIAL_DATA.profile.layout), ...(p.layout || {})};
  const patientFull = [doc.patientSurname, doc.patientName ? doc.patientName + (doc.patientTitle ? " [" + doc.patientTitle + "]" : "") : ""].filter(Boolean).join(", ");
  const memberFull = doc.memberName || "";
  const bd = [p.bankName, p.accountNumber, p.branchCode ? "Branch " + p.branchCode : ""].filter(Boolean).join(", ");
  const getDesc = (item) => {
    if (doc.lang === "af") {
      const t = data.tariffs.find(tr => tr.code === item.code);
      return (t?.descriptionAFR || item.description || "");
    }
    return item.description || "";
  };

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "mm", format: "a4" });
    const ml = 14, mr = 14, pw = 210;
    const cw = pw - ml - mr; // 182mm
    const fs = 9; // body font size pt
    const lh = 4; // line height mm
    let y = 12;

    // --- LOGO ---
    if (p.logo) {
      try {
        const logoMaxH = Math.min((L.logoMaxHeight || 60) * 0.265, 16);
        const logoW = 50;
        const logoAlign = L.logoPosition || "right";
        let lx = ml;
        if (logoAlign === "right") lx = pw - mr - logoW;
        else if (logoAlign === "center") lx = (pw - logoW) / 2;
        pdf.addImage(p.logo, "AUTO", lx, y, logoW, logoMaxH);
        y += logoMaxH + 2;
      } catch(e) {}
    }

    // --- BUSINESS NAME + DOC TYPE (right aligned) ---
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(18);
    pdf.text(p.businessName || "EasyDentalLab", pw - mr, y, { align: "right" });
    y += 6;
    pdf.setFontSize(13);
    pdf.text(titleLabel, pw - mr, y, { align: "right" });
    y += 6;

    // --- ROW 1: Business info (left) + Doc info table (right) ---
    const row1Y = y;
    let ly = y;
    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(fs);
    pdf.text(p.businessName || "EasyDentalLab", ml, ly); ly += lh;
    if (p.address) {
      p.address.split("\n").forEach(line => { pdf.text(line.trim(), ml, ly); ly += lh; });
    }
    if (p.phone) { pdf.text("Tel: " + p.phone, ml, ly); ly += lh; }
    if (p.email) { pdf.text(p.email, ml, ly); ly += lh; }

    // Right side: doc info table
    const infoRows = [];
    infoRows.push(["Date", fmtDate(doc.date)]);
    infoRows.push([isInv ? "Invoice" : "Estimate", String(doc.number)]);
    if (p.vatNumber) infoRows.push(["VAT registration", p.vatNumber]);
    if (p.laboratory) infoRows.push(["Laboratory", p.laboratory]);
    if (!isInv && doc.validUntil) infoRows.push(["Valid until", fmtDate(doc.validUntil)]);
    if (doc.estimateRef) infoRows.push(["Estimate ref", "#" + doc.estimateRef]);
    infoRows.push(["Page", "1 of 1"]);
    if (p.practicePCNS) infoRows.push(["Laboratory PCNS", p.practicePCNS]);

    const infoTblX = pw - mr - 78;
    pdf.autoTable({
      startY: row1Y - 3,
      margin: { left: infoTblX },
      tableWidth: 78,
      body: infoRows,
      theme: "grid",
      styles: { fontSize: fs, cellPadding: 1, lineColor: [0,0,0], lineWidth: 0.2, textColor: [0,0,0], font: "helvetica" },
      columnStyles: { 0: { cellWidth: 35 }, 1: { cellWidth: 43 } },
    });
    y = Math.max(ly, pdf.lastAutoTable.finalY) + 3;

    // --- ROW 2: Referring provider (left) + Patient/member (right) ---
    const row2Y = y;
    ly = y;
    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(fs);
    const rpLabel = "Referring provider: ";
    pdf.text(rpLabel, ml, ly);
    const rpLabelW = pdf.getTextWidth(rpLabel);
    pdf.setFont("helvetica", "bold");
    const refName = client?.name || doc.clientName || "";
    pdf.text(refName, ml + rpLabelW, ly);
    pdf.setFont("helvetica", "normal");
    if (client?.practice) {
      const afterName = ml + rpLabelW + pdf.getTextWidth(refName);
      pdf.text(" — " + client.practice, afterName, ly);
    }
    ly += lh;
    if (client?.referringPCNS) { pdf.text("Referring PCNS: " + client.referringPCNS, ml, ly); ly += lh; }
    if (client?.address) {
      client.address.split("\n").forEach(line => { pdf.text(line.trim(), ml, ly); ly += lh; });
    }
    if (client?.phone) { pdf.text("Tel: " + client.phone, ml, ly); ly += lh; }
    if (client?.email) { pdf.text(client.email, ml, ly); ly += lh; }

    // Right: patient/member table
    const pmW = 100;
    const pmX = pw - mr - pmW;
    pdf.autoTable({
      startY: row2Y - 5,
      margin: { left: pmX },
      tableWidth: pmW,
      body: [
        [{ content: "Patient/member details", colSpan: 2, styles: { fontStyle: "bold" } }],
        ["Medical fund", doc.medicalAidName || ""],
        ["Membership", doc.medicalAidNumber || ""],
        ["Main member", memberFull],
        ["Patient", patientFull],
      ],
      theme: "grid",
      styles: { fontSize: fs, cellPadding: 1.2, lineColor: [0,0,0], lineWidth: 0.2, textColor: [0,0,0], font: "helvetica" },
      columnStyles: { 0: { cellWidth: 28 }, 1: { cellWidth: pmW - 28 } },
    });
    y = Math.max(ly, pdf.lastAutoTable.finalY) + 2;

    // --- BANK DETAILS ---
    if (bd) {
      pdf.setDrawColor(0);
      pdf.setLineWidth(0.2);
      pdf.rect(ml, y, cw, 5);
      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(fs);
      pdf.text("Bank details: " + bd, ml + 2, y + 3.2);
      y += 7;
    }

    // --- LINE ITEMS TABLE ---
    // Column widths for items table
    const cW = [cw * 0.08, cw * 0.07, 0, cw * 0.14, cw * 0.14];
    cW[2] = cw - cW[0] - cW[1] - cW[3] - cW[4]; // Details takes the rest

    const itemRows = items.map(i => [
      (i.tariffCode || i.code) || "",
      String(i.qty || ""),
      getDesc(i),
      "R  " + parseFloat(i.price || 0).toFixed(2),
      "R  " + ((parseFloat(i.qty) || 0) * (parseFloat(i.price) || 0)).toFixed(2),
    ]);
    const minRows = L.minItemRows || 18;
    while (itemRows.length < minRows) {
      itemRows.push(["", "", "", "", ""]);
    }

    pdf.autoTable({
      startY: y,
      margin: { left: ml, right: mr },
      tableWidth: cw,
      head: [["Code", "Units", "Details", "Each", "Total"]],
      body: itemRows,
      theme: "plain",
      styles: { fontSize: fs, cellPadding: 1, textColor: [0,0,0], font: "helvetica", overflow: "linebreak" },
      headStyles: { fontStyle: "bold", halign: "left" },
      columnStyles: {
        0: { cellWidth: cW[0] },
        1: { cellWidth: cW[1] },
        2: { cellWidth: cW[2] },
        3: { cellWidth: cW[3], halign: "right" },
        4: { cellWidth: cW[4], halign: "right" },
      },
      didDrawPage: function(hookData) {
        pdf.setDrawColor(0);
        pdf.setLineWidth(0.2);
        const sY = hookData.settings.startY;
        const eY = hookData.cursor.y;
        // Outer border
        pdf.rect(ml, sY, cw, eY - sY);
        // Header bottom line
        const headRows = hookData.table.head;
        if (headRows && headRows.length > 0) {
          const cells = Object.values(headRows[headRows.length - 1].cells);
          if (cells.length > 0) {
            const hB = cells[0].y + cells[0].height;
            pdf.line(ml, hB, ml + cw, hB);
          }
        }
        // Vertical column separator lines
        let cx = ml;
        for (let ci = 0; ci < cW.length - 1; ci++) {
          cx += cW[ci];
          pdf.line(cx, sY, cx, eY);
        }
      },
    });
    y = pdf.lastAutoTable.finalY + 2;

    // --- TOTALS TABLE (right-aligned, with discount if enabled, VAT-inclusive total + VAT component) ---
    const totW = cw * 0.55;
    const totBody = [
      ["Subtotal", { content: "R  " + subtotal.toFixed(2), styles: { halign: "right" } }],
    ];
    if (discountEnabled) {
      totBody.push(["Discount (" + discountPercent.toFixed(1) + "%)", { content: "-R  " + discountAmount.toFixed(2), styles: { halign: "right" } }]);
    }
    const totLabel = (isInv ? "Invoice total" : "Estimate total") + (vatRate > 0 ? " (incl. VAT at " + vatRate + "%)" : " (no VAT)");
    totBody.push([{ content: totLabel, styles: { fontStyle: "bold" } }, { content: "R  " + afterDiscount.toFixed(2), styles: { halign: "right", fontStyle: "bold" } }]);
    if (vatRate > 0) {
      totBody.push(["VAT at " + vatRate + "% included", { content: "R  " + vatAmount.toFixed(2), styles: { halign: "right" } }]);
    }
    pdf.autoTable({
      startY: y,
      margin: { left: ml + cw - totW, right: mr },
      tableWidth: totW,
      body: totBody,
      theme: "grid",
      styles: { fontSize: fs, cellPadding: 1.2, textColor: [0,0,0], lineColor: [0,0,0], lineWidth: 0.2, font: "helvetica" },
      columnStyles: {
        0: { cellWidth: totW * 0.65 },
        1: { cellWidth: totW * 0.35, halign: "right" },
      },
    });
    y = pdf.lastAutoTable.finalY + 3;

    // --- FOOTER MESSAGES ---
    const footerText = [L.footerMsg1, L.footerMsg2, L.footerMsg3].filter(Boolean).join("\n");
    const notesText = doc.notes ? "\n\nNotes: " + doc.notes : "";
    if (footerText || notesText) {
      pdf.autoTable({
        startY: y,
        margin: { left: ml, right: mr },
        tableWidth: cw,
        body: [[footerText + notesText]],
        theme: "grid",
        styles: { fontSize: fs, cellPadding: 1.5, textColor: [0,0,0], lineColor: [0,0,0], lineWidth: 0.2, font: "helvetica" },
      });
      y = pdf.lastAutoTable.finalY + 2;
    }

    // --- CONFIRM MESSAGES ---
    const confirmText = [L.confirmMsg1, L.confirmMsg2].filter(Boolean).join("\n");
    if (confirmText) {
      pdf.autoTable({
        startY: y,
        margin: { left: ml, right: mr },
        tableWidth: cw,
        body: [[confirmText]],
        theme: "grid",
        styles: { fontSize: fs, cellPadding: 1.5, textColor: [0,0,0], lineColor: [0,0,0], lineWidth: 0.2, font: "helvetica" },
      });
    }

    return pdf.output("blob");
};

// Save a claim PDF to the "Send to Direct Claiming" subfolder of the backup folder
const saveClaimPDF = async (inv, data) => {
  if (!_backupDirHandle) return false;
  try {
    const perm = await _backupDirHandle.queryPermission({ mode: "readwrite" });
    if (perm !== "granted") {
      const req = await _backupDirHandle.requestPermission({ mode: "readwrite" });
      if (req !== "granted") return false;
    }
    const blob = await buildPDFBlob(inv, data, "invoice");
    const subDir = await _backupDirHandle.getDirectoryHandle("Send to Direct Claiming", { create: true });
    await writeBackupFile(subDir, `Invoice_${inv.number}.pdf`, blob);
    return true;
  } catch(e) {
    console.warn("saveClaimPDF failed:", e);
    return false;
  }
};

const whatsappDocument = async (doc, data, type) => {
  const client = data.clients.find(c => c.id === doc.clientId);

const PaymentModal = ({ client, data, payment, onSave, onCancel }) => {
  const isEdit = !!payment;
  const otherPayments = isEdit ? (data.payments||[]).filter(p => p.id !== payment.id) : (data.payments||[]);

  const outstandingInvoices = useMemo(() => {
    return [...(data.invoices||[])].filter(inv => inv.clientId === client.id && !inv.claimed)
      .map(inv => {
        const paidElsewhere = otherPayments.reduce((s,p) => s + ((p.allocations||[]).find(a=>a.invoiceId===inv.id)?.allocated||0), 0);
        const legacyPaid = paidElsewhere===0 && inv.status==="paid";
        const bal = legacyPaid ? 0 : Math.max(0, (inv.total||0) - paidElsewhere);
        return { ...inv, balance: bal };
      }).filter(inv => inv.balance > 0)
      .sort((a,b) => (a.date||"").localeCompare(b.date||""));
  }, [data.invoices, data.payments, client.id]);

  const credit = getClientCredit(client.id, otherPayments);

  const [form, setForm] = useState({
    date: payment?.date || today(),
    amount: payment?.amount ? String(payment.amount) : "",
    reference: payment?.reference || "",
    method: payment?.method || "eft",
    receiptMethod: "print",
  });

  const [allocations, setAllocations] = useState(() => {
    return outstandingInvoices.map(inv => {
      const prevAllocated = isEdit ? ((payment.allocations||[]).find(a=>a.invoiceId===inv.id)?.allocated||0) : 0;
      return {
        invoiceId: inv.id, invoiceNumber: inv.number, invoiceDate: inv.date,
        patient: [inv.patientSurname, inv.patientName].filter(Boolean).join(", "),
        balance: isEdit ? inv.balance + prevAllocated : inv.balance,
        allocated: prevAllocated,
      };
    });
  });

  const sf = (k,v) => setForm(p => ({...p,[k]:v}));
  const totalAmount = parseFloat(form.amount)||0;
  const totalAllocated = allocations.reduce((s,a) => s+(parseFloat(a.allocated)||0), 0);
  const unallocated = Math.max(0, Math.round((totalAmount - totalAllocated)*100)/100);
  const overAllocated = totalAllocated > totalAmount + 0.005;

  const autoAllocate = (amount) => {
    let rem = parseFloat(amount)||0;
    setAllocations(prev => prev.map(a => {
      const apply = Math.min(rem, a.balance);
      rem = Math.max(0, rem - apply);
      return { ...a, allocated: apply > 0 ? Math.round(apply*100)/100 : 0 };
    }));
  };

  const handleSave = () => {
    if (!totalAmount || totalAmount <= 0) { alert("Please enter a payment amount."); return; }
    if (overAllocated) { alert("Total allocated exceeds payment amount."); return; }
    const activeAllocs = allocations.filter(a => (a.allocated||0) > 0)
      .map(a => ({ invoiceId:a.invoiceId, invoiceNumber:a.invoiceNumber, invoiceDate:a.invoiceDate, patient:a.patient, allocated:Math.round((a.allocated||0)*100)/100 }));
    onSave({
      id: payment?.id || genId(),
      date: form.date, clientId: client.id,
      clientName: client.name+(client.practice?" — "+client.practice:""),
      amount: Math.round(totalAmount*100)/100,
      reference: form.reference, method: form.method,
      allocations: activeAllocs,
      unallocated: Math.round(unallocated*100)/100,
    }, form.receiptMethod);
  };

  return (
    <div>
      {credit > 0 && (
        <div style={{background:"#dcfce7",border:"1px solid #86efac",borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#166534"}}>
          <strong>Credit available: {fmt(credit)}</strong> — unallocated balance from a previous payment.
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:14}}>
        <Input label="Date" type="date" value={form.date} onChange={v=>sf("date",v)}/>
        <Input label="Amount Received (R)" value={form.amount} onChange={v=>{sf("amount",v);autoAllocate(v);}} placeholder="0.00" type="number"/>
        <Input label="Reference / Note" value={form.reference} onChange={v=>sf("reference",v)} placeholder="e.g. EFT ref 12345"/>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"var(--c-text2)",display:"block",marginBottom:4}}>Method</label>
          <select className="input-field" value={form.method} onChange={e=>sf("method",e.target.value)} style={{background:"var(--c-surface)"}}>
            <option value="eft">EFT</option><option value="cash">Cash</option>
            <option value="cheque">Cheque</option><option value="other">Other</option>
          </select>
        </div>
      </div>

      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <label style={{fontSize:12,fontWeight:600,color:"var(--c-text2)"}}>Allocate to Invoices (oldest first)</label>
          <button className="btn btn-secondary btn-sm" onClick={()=>autoAllocate(form.amount)}>Auto-fill</button>
        </div>
        {outstandingInvoices.length === 0 ? (
          <div style={{padding:"12px",textAlign:"center",color:"var(--c-text4)",fontSize:12,border:"1px solid var(--c-border)",borderRadius:6}}>No outstanding invoices — full amount will be saved as credit.</div>
        ) : (
          <div style={{border:"1px solid var(--c-border)",borderRadius:6,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"var(--c-surface2)",borderBottom:"1px solid var(--c-border)"}}>
                <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600}}>Invoice</th>
                <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600}}>Date</th>
                <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600}}>Patient</th>
                <th style={{padding:"6px 10px",textAlign:"right",fontWeight:600}}>Balance Due</th>
                <th style={{padding:"6px 10px",textAlign:"right",fontWeight:600}}>Allocate (R)</th>
              </tr></thead>
              <tbody>
                {allocations.map((a,i) => (
                  <tr key={a.invoiceId} style={{borderBottom:i<allocations.length-1?"1px solid var(--c-border2)":"none"}}>
                    <td style={{padding:"5px 10px",fontWeight:600,color:"#2563eb"}}>#{a.invoiceNumber}</td>
                    <td style={{padding:"5px 10px",color:"var(--c-text3)"}}>{fmtDate(a.invoiceDate)}</td>
                    <td style={{padding:"5px 10px"}}>{a.patient||"—"}</td>
                    <td style={{padding:"5px 10px",textAlign:"right",fontFamily:"monospace"}}>{fmt(a.balance)}</td>
                    <td style={{padding:"4px 8px",textAlign:"right"}}>
                      <input type="number" min="0" max={a.balance} step="0.01" value={a.allocated||""}
                        onChange={e=>setAllocations(prev=>prev.map(x=>x.invoiceId===a.invoiceId?{...x,allocated:parseFloat(e.target.value)||0}:x))}
                        className="input-field" style={{width:90,textAlign:"right",padding:"3px 6px",fontSize:12}}/>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:16,padding:"8px 12px",background:"var(--c-surface2)",borderRadius:6,marginBottom:14,fontSize:12,alignItems:"center",flexWrap:"wrap"}}>
        <span>Total received: <strong>{fmt(totalAmount)}</strong></span>
        <span>Allocated: <strong>{fmt(totalAllocated)}</strong></span>
        <span style={{color:unallocated>0?"#059669":"var(--c-text2)"}}>Credit: <strong>{fmt(unallocated)}</strong></span>
        {overAllocated && <span style={{color:"#dc2626",fontWeight:600}}>⚠ Over-allocated by {fmt(totalAllocated-totalAmount)}</span>}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:14,padding:"8px 12px",border:"1px solid var(--c-border)",borderRadius:6}}>
        <label style={{fontSize:12,fontWeight:600,color:"var(--c-text2)"}}>Issue Receipt:</label>
        {[["print","Print"],["whatsapp","WhatsApp"],["both","Both"]].map(([v,label]) => (
          <label key={v} style={{fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <input type="radio" name="rcptMethod" value={v} checked={form.receiptMethod===v} onChange={()=>sf("receiptMethod",v)}/> {label}
          </label>
        ))}
      </div>

      <div style={{display:"flex",justifyContent:"flex-end",gap:8,borderTop:"1px solid var(--c-border)",paddingTop:12}}>
        <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary" onClick={handleSave} disabled={!totalAmount||totalAmount<=0||overAllocated}>
          {isEdit ? "Update Payment" : "Save & Issue Receipt"}
        </button>
      </div>
    </div>
  );
};

const ClientForm = ({ client, onSave, onCancel, onDirtyChange }) => {
  const t = useT();
  const initialFormData = client || { name:"", practice:"", email:"", phone:"", whatsapp:"", address:"", webpage:"", notes:"", referringPCNS:"" };
  const [f, setF] = useState(initialFormData);
  const s = (k,v) => setF(p => ({...p,[k]:v}));

  // Track if form has unsaved changes
  const isDirty = useMemo(() => {
    if (!client) {
      // New client - check if any data entered
      return f.name?.trim() !== "" ||
             f.practice?.trim() !== "" ||
             f.email?.trim() !== "" ||
             f.phone?.trim() !== "" ||
             f.whatsapp?.trim() !== "" ||
             f.address?.trim() !== "" ||
             f.webpage?.trim() !== "" ||
             f.notes?.trim() !== "" ||
             f.referringPCNS?.trim() !== "";
    } else {
      // Editing - check if anything changed
      return JSON.stringify(f) !== JSON.stringify(initialFormData);
    }
  }, [f, client, initialFormData]);

  // Notify parent when dirty state changes
  useEffect(() => {
    if (onDirtyChange) onDirtyChange(isDirty);
  }, [isDirty, onDirtyChange]);
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <Input label={t("dentistName")} value={f.name} onChange={v=>s("name",v)} required placeholder="e.g. Dr M Mynhardt"/>
        <Input label={t("practice")} value={f.practice} onChange={v=>s("practice",v)} placeholder="e.g. Gentle Dental"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <Input label={t("email")} value={f.email} onChange={v=>s("email",v)} type="email" placeholder="email@example.com"/>
        <Input label={t("phone")} value={f.phone} onChange={v=>s("phone",v)} placeholder="082 123 4567"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <Input label={t("whatsapp")} value={f.whatsapp} onChange={v=>s("whatsapp",v)} placeholder="082 123 4567"/>
        <Input label={t("webpage")} value={f.webpage} onChange={v=>s("webpage",v)} placeholder="www.example.com"/>
      </div>
      <Input label={t("pcns")} value={f.referringPCNS} onChange={v=>s("referringPCNS",v)} placeholder="e.g. 7314928" style={{marginBottom:12}}/>
      <Input label={t("address")} value={f.address} onChange={v=>s("address",v)} textarea rows={2} placeholder="Street, City, Code" style={{marginBottom:12}}/>
      <Input label={t("clientNotes")} value={f.notes} onChange={v=>s("notes",v)} textarea rows={2} style={{marginBottom:16}}/>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button className="btn btn-secondary" onClick={onCancel}>{t("cancel")}</button>
        <button className="btn btn-primary" onClick={()=>onSave({...f,id:f.id||genId()})} disabled={!f.name?.trim()}>{t("save")}</button>
      </div>
    </div>
  );
};

const Clients = ({ data, setData }) => {
  const t = useT();
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showMonthEnd, setShowMonthEnd] = useState(false);
  const [meSelected, setMeSelected] = useState(new Set());
  const [paymentClient, setPaymentClient] = useState(null);
  const [editingPayment, setEditingPayment] = useState(null);
  const [expandedPayments, setExpandedPayments] = useState(new Set());
  const csvRef = useRef(null);
  const [formIsDirty, setFormIsDirty] = useState(false);
  const [sortConfig, setSortConfig] = useState({ field: 'name', direction: 'asc' });

  const layout = {...(INITIAL_DATA.profile.layout), ...(data.profile.layout || {})};
  const stmtMethod = layout.statementSendMethod || "both";
  const stmtFormat = layout.statementFormat || "pdf";
  const meMode = layout.monthEndMode || "both";
  const showPrint = stmtMethod === "print" || stmtMethod === "both";
  const showWA    = stmtMethod === "whatsapp" || stmtMethod === "both";
  const showBatch = meMode === "batch" || meMode === "both";

  const handlePrintStatement = (clientId) => {
    if (stmtFormat === "pdf") {
      const c = data.clients.find(x => x.id === clientId);
      const fname = "Statement_" + (c?.name || "").replace(/[^a-zA-Z0-9]/g, "_") + ".pdf";
      buildStatementPDFBlob(clientId, data).then(blob => {
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = fname; a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      }).catch(() => printStatement(clientId, data));
    } else {
      printStatement(clientId, data);
    }
  };

  const savePayment = (payment, receiptMethod) => {
    setData(prev => {
      const payments = prev.payments||[];
      const isEdit = payments.some(p => p.id === payment.id);
      const newPayments = isEdit ? payments.map(p => p.id===payment.id ? payment : p) : [...payments, payment];
      // Update invoice status fields based on new payment state
      const newInvoices = prev.invoices.map(inv => {
        const paid = newPayments.reduce((s,p) => s+((p.allocations||[]).find(a=>a.invoiceId===inv.id)?.allocated||0), 0);
        const total = inv.total||0;
        if (paid >= total && total > 0) return {...inv, status:"paid", paidDate:inv.paidDate||payment.date};
        if (paid > 0) return {...inv, status:"unpaid"}; // partial — keep as unpaid, display derived
        return inv;
      });
      return {...prev, payments:newPayments, invoices:newInvoices};
    });
    const client = data.clients.find(c => c.id === payment.clientId);
    if (client) {
      if (receiptMethod==="print"||receiptMethod==="both") printReceipt(payment, client, data);
      if (receiptMethod==="whatsapp"||receiptMethod==="both") whatsappReceipt(payment, client, data);
    }
    setPaymentClient(null); setEditingPayment(null);
  };

  const openMonthEnd = () => {
    const withBalance = new Set(data.clients.filter(c => !c.archived && getClientAging(c.id, data.invoices, data.payments||[]).total > 0).map(c => c.id));
    setMeSelected(withBalance);
    setShowMonthEnd(true);
  };

  const batchPrintAll = async () => {
    const selected = data.clients.filter(c => !c.archived && meSelected.has(c.id));
    if (selected.length === 0) { alert("No clients selected."); return; }
    if (stmtFormat === "pdf") {
      for (let i = 0; i < selected.length; i++) {
        await new Promise(res => setTimeout(res, i === 0 ? 0 : 600));
        const c = selected[i];
        const fname = "Statement_" + c.name.replace(/[^a-zA-Z0-9]/g, "_") + ".pdf";
        const blob = await buildStatementPDFBlob(c.id, data);
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = fname; a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      }
    } else {
      // Browser print — combine all statements into one window with page breaks
      const htmlParts = selected.map(c => buildStatementHTML(c.id, data));
      // Extract body content from each statement HTML
      const pages = htmlParts.map(h => {
        const bodyStart = h.indexOf("<body>") + 6;
        const noPrint = h.lastIndexOf('<div class="no-print"');
        return h.substring(bodyStart, noPrint > bodyStart ? noPrint : h.lastIndexOf("</body>")).trim();
      }).join('\n');
      // Use head from first statement
      const headEnd = htmlParts[0].indexOf("</head>") + 7;
      const combined = htmlParts[0].substring(0, headEnd)
        + '\n<style>@media print{div.page{page-break-after:always}div.page:last-child{page-break-after:auto}}</style>'
        + '\n<body>\n' + pages + '\n'
        + '<div class="no-print" style="margin-top:40px;text-align:center"><button onclick="window.print()" style="padding:10px 30px;background:#333;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer">Print All Statements</button></div>'
        + '\n</body></html>';
      const w = window.open("", "_blank");
      if (w) { w.document.write(combined); w.document.close(); }
    }
    setShowMonthEnd(false);
  };

  const batchWhatsAppAll = async () => {
    const selected = data.clients.filter(c => !c.archived && meSelected.has(c.id));
    if (selected.length === 0) { alert("No clients selected."); return; }
    if (!confirm("Send statements via WhatsApp to " + selected.length + " dentist(s)? Each will download a PDF and open WhatsApp in a new tab.")) return;
    setShowMonthEnd(false);
    for (let i = 0; i < selected.length; i++) {
      await new Promise(res => setTimeout(res, i === 0 ? 0 : 1200));
      await whatsappStatement(selected[i], data);
    }
  };

  const handleSort = (field) => {
    setSortConfig(prev => {
      if (prev.field === field) {
        if (prev.direction === 'asc') return { field, direction: 'desc' };
        return { field: 'name', direction: 'asc' };
      }
      return { field, direction: 'asc' };
    });
  };

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    let result = data.clients.filter(c => !c.archived && (c.name?.toLowerCase().includes(q) || c.practice?.toLowerCase().includes(q)));

    if (sortConfig.field && sortConfig.direction !== 'default') {
      result.sort((a, b) => {
        const field = sortConfig.field;
        const dir = sortConfig.direction === 'asc' ? 1 : -1;
        if (field === 'name') return dir * (a.name||"").localeCompare(b.name||"");
        else if (field === 'practice') return dir * (a.practice||"").localeCompare(b.practice||"");
        else if (field === 'phone') return dir * (a.phone||"").localeCompare(b.phone||"");
        else if (field === 'email') return dir * (a.email||"").localeCompare(b.email||"");
        else if (field === 'outstanding') {
          const aAging = getClientAging(a.id, data.invoices, data.payments||[]);
          const bAging = getClientAging(b.id, data.invoices, data.payments||[]);
          return dir * (aAging.total - bAging.total);
        }
        else if (field === 'credit') {
          const aCredit = getClientCredit(a.id, data.payments||[]);
          const bCredit = getClientCredit(b.id, data.payments||[]);
          return dir * (aCredit - bCredit);
        }
        return 0;
      });
    }

    return result;
  }, [data.clients, data.invoices, data.payments, search, sortConfig]);

  const save = (client) => {
    setData(prev => {
      const exists = prev.clients.find(c => c.id === client.id);
      return {...prev, clients: exists ? prev.clients.map(c => c.id===client.id ? client : c) : [...prev.clients, client]};
    });
    setShowForm(false); setEditing(null);
  };

  const archive = (id) => {
    if (confirm("Archive this client?")) setData(prev => ({...prev, clients: prev.clients.map(c => c.id===id ? {...c, archived:true} : c)}));
  };

  // Load clients from CSV
  const loadCSV = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const clients = parseClientCSV(ev.target.result);
      if (clients.length > 0) {
        if (confirm("Load " + clients.length + " clients from CSV? This will replace all current clients.")) {
          setData(prev => ({...prev, clients}));
          alert("Loaded " + clients.length + " clients!");
        }
      } else { alert("No clients found. CSV needs headers: Name,Practice,Email,Phone,WhatsApp,Address,Webpage,Notes"); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Export clients to CSV
  const exportCSV = () => {
    let csv = "Name,Practice,Email,Phone,WhatsApp,Address,Webpage,Notes,ReferringPCNS\n";
    data.clients.filter(c => !c.archived).forEach(c => {
      const esc = (s) => '"' + (s||'').replace(/"/g,'""') + '"';
      csv += [esc(c.name), esc(c.practice), esc(c.email), esc(c.phone), esc(c.whatsapp), esc(c.address), esc(c.webpage), esc(c.notes), esc(c.referringPCNS)].join(',') + '\n';
    });
    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Clients.csv";
    a.click();
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h1 style={{fontSize:24,fontWeight:700,margin:0}}>{t("clientsTitle")}</h1>
        <div style={{display:"flex",gap:8}}>
          {showBatch && <button className="btn btn-secondary" title="Month-End: send or print statements for all dentists with outstanding balances" onClick={openMonthEnd} style={{background:"#eff6ff",borderColor:"#93c5fd",color:"#1e40af",fontWeight:600}}><SvgIcon path={ICO.printer} size={15}/> Month-End</button>}
          <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowForm(true)}}><SvgIcon path={ICO.plus} size={16}/> {t("newClient")}</button>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,padding:12,background:"#eaf2f8",borderRadius:8,alignItems:"center",flexWrap:"wrap"}}>
